<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>The Garden of the Stars</title>
<link rel="manifest" href="./manifest.json" />
<link rel="icon" type="image/png" href="./icon.png" />
<link rel="apple-touch-icon" href="./icon.png" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./game-data.js"></script>
<style>
  :root {
    --bg: #0b0f1a;
    --bg-soft: #141a2b;
    --bg-soft-2: #1c2338;
    --ink: #e8ecf5;
    --ink-dim: #9aa3bd;
    --accent: #f4c46d;
    --accent-soft: #c6a55a;
    --line: #2a3350;
  }
  * { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  }
  button {
    font-family: inherit;
    background: var(--bg-soft-2);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #1a1408;
    border-color: var(--accent);
    font-weight: bold;
  }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  input[type="text"] {
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 16px;
  }

  .app { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .topbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
  }
  .topbar h1 { margin: 0; font-size: 20px; letter-spacing: 2px; color: var(--accent); }
  .topbar .spacer { flex: 1; }

  /* Character creation */
  .creation { padding: 30px; max-width: 1100px; margin: 0 auto; }
  .creation h2 { color: var(--accent); margin-top: 0; }
  .role-block { margin-bottom: 24px; }
  .role-block h3 { margin: 0 0 4px 0; }
  .role-block .domain { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .candidates { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .candidate {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 16px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .candidate:hover { border-color: var(--accent-soft); }
  .candidate.selected {
    border-color: var(--accent);
    background: var(--bg-soft-2);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .candidate .portrait {
    width: 120px; height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--line);
    margin-bottom: 10px;
    background: var(--bg-soft-2);
  }
  .candidate.selected .portrait { border-color: var(--accent); }
  .candidate .name { font-weight: bold; margin-bottom: 4px; }
  .candidate .blurb { font-size: 13px; color: var(--ink-dim); }
  .ship-name { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .launch-row { display: flex; justify-content: flex-end; }

  /* Ship view */
  .ship-view { padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .dollhouse {
    width: 1024px; max-width: 100%;
    height: 600px;
    background: url('./assets/ship-interior.jpg') center/cover no-repeat;
    border: 1px solid var(--line);
    border-radius: 6px;
    position: relative;
  }
  .room {
    position: absolute;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  .room:hover {
    border-color: var(--accent-soft);
    background: rgba(244,196,109,0.08);
  }
  .room .room-name {
    position: absolute;
    bottom: 4px; left: 6px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 6px #000, 0 0 3px #000;
    pointer-events: none;
  }
  .room .crew-pip {
    position: absolute;
    bottom: 22px;
    right: 6px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    background: var(--bg-soft-2);
    font-size: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .room .crew-pip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .room .crew-pip:hover { border-color: #fff; box-shadow: 0 0 12px rgba(244,196,109,0.5); }

  .dialog {
    margin-top: 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    max-width: 1024px;
    width: 100%;
    border-radius: 4px;
  }
  .dialog .speaker { color: var(--accent); font-weight: bold; }
  .dialog .line { font-style: italic; margin-top: 4px; color: var(--ink); }

  /* Star chart */
  .chart {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-canvas {
    width: 1400px; height: 700px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
  }
  .system-dot {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 12px rgba(244,196,109,0.4);
  }
  .system-dot.current {
    background: #fff;
    box-shadow: 0 0 18px rgba(255,255,255,0.6);
  }
  .system-dot.dim {
    opacity: 0.3;
    box-shadow: none;
  }
  .system-label {
    position: absolute;
    transform: translate(-50%, 14px);
    color: var(--ink);
    font-size: 12px;
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .lane {
    position: absolute;
    height: 1px;
    background: linear-gradient(to right, rgba(244,196,109,0.0), rgba(244,196,109,0.5), rgba(244,196,109,0.0));
    transform-origin: 0 0;
    pointer-events: none;
  }
  .system-info {
    margin-top: 14px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 12px 16px;
    width: 1400px;
    border-radius: 4px;
  }
  .system-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .system-info .desc { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .system-info .planets { font-size: 13px; }
  .system-info .planet-line { padding: 2px 0; }
  .system-info .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

  /* System map */
  .system-map {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .system-canvas {
    width: 800px; height: 500px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
    overflow: hidden;
  }
  .orbit-ring {
    position: absolute;
    border: 1px dashed rgba(244,196,109,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .star-body {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 40px 8px rgba(244,196,109,0.35);
  }
  .star-label {
    position: absolute;
    transform: translate(-50%, 34px);
    font-size: 12px;
    color: var(--ink-dim);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .planet-body {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(0,0,0,0.6);
  }
  .planet-body.selected {
    box-shadow: 0 0 0 2px var(--accent), 0 0 12px rgba(244,196,109,0.6);
  }
  .planet-label {
    position: absolute;
    transform: translate(-50%, 16px);
    font-size: 11px;
    color: var(--ink);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }

  /* Planet surface */
  .surface {
    padding: 20px;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .surface-main { display: flex; flex-direction: column; gap: 12px; }
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(12, 44px);
    grid-template-rows: repeat(8, 44px);
    gap: 2px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background-size: cover;
    background-position: center;
  }
  .tile {
    width: 44px; height: 44px;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    border: 1px solid rgba(255,255,255,0.12);
    transition: background 0.15s;
    background: transparent;
  }
  .tile:hover { filter: brightness(1.2); }
  .tile.placing:hover { box-shadow: inset 0 0 0 2px var(--accent); }
  .tile.occupied { cursor: pointer; }
  .tile.inspected { box-shadow: inset 0 0 0 2px var(--accent); }
  .machine-pip {
    position: absolute;
    left: 50%; top: 50%;
    width: 34px; height: 34px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid #1a1408;
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow 0.3s;
  }
  .machine-pip .pip-icon {
    width: 22px; height: 22px;
    display: block;
    color: rgba(255,255,255,0.85);
  }
  .machine-pip .pip-icon svg { width: 100%; height: 100%; }
  .machine-pip.active-glow {
    animation: pip-glow 2s ease-in-out infinite alternate;
  }
  @keyframes pip-glow {
    from { box-shadow: 0 0 4px rgba(244,196,109,0.2); }
    to { box-shadow: 0 0 10px rgba(244,196,109,0.5); }
  }
  .surface-sidebar {
    width: 260px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px;
  }
  .surface-sidebar h4 { margin: 12px 0 8px 0; color: var(--accent); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
  .surface-sidebar > div:first-child h4 { margin-top: 0; }
  .machine-option {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .machine-option:hover { border-color: var(--accent-soft); }
  .machine-option.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .machine-option .pip-sample {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .machine-option.disabled { opacity: 0.45; cursor: not-allowed; }
  .machine-option.idle { opacity: 0.55; }
  .machine-option .m-name { font-size: 13px; font-weight: bold; }
  .machine-option .m-idle { font-weight: normal; font-size: 11px; color: #c07070; }
  .machine-option .m-active { font-weight: normal; font-size: 11px; color: #6fbf73; }
  .machine-option .m-desc { font-size: 11px; color: var(--ink-dim); }
  .machine-option .m-stats { font-size: 11px; color: var(--ink-dim); margin-top: 2px; display: flex; gap: 8px; }
  .machine-option .m-stages { font-style: italic; }
  .machine-option .m-cost { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .surface-info {
    width: 280px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .surface-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .surface-info .row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--ink-dim); }
  .surface-info .row strong { color: var(--ink); }
  .progress-outer {
    height: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    margin: 6px 0;
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(to right, #6fbf73, #a8d8f0);
    transition: width 0.4s;
  }
  .stage-toast {
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    padding: 14px 22px;
    border-radius: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    z-index: 100;
    max-width: 520px;
  }
  .stage-toast .stage-note { font-size: 13px; color: var(--ink-dim); }
  .stage-toast .stage-machine-hint { margin-top: 8px; font-size: 12px; color: var(--accent-soft); border-top: 1px solid var(--line); padding-top: 8px; }

  .deconstruct-popup {
    position: absolute;
    z-index: 50;
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 12px 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    min-width: 220px;
    font-size: 13px;
  }
  .deconstruct-popup .dp-name { font-weight: bold; color: var(--accent); margin-bottom: 2px; }
  .deconstruct-popup .dp-status { font-size: 11px; color: var(--ink-dim); margin-bottom: 6px; }
  .deconstruct-popup .dp-refund { font-size: 12px; color: var(--ink-dim); margin-bottom: 8px; }
  .deconstruct-popup .dp-refund .chip { display: inline-block; background: var(--bg-soft-2); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; margin: 1px 2px; font-size: 11px; }
  .deconstruct-popup .dp-actions { display: flex; gap: 8px; }
  .deconstruct-popup .dp-actions button { font-size: 12px; padding: 4px 10px; }
  .deconstruct-popup .dp-actions .danger { background: #8a3a3a; color: #f5d0c0; border: 1px solid #c95a3a; }
  .deconstruct-popup .dp-actions .danger:hover { background: #a04a4a; }

  .placement-error {
    background: #3a1a1a;
    border: 1px solid #8a3a3a;
    border-left: 3px solid #c95a3a;
    color: #f5d0c0;
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .placement-error .dismiss { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* Inventory + upgrades (on Ship View) */
  .inventory-panel, .upgrade-panel {
    width: 1024px; max-width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 18px;
    margin-top: 16px;
  }
  .inventory-panel h4, .upgrade-panel h4 {
    margin: 0 0 10px 0;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .inventory-cell {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .inventory-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .inventory-text { flex: 1; }
  .inv-name { font-size: 13px; font-weight: bold; }
  .inv-from { font-size: 11px; color: var(--ink-dim); font-style: italic; }
  .inv-amount {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
    font-family: "Iowan Old Style", Georgia, serif;
  }

  .upgrade-tracks {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .upgrade-track {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .track-header { display: flex; justify-content: space-between; align-items: baseline; }
  .track-label { font-size: 15px; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
  .track-tier { font-size: 11px; color: var(--ink-dim); }
  .track-desc { font-size: 11px; color: var(--ink-dim); font-style: italic; line-height: 1.3; }
  .track-effect { font-size: 12px; color: var(--ink); }
  .tier-ladder { display: flex; gap: 4px; }
  .tier-pip {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .tier-pip.owned { background: var(--accent); border-color: var(--accent); }
  .tier-pip.next { border-color: var(--accent); }
  .next-label { font-size: 12px; font-weight: bold; }
  .next-cost { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .cost-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .cost-chip.short { border-color: #8a3a3a; color: #f5b0a0; }
  .upgrade-track button { margin-top: 4px; }

  /* Title screen */
  .title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
  }
  .title-screen h1 {
    font-size: 42px;
    letter-spacing: 6px;
    color: var(--accent);
    margin: 0 0 12px 0;
    text-shadow: 0 0 40px rgba(244,196,109,0.3);
  }
  .title-tagline {
    font-size: 18px;
    color: var(--ink-dim);
    font-style: italic;
    margin-bottom: 48px;
  }
  .save-slots {
    display: flex;
    gap: 16px;
    max-width: 900px;
    width: 100%;
  }
  .save-slot {
    flex: 1;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 180px;
  }
  .save-slot .slot-label {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .save-slot .slot-ship {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
  }
  .save-slot .slot-crew {
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.4;
  }
  .save-slot .slot-stat {
    font-size: 12px;
    color: var(--ink);
    margin-top: auto;
  }
  .save-slot .slot-empty {
    color: var(--ink-dim);
    font-style: italic;
    margin: auto 0;
    text-align: center;
  }
  .save-slot .slot-buttons {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .save-slot .slot-buttons button { flex: 1; }
  .slot-delete {
    background: transparent !important;
    border-color: #5a2a2a !important;
    color: #c07070 !important;
    font-size: 12px !important;
  }
  .slot-delete:hover { border-color: #c07070 !important; }

  /* Tutorial slideshow */
  .tutorial-overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px;
  }
  .tutorial-slide {
    max-width: 600px;
    text-align: center;
    margin-bottom: 32px;
  }
  .tutorial-slide .slide-number {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .tutorial-slide .slide-text {
    font-size: 18px;
    line-height: 1.7;
    color: var(--ink);
  }
  .tutorial-speaker {
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    margin-top: 24px;
  }
  .tutorial-nav {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .tutorial-nav .dots {
    display: flex;
    gap: 6px;
    margin: 0 16px;
  }
  .tutorial-nav .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
  }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function useIsMobile(breakpoint) {
  const bp = breakpoint || 768;
  const [mobile, setMobile] = useState(() => window.innerWidth <= bp);
  useEffect(() => {
    const mq = window.matchMedia("(max-width: " + bp + "px)");
    const handler = (e) => setMobile(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, [bp]);
  return mobile;
}

// ---------- Save / load (3-slot system) ----------
function slotKey(slot) { return "tender.save.slot." + slot; }

function loadSave(slot) {
  try {
    const raw = localStorage.getItem(slotKey(slot));
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.saveVersion !== SAVE_VERSION) return null;
    return data;
  } catch (e) {
    console.warn("Save load failed (slot " + slot + "):", e);
    return null;
  }
}

function writeSave(state, slot) {
  const blob = {
    saveVersion: SAVE_VERSION,
    shipName: state.shipName,
    crew: state.crew,
    currentSystemId: state.currentSystemId,
    worlds: state.worlds,
    inventory: state.inventory,
    upgrades: state.upgrades,
    tutorialSeen: state.tutorialSeen || false,
    lastTickTimestamp: Date.now(),
    shipRoomTiers: state.shipRoomTiers || defaultShipRoomTiers(),
    totalPlaySeconds: state.totalPlaySeconds || 0,
    totalPopoutsFired: state.totalPopoutsFired || 0
  };
  localStorage.setItem(slotKey(slot), JSON.stringify(blob));
  // Track last active slot for auto-resume on home-screen launch.
  try { localStorage.setItem("tender.lastActiveSlot", String(slot)); } catch (e) {}
}

function getLastActiveSlot() {
  try {
    const v = localStorage.getItem("tender.lastActiveSlot");
    return v != null ? parseInt(v, 10) : null;
  } catch (e) { return null; }
}

function deleteSave(slot) {
  localStorage.removeItem(slotKey(slot));
}

// Migrate old single-save key into slot 0 if present.
(function migrateOldSave() {
  const OLD_KEY = "tender.save.v1";
  try {
    const raw = localStorage.getItem(OLD_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.saveVersion !== SAVE_VERSION) return;
    if (!localStorage.getItem(slotKey(0))) {
      data.tutorialSeen = true; // existing players already know the game
      localStorage.setItem(slotKey(0), JSON.stringify(data));
    }
    localStorage.removeItem(OLD_KEY);
  } catch (e) { /* ignore */ }
})();

// Return summaries of all 3 save slots for the title screen.
function getSaveSlots() {
  return [0, 1, 2].map(slot => {
    const data = loadSave(slot);
    if (!data) return { slot, empty: true };
    const crewNames = [];
    CREW_ROLES.forEach(role => {
      const pickedId = data.crew && data.crew[role.id];
      if (pickedId) {
        const cand = role.candidates.find(c => c.id === pickedId);
        if (cand) crewNames.push(cand.name);
      }
    });
    let terraformed = 0;
    if (data.worlds) {
      for (const id in data.worlds) {
        if (data.worlds[id].stage >= 5) terraformed++;
      }
    }
    return {
      slot,
      empty: false,
      shipName: data.shipName,
      crewNames,
      terraformed
    };
  });
}

// ---------- Growth tick (the architectural call from PRIMER.md) ----------
// Walks all in-progress worlds and advances stage thresholds based on installed machines.
// Phase 0: worlds dictionary is empty, machines aren't placed yet — but the plumbing exists
// so Phase 1 doesn't have to retrofit anything.
// Adjacency helper: returns placed machines in the 8 tiles surrounding (x, y).
function getAdjacentMachines(machines, x, y) {
  var result = [];
  for (var i = 0; i < machines.length; i++) {
    var m = machines[i];
    var dx = Math.abs(m.x - x);
    var dy = Math.abs(m.y - y);
    if (dx <= 1 && dy <= 1 && !(dx === 0 && dy === 0)) result.push(m);
  }
  return result;
}

// Count adjacent Solar Arrays for a given tile position.
function countAdjacentSolars(machines, x, y) {
  var adj = getAdjacentMachines(machines, x, y);
  var count = 0;
  for (var i = 0; i < adj.length; i++) {
    if (adj[i].type === "solar_array") count++;
  }
  return count;
}

// Count adjacent Storage Silos for a given tile position.
function countAdjacentSilos(machines, x, y) {
  var adj = getAdjacentMachines(machines, x, y);
  var count = 0;
  for (var i = 0; i < adj.length; i++) {
    if (adj[i].type === "storage_silo") count++;
  }
  return count;
}

// Calculate effective pps for a world based on its machines, stage, and adjacency.
function calcWorldPps(machines, stage) {
  var arr = machines || [];
  var total = 0;
  arr.forEach(m => {
    var def = MACHINES.find(md => md.id === m.type);
    if (def && def.pps > 0 && def.activeStages.indexOf(stage) !== -1) {
      var solarAdj = countAdjacentSolars(arr, m.x, m.y);
      total += def.pps * (1 + solarAdj * 0.15);
    }
  });
  return total;
}

// Calculate total extraction rate for a world, with adjacency boosts.
function calcWorldExtraction(machines, stage) {
  var arr = machines || [];
  var total = 0;
  arr.forEach(m => {
    var def = MACHINES.find(md => md.id === m.type);
    if (def && def.extractionRate && stage >= def.extractionMinStage) {
      var solarAdj = countAdjacentSolars(arr, m.x, m.y);
      var siloAdj = countAdjacentSilos(arr, m.x, m.y);
      var rate = def.extractionRate * (1 + solarAdj * 0.15) * Math.pow(1.20, siloAdj);
      total += rate;
    }
  });
  return total;
}

function applyGrowthTicks(worlds, inventory, elapsedSeconds, hullTier) {
  if (!worlds) return { worlds: worlds, inventory: inventory || {} };
  const outWorlds = { ...worlds };
  const outInv = { ...(inventory || {}) };
  for (const id in outWorlds) {
    const w = { ...outWorlds[id] };
    const machines = w.machines || [];
    if (machines.length > 0 && w.stage < 5) {
      const pps = calcWorldPps(machines, w.stage);
      if (pps > 0) {
        w.progress = (w.progress || 0) + pps * elapsedSeconds;
        while (w.progress >= STAGE_THRESHOLD && w.stage < 5) {
          w.progress -= STAGE_THRESHOLD;
          w.stage += 1;
        }
        if (w.stage >= 5) w.progress = 0;
      }
    }
    // Resource production — passive (no adjacency boost) + extraction (with adjacency).
    const found = findPlanet(id);
    const pType = found && found.planet.type;
    const lp = w.lifetimeProduction || {};
    const resId = pType && PLANET_TYPE_RESOURCE[pType];

    // Passive production (baseline trickle — not boosted by silos).
    if (pType === "rocky") {
      const rockyRate = ROCKY_PRODUCTION_PER_STAGE[w.stage];
      if (rockyRate) {
        const produced = rockyRate * elapsedSeconds;
        outInv["common_ore"] = (outInv["common_ore"] || 0) + produced;
        lp["common_ore"] = (lp["common_ore"] || 0) + produced;
      }
    } else {
      const rate = PRODUCTION_PER_STAGE[w.stage];
      if (rate && resId) {
        const produced = rate * elapsedSeconds;
        outInv[resId] = (outInv[resId] || 0) + produced;
        lp[resId] = (lp[resId] || 0) + produced;
      }
      if (w.stage < 3) {
        const produced = BASE_ORE_TRICKLE * elapsedSeconds;
        outInv["common_ore"] = (outInv["common_ore"] || 0) + produced;
        lp["common_ore"] = (lp["common_ore"] || 0) + produced;
      }
    }

    // Extraction machines — adjacency-boosted by Solars and Silos.
    if (resId) {
      const extractTotal = calcWorldExtraction(machines, w.stage);
      if (extractTotal > 0) {
        const produced = extractTotal * elapsedSeconds;
        outInv[resId] = (outInv[resId] || 0) + produced;
        lp[resId] = (lp[resId] || 0) + produced;
      }
    }

    w.lifetimeProduction = lp;
    outWorlds[id] = w;
  }
  // Enforce cargo cap per resource.
  const cap = cargoCap(hullTier);
  for (const k in outInv) {
    if (outInv[k] > cap) outInv[k] = cap;
  }
  return { worlds: outWorlds, inventory: outInv };
}

function emptyInventory() {
  const inv = {};
  SIGNATURE_RESOURCES.forEach(r => { inv[r.id] = 0; });
  for (const k in STARTING_INVENTORY) inv[k] = (inv[k] || 0) + STARTING_INVENTORY[k];
  return inv;
}
function defaultUpgrades() {
  return { hull: 1, drive: 1, lab: 1 };
}
function canAfford(inventory, cost) {
  if (!cost) return true;
  for (const k in cost) if ((inventory[k] || 0) < cost[k]) return false;
  return true;
}
function spend(inventory, cost) {
  const out = { ...inventory };
  if (!cost) return out;
  for (const k in cost) out[k] = (out[k] || 0) - cost[k];
  return out;
}
function countActiveWorlds(worlds) {
  let n = 0;
  for (const id in worlds) {
    const w = worlds[id];
    if ((w.machines || []).length > 0 && w.stage < 5) n++;
  }
  return n;
}

// Diff two worlds maps and return list of stage-advance events.
function stageAdvanceEvents(prev, next) {
  const events = [];
  for (const id in next) {
    const p = prev && prev[id];
    if (p && next[id].stage > p.stage) {
      events.push({ planetId: id, newStage: next[id].stage });
    }
  }
  return events;
}

// Look up a planet by id across stub systems. Returns {system, planet} or null.
function findPlanet(planetId) {
  for (const sys of STUB_SYSTEMS) {
    const p = sys.planets.find(pl => pl.id === planetId);
    if (p) return { system: sys, planet: p };
  }
  return null;
}

// BFS: returns map of system id -> hop distance from `fromId`. maxHops limits traversal.
function reachableSystems(fromId, maxHops) {
  const dist = new Map([[fromId, 0]]);
  let frontier = [fromId];
  for (let hop = 1; hop <= maxHops; hop++) {
    const next = [];
    for (const sid of frontier) {
      const sys = STUB_SYSTEMS.find(s => s.id === sid);
      if (!sys) continue;
      for (const nid of sys.connections) {
        if (!dist.has(nid)) { dist.set(nid, hop); next.push(nid); }
      }
    }
    frontier = next;
    if (frontier.length === 0) break;
  }
  return dist;
}

// BFS: returns full hop distance from `fromId` to every system (unlimited).
function allHopDistances(fromId) {
  return reachableSystems(fromId, 999);
}

// ---------- Ship room tier progression ----------
function defaultShipRoomTiers() {
  return { bridge: 0, engine: 0, galley: 0, greenhouse: 0, quarters: 0, observation: 0 };
}

function computeShipRoomTiers(state) {
  const tiers = { ...(state.shipRoomTiers || defaultShipRoomTiers()) };
  const worlds = state.worlds || {};
  const upgrades = state.upgrades || {};
  const visited = state.visitedSystems || {};

  // Count world stages.
  let floraWorlds = 0, paradiseWorlds = 0;
  for (const id in worlds) {
    if (worlds[id].stage >= 3) floraWorlds++;
    if (worlds[id].stage >= 5) paradiseWorlds++;
  }

  // Greenhouse: Flora/Paradise milestones.
  if (paradiseWorlds >= 1) tiers.greenhouse = Math.max(tiers.greenhouse, 3);
  else if (floraWorlds >= 3) tiers.greenhouse = Math.max(tiers.greenhouse, 2);
  else if (floraWorlds >= 1) tiers.greenhouse = Math.max(tiers.greenhouse, 1);

  // Engine: upgrade milestones.
  const maxUpgrade = Math.max(upgrades.hull || 1, upgrades.drive || 1, upgrades.lab || 1);
  const anyUpgradeBought = maxUpgrade > 1;
  if (maxUpgrade >= 5) tiers.engine = Math.max(tiers.engine, 3);
  else if (maxUpgrade >= 3) tiers.engine = Math.max(tiers.engine, 2);
  else if (anyUpgradeBought) tiers.engine = Math.max(tiers.engine, 1);

  // Galley: total play time.
  const playHours = (state.totalPlaySeconds || 0) / 3600;
  if (playHours >= 30) tiers.galley = Math.max(tiers.galley, 3);
  else if (playHours >= 15) tiers.galley = Math.max(tiers.galley, 2);
  else if (playHours >= 5) tiers.galley = Math.max(tiers.galley, 1);

  // Bridge: systems visited.
  const visitedCount = Object.keys(visited).length;
  if (visitedCount >= STUB_SYSTEMS.length) tiers.bridge = Math.max(tiers.bridge, 3);
  else if (visitedCount >= 10) tiers.bridge = Math.max(tiers.bridge, 2);
  else if (visitedCount >= 5) tiers.bridge = Math.max(tiers.bridge, 1);

  // Quarters: crew popout events.
  const popouts = state.totalPopoutsFired || 0;
  if (popouts >= 40) tiers.quarters = Math.max(tiers.quarters, 3);
  else if (popouts >= 15) tiers.quarters = Math.max(tiers.quarters, 2);
  else if (popouts >= 3) tiers.quarters = Math.max(tiers.quarters, 1);

  // Observation: Paradise worlds.
  if (paradiseWorlds >= 10) tiers.observation = Math.max(tiers.observation, 3);
  else if (paradiseWorlds >= 5) tiers.observation = Math.max(tiers.observation, 2);
  else if (paradiseWorlds >= 1) tiers.observation = Math.max(tiers.observation, 1);

  return tiers;
}

// ---------- Root app ----------
function App() {
  const [state, setState] = useState({
    screen: "title",
    activeSlot: null,
    shipName: "",
    crew: { botanist: null, engineer: null, cartographer: null, cook: null },
    currentSystemId: "harbor",
    currentPlanetId: null,
    worlds: {},
    inventory: emptyInventory(),
    upgrades: defaultUpgrades(),
    tutorialSeen: false,
    stageToast: null,
    placementError: null,
    crewPopoutQueue: [],
    visitedSystems: { harbor: true },
    firstParadiseSeen: false,
    shipRoomTiers: defaultShipRoomTiers(),
    totalPlaySeconds: 0,
    totalPopoutsFired: 0
  });

  function pushPopout(reaction) {
    if (!reaction) return;
    setState(s => ({
      ...s,
      crewPopoutQueue: [...s.crewPopoutQueue, { ...reaction, ts: Date.now() + Math.random() }],
      totalPopoutsFired: (s.totalPopoutsFired || 0) + 1
    }));
  }
  function dismissPopout() {
    setState(s => ({
      ...s,
      crewPopoutQueue: s.crewPopoutQueue.slice(1)
    }));
  }

  // Auto-resume: on first mount, if lastActiveSlot has a valid save, skip title screen.
  const autoResumeRef = useRef(false);
  useEffect(() => {
    if (autoResumeRef.current) return;
    autoResumeRef.current = true;
    const lastSlot = getLastActiveSlot();
    if (lastSlot != null) {
      const saved = loadSave(lastSlot);
      if (saved) {
        console.log("[Garden] Auto-resuming slot", lastSlot);
        continueGame(lastSlot);
      }
    }
  }, []);

  // Save on visibility change / pagehide — mobile browsers kill tabs without beforeunload.
  useEffect(() => {
    function saveNow() {
      if (state.activeSlot != null && state.screen !== "creation" && state.screen !== "title" && state.screen !== "tutorial") {
        writeSave(state, state.activeSlot);
      }
    }
    function onVisChange() { if (document.visibilityState === "hidden") saveNow(); }
    document.addEventListener("visibilitychange", onVisChange);
    window.addEventListener("pagehide", saveNow);
    return () => {
      document.removeEventListener("visibilitychange", onVisChange);
      window.removeEventListener("pagehide", saveNow);
    };
  });

  // Live tick during play (cozy interval). Ticks every 2 seconds for responsive feedback
  // on the surface view — this is a cozy game, the math is cheap.
  useEffect(() => {
    if (state.screen === "creation" || state.screen === "title" || state.screen === "tutorial") return;
    const handle = setInterval(() => {
      setState(s => {
        const result = applyGrowthTicks(s.worlds, s.inventory, 2, s.upgrades.hull || 1);
        const next = result.worlds;
        const events = stageAdvanceEvents(s.worlds, next);
        let toast = s.stageToast;
        if (events.length > 0) {
          const ev = events[events.length - 1];
          // Build info-only toast (machine hint, stage name). Crew voice goes through popout.
          const w = next[ev.planetId];
          const prevStage = ev.newStage - 1;
          const nowIdle = [];
          const seen = new Set();
          (w && w.machines || []).forEach(m => {
            const def = MACHINES.find(md => md.id === m.type);
            if (def && def.pps > 0 && def.activeStages.indexOf(prevStage) !== -1 && def.activeStages.indexOf(ev.newStage) === -1) {
              if (!seen.has(def.id)) { seen.add(def.id); nowIdle.push(def.name); }
            }
          });
          const needed = MACHINES.filter(m => m.pps > 0 && m.activeStages.indexOf(ev.newStage) !== -1).map(m => m.name);
          let machineHint = "";
          if (nowIdle.length > 0) machineHint += nowIdle.join(", ") + (nowIdle.length === 1 ? " is" : " are") + " now idle. Tap idle machines to deconstruct and reclaim 75% of their resources.";
          if (needed.length > 0 && ev.newStage < 5) machineHint += (machineHint ? " " : "") + "You'll need " + needed.join(" or ") + " to keep progressing.";
          toast = {
            planetId: ev.planetId,
            newStage: ev.newStage,
            machineHint: machineHint || null,
            ts: Date.now()
          };
        }
        // Crew popout for stage advances.
        let popouts = s.crewPopoutQueue;
        if (events.length > 0) {
          const ev = events[events.length - 1];
          const eventType = ev.newStage <= 2 ? "stage_advance_early" : "stage_advance_late";
          const reaction = pickCrewReaction(s.crew, eventType);
          if (reaction) popouts = [...popouts, { ...reaction, ts: Date.now() + Math.random() }];
          // First paradise or subsequent paradise.
          if (ev.newStage >= 5) {
            if (!s.firstParadiseSeen) {
              const fp = pickCrewReaction(s.crew, "first_paradise");
              if (fp) popouts = [...popouts, { ...fp, ts: Date.now() + Math.random() + 0.1 }];
              const ns1 = { ...s, worlds: next, inventory: result.inventory, stageToast: toast, crewPopoutQueue: popouts, firstParadiseSeen: true, totalPlaySeconds: (s.totalPlaySeconds || 0) + 2, totalPopoutsFired: (s.totalPopoutsFired || 0) + popouts.length - s.crewPopoutQueue.length };
              ns1.shipRoomTiers = computeShipRoomTiers(ns1);
              return ns1;
            } else if (Math.random() < 0.3) {
              const pp = pickCrewReaction(s.crew, "paradise");
              if (pp) popouts = [...popouts, { ...pp, ts: Date.now() + Math.random() + 0.1 }];
            }
          }
        }
        const ns = { ...s, worlds: next, inventory: result.inventory, stageToast: toast, crewPopoutQueue: popouts, totalPlaySeconds: (s.totalPlaySeconds || 0) + 2, totalPopoutsFired: (s.totalPopoutsFired || 0) + popouts.length - s.crewPopoutQueue.length };
        ns.shipRoomTiers = computeShipRoomTiers(ns);
        return ns;
      });
    }, 2000);
    return () => clearInterval(handle);
  }, [state.screen]);

  // Auto-dismiss the stage toast after a few seconds so it doesn't linger.
  useEffect(() => {
    if (!state.stageToast) return;
    const h = setTimeout(() => {
      setState(s => (s.stageToast && s.stageToast.ts === state.stageToast.ts ? { ...s, stageToast: null } : s));
    }, 7000);
    return () => clearTimeout(h);
  }, [state.stageToast]);

  // Persist on meaningful changes.
  useEffect(() => {
    if (state.screen === "creation" || state.screen === "title" || state.screen === "tutorial") return;
    if (state.activeSlot == null) return;
    writeSave(state, state.activeSlot);
  }, [state.screen, state.shipName, state.crew, state.currentSystemId, state.currentPlanetId, state.worlds, state.inventory, state.upgrades, state.activeSlot]);

  function startNewGame(slot) {
    setState(s => ({
      ...s,
      screen: "creation",
      activeSlot: slot,
      shipName: "",
      crew: { botanist: null, engineer: null, cartographer: null, cook: null },
      currentSystemId: "harbor",
      currentPlanetId: null,
      worlds: {},
      inventory: emptyInventory(),
      upgrades: defaultUpgrades(),
      tutorialSeen: false,
      stageToast: null,
      placementError: null,
      crewPopoutQueue: [],
      visitedSystems: { harbor: true },
      firstParadiseSeen: false,
      shipRoomTiers: defaultShipRoomTiers(),
      totalPlaySeconds: 0,
      totalPopoutsFired: 0
    }));
  }
  function continueGame(slot) {
    const saved = loadSave(slot);
    if (!saved) return;
    const now = Date.now();
    const savedTs = saved.lastTickTimestamp || 0;
    const rawElapsed = savedTs ? Math.floor((now - savedTs) / 1000) : 0;
    const elapsed = Math.min(rawElapsed, OFFLINE_TICK_CAP_SECONDS);
    console.log("[Garden] Load slot", slot, {
      now: now,
      lastTickTimestamp: savedTs,
      rawElapsedSeconds: rawElapsed,
      cappedElapsedSeconds: elapsed,
      hadTimestamp: !!saved.lastTickTimestamp,
      worldCount: saved.worlds ? Object.keys(saved.worlds).length : 0
    });
    const startInv = { ...emptyInventory(), ...(saved.inventory || {}) };
    const result = applyGrowthTicks(saved.worlds || {}, startInv, elapsed, saved.upgrades && saved.upgrades.hull || 1);
    console.log("[Garden] Offline ticks applied:", elapsed, "seconds to", Object.keys(result.worlds).length, "worlds");
    const crew = saved.crew;
    const popouts = [];
    // Offline return (>1 hour).
    if (elapsed > 3600 && crew) {
      const r = pickCrewReaction(crew, "offline_return");
      if (r) popouts.push({ ...r, ts: Date.now() + Math.random() });
    }
    // Cargo cap hit on any resource on load.
    const hullT = (saved.upgrades && saved.upgrades.hull) || 1;
    const cap = cargoCap(hullT);
    let capHit = false;
    for (const k in result.inventory) {
      if (result.inventory[k] >= cap) { capHit = true; break; }
    }
    if (capHit && crew) {
      const r = pickCrewReaction(crew, "cargo_cap");
      if (r) popouts.push({ ...r, ts: Date.now() + Math.random() + 0.1 });
    }
    // Track which systems have been visited (any world with machines or progress).
    const visited = { harbor: true };
    if (saved.currentSystemId) visited[saved.currentSystemId] = true;
    if (result.worlds) {
      for (const pid in result.worlds) {
        const f = findPlanet(pid);
        if (f) visited[f.system.id] = true;
      }
    }
    // Track first paradise.
    let fp = false;
    if (result.worlds) {
      for (const pid in result.worlds) {
        if (result.worlds[pid].stage >= 5) { fp = true; break; }
      }
    }
    const loadedState = {
      screen: "ship",
      activeSlot: slot,
      shipName: saved.shipName,
      crew: crew,
      currentSystemId: saved.currentSystemId || "harbor",
      currentPlanetId: null,
      worlds: result.worlds,
      inventory: result.inventory,
      upgrades: { ...defaultUpgrades(), ...(saved.upgrades || {}) },
      tutorialSeen: saved.tutorialSeen || false,
      stageToast: null,
      placementError: null,
      crewPopoutQueue: popouts,
      visitedSystems: visited,
      firstParadiseSeen: fp,
      shipRoomTiers: saved.shipRoomTiers || defaultShipRoomTiers(),
      totalPlaySeconds: (saved.totalPlaySeconds || 0) + elapsed,
      totalPopoutsFired: saved.totalPopoutsFired || 0
    };
    loadedState.shipRoomTiers = computeShipRoomTiers(loadedState);
    setState(loadedState);
  }
  function handleDeleteSave(slot) {
    if (!confirm("Delete this save? This cannot be undone.")) return;
    deleteSave(slot);
    // If we're viewing the title, force re-render by staying on title
    setState(s => ({ ...s }));
  }
  function finishCreation(shipName, crew) {
    setState(s => ({ ...s, screen: "tutorial", shipName, crew }));
  }
  function finishTutorial() {
    setState(s => ({ ...s, screen: "ship", tutorialSeen: true }));
  }
  function showTutorial() {
    setState(s => ({ ...s, screen: "tutorial" }));
  }
  function goTo(screen) {
    setState(s => ({ ...s, screen }));
  }
  function jumpTo(systemId) {
    setState(s => ({ ...s, currentSystemId: systemId }));
  }
  function enterSystem() {
    setState(s => {
      const isNew = !s.visitedSystems[s.currentSystemId];
      let popouts = s.crewPopoutQueue;
      if (isNew) {
        const r = pickCrewReaction(s.crew, "new_system");
        if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      }
      return {
        ...s,
        screen: "system",
        visitedSystems: { ...s.visitedSystems, [s.currentSystemId]: true },
        crewPopoutQueue: popouts
      };
    });
  }
  function landOnPlanet(planetId) {
    setState(s => {
      const worlds = { ...s.worlds };
      if (!worlds[planetId]) {
        const found = findPlanet(planetId);
        worlds[planetId] = {
          stage: (found && found.planet.stage) || 0,
          progress: 0,
          machines: []
        };
      }
      return { ...s, screen: "surface", currentPlanetId: planetId, worlds };
    });
  }
  function visitWorld(systemId, planetId) {
    setState(s => ({
      ...s,
      screen: "surface",
      currentSystemId: systemId,
      currentPlanetId: planetId
    }));
  }
  function backToSystem() {
    setState(s => ({ ...s, screen: "system", currentPlanetId: null }));
  }
  function placeMachine(planetId, machineType, x, y) {
    setState(s => {
      const worlds = { ...s.worlds };
      const w = { ...(worlds[planetId] || { stage: 0, progress: 0, machines: [] }) };
      if ((w.machines || []).some(m => m.x === x && m.y === y)) return s;
      const isFirstMachine = (w.machines || []).length === 0;
      if (isFirstMachine && w.stage < 5) {
        const limit = hullWorldLimit(s.upgrades.hull);
        if (countActiveWorlds(s.worlds) >= limit) {
          return {
            ...s,
            placementError: "Tending Focus reached — you can only care for so many worlds at once. Upgrade or complete a world to Paradise."
          };
        }
      }
      const machineDef = MACHINES.find(m => m.id === machineType);
      if (machineDef && machineDef.cost && !canAfford(s.inventory, machineDef.cost)) {
        return { ...s, placementError: "Not enough resources to build " + machineDef.name + "." };
      }
      const newInv = machineDef && machineDef.cost ? spend(s.inventory, machineDef.cost) : s.inventory;
      w.machines = [...(w.machines || []), { id: Date.now() + Math.random(), type: machineType, x, y }];
      worlds[planetId] = w;
      // 10th machine trigger.
      let popouts = s.crewPopoutQueue;
      if (w.machines.length === 10) {
        const r = pickCrewReaction(s.crew, "tenth_machine");
        if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      }
      return { ...s, worlds, inventory: newInv, placementError: null, crewPopoutQueue: popouts };
    });
  }
  function deconstructMachine(planetId, machineId) {
    setState(s => {
      const worlds = { ...s.worlds };
      const w = { ...(worlds[planetId] || { stage: 0, progress: 0, machines: [] }) };
      const idx = (w.machines || []).findIndex(m => m.id === machineId);
      if (idx === -1) return s;
      const removed = w.machines[idx];
      const machineDef = MACHINES.find(m => m.id === removed.type);
      const newInv = { ...s.inventory };
      if (machineDef && machineDef.cost) {
        for (const k in machineDef.cost) {
          newInv[k] = (newInv[k] || 0) + Math.floor(machineDef.cost[k] * 0.75);
        }
      }
      w.machines = w.machines.filter((_, i) => i !== idx);
      worlds[planetId] = w;
      // 20% chance deconstruct reaction.
      let popouts = s.crewPopoutQueue;
      if (Math.random() < 0.2) {
        const r = pickAnyCrewReaction(s.crew, "deconstruct");
        if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      }
      return { ...s, worlds, inventory: newInv, placementError: null, crewPopoutQueue: popouts };
    });
  }
  function clearPlacementError() {
    setState(s => (s.placementError ? { ...s, placementError: null } : s));
  }
  function buyUpgrade(trackId) {
    setState(s => {
      const track = UPGRADE_TRACKS.find(t => t.id === trackId);
      if (!track) return s;
      const current = s.upgrades[trackId] || 1;
      if (current >= track.tiers.length) return s;
      const nextTier = track.tiers[current];
      if (!canAfford(s.inventory, nextTier.cost)) return s;
      const newUpgrades = { ...s.upgrades, [trackId]: current + 1 };
      const eventType = "upgrade_" + trackId;
      const r = pickCrewReaction(s.crew, eventType);
      let popouts = s.crewPopoutQueue;
      if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      // Drive unlock: check if new systems became reachable.
      if (trackId === "drive") {
        const oldMax = current >= 5 ? 999 : current;
        const newMax = (current + 1) >= 5 ? 999 : current + 1;
        const oldReach = reachableSystems(s.currentSystemId, oldMax);
        const newReach = reachableSystems(s.currentSystemId, newMax);
        let unlocked = false;
        newReach.forEach((_, k) => { if (!oldReach.has(k)) unlocked = true; });
        if (unlocked) {
          const dr = pickCrewReaction(s.crew, "drive_unlock");
          if (dr) popouts = [...popouts, { ...dr, ts: Date.now() + Math.random() + 0.1 }];
        }
      }
      const ns = {
        ...s,
        inventory: spend(s.inventory, nextTier.cost),
        upgrades: newUpgrades,
        crewPopoutQueue: popouts,
        totalPopoutsFired: (s.totalPopoutsFired || 0) + popouts.length - s.crewPopoutQueue.length
      };
      ns.shipRoomTiers = computeShipRoomTiers(ns);
      return ns;
    });
  }
  function resetGame() {
    if (!confirm("Return to the title screen?")) return;
    setState({
      screen: "title",
      activeSlot: null,
      shipName: "",
      crew: { botanist: null, engineer: null, cartographer: null, cook: null },
      currentSystemId: "harbor",
      currentPlanetId: null,
      worlds: {},
      inventory: emptyInventory(),
      upgrades: defaultUpgrades(),
      tutorialSeen: false,
      stageToast: null,
      placementError: null,
      crewPopoutQueue: [],
      visitedSystems: { harbor: true },
      firstParadiseSeen: false,
      shipRoomTiers: defaultShipRoomTiers(),
      totalPlaySeconds: 0,
      totalPopoutsFired: 0
    });
  }

  if (state.screen === "title") {
    return <TitleScreen onNewGame={startNewGame} onContinue={continueGame} onDelete={handleDeleteSave} />;
  }

  if (state.screen === "creation") {
    return <CharacterCreation onFinish={finishCreation} />;
  }

  if (state.screen === "tutorial") {
    return <Tutorial onFinish={finishTutorial} cartographerName={
      (() => {
        const cId = state.crew && state.crew.cartographer;
        if (!cId) return "The Cartographer";
        const role = CREW_ROLES.find(r => r.id === "cartographer");
        const cand = role && role.candidates.find(c => c.id === cId);
        return cand ? cand.name : "The Cartographer";
      })()
    } />;
  }

  return (
    <div className="app">
      <div className="topbar">
        <h1>GARDEN</h1>
        <span style={{ color: "var(--ink-dim)" }}>— {state.shipName}</span>
        <div className="spacer" />
        <button onClick={() => goTo("ship")}>Ship</button>
        <button onClick={() => goTo("chart")}>Star Chart</button>
        <button onClick={resetGame}>Title Screen</button>
      </div>
      {state.screen === "ship" && (
        <ShipView
          crew={state.crew}
          inventory={state.inventory}
          upgrades={state.upgrades}
          worlds={state.worlds}
          shipRoomTiers={state.shipRoomTiers}
          onBuyUpgrade={buyUpgrade}
          onShowTutorial={showTutorial}
          onBackToTitle={resetGame}
          onVisitWorld={visitWorld}
        />
      )}
      {state.screen === "chart" && (
        <StarChart
          currentSystemId={state.currentSystemId}
          driveTier={state.upgrades.drive || 1}
          worlds={state.worlds}
          onJump={jumpTo}
          onEnter={enterSystem}
        />
      )}
      {state.screen === "system" && (
        <SystemMap
          systemId={state.currentSystemId}
          worlds={state.worlds}
          onBack={() => goTo("chart")}
          onLand={landOnPlanet}
        />
      )}

          planetId={state.currentPlanetId}
          world={state.worlds[state.currentPlanetId]}
          inventory={state.inventory}
          labTier={state.upgrades.lab || 1}
          hullTier={state.upgrades.hull || 1}
          onPlace={placeMachine}
          onDeconstruct={deconstructMachine}
          onBack={backToSystem}
          placementError={state.placementError}
          onClearError={clearPlacementError}
        />
      )}
      {state.stageToast && (
        <div className="stage-toast">
          <div className="stage-note" style={{ fontWeight: "bold", color: "var(--accent)" }}>
            {(() => {
              const f = findPlanet(state.stageToast.planetId);
              const stageName = TERRAFORM_STAGES[state.stageToast.newStage].name;
              return f ? `${f.planet.name} — ${stageName}` : `Stage advanced — ${stageName}`;
            })()}
          </div>
          {state.stageToast.machineHint && (
            <div className="stage-machine-hint">{state.stageToast.machineHint}</div>
          )}
        </div>
      )}
      <CrewPopout queue={state.crewPopoutQueue} onDismiss={dismissPopout} />
      <AdviceButton crew={state.crew} state={state} screen={state.screen} />
    </div>
  );
}

                <button

                  className="crew-pip"

                  title={cand.name}
                >
                  <img src={`./assets/crew/${cand.id}.jpg`} alt={cand.name}
                    onError={(e) => { e.target.parentNode.textContent = cand.name.charAt(0); }} />
                </button>
              ))}
            </div>
          ))}
          {onShowTutorial && (
            <button className="review-tutorial-btn" onClick={onShowTutorial}>Review Tutorial</button>
          )}
          {onBackToTitle && (
            <button className="review-tutorial-btn" style={{ bottom: 30 }} onClick={onBackToTitle}>Switch Save</button>
          )}
        </div>
      )}
      {activeLine && (
        <div className="dialog">
          <div className="speaker">{activeLine.speaker}</div>
          <div className="line">{activeLine.line}</div>
        </div>
      )}
      {activeRoom && (
        <div className="dialog">
          <div className="speaker">{activeRoom.name}</div>
          <div className="line">{activeRoom.desc}</div>

            const atMax = current >= track.tiers.length;

                    <div
                      key={t.tier}
                      className={"tier-pip" + (i < current ? " owned" : "") + (i === current ? " next" : "")}
                    />
                  ))}
                </div>
                {nextTier ? (
                  <>
                    <div className="next-tier">
                      <div className="next-label">Next — Tier {nextTier.tier}: {nextTier.effect}</div>
                      <div className="next-cost">
                        {Object.keys(nextTier.cost).map(k => {
                          const res = SIGNATURE_RESOURCES.find(r => r.id === k);
                          const have = Math.floor((inventory && inventory[k]) || 0);
                          const need = nextTier.cost[k];
                          const ok = have >= need;
                          return (
                            <span key={k} className={"cost-chip" + (ok ? "" : " short")}>
                              {res ? res.name : k}: {have}/{need}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                    <button
                      className="primary"
                      disabled={!affordable}
                      onClick={() => onBuyUpgrade(track.id)}
                    >
                      {affordable ? "Upgrade" : "Not enough resources"}
                    </button>
                  </>
                ) : (
                  <div className="next-label" style={{ color: "var(--accent)" }}>Maxed.</div>
