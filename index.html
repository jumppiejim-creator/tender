  "You and your crew are alone out here. No one else is coming. The galaxy is quiet — your job is to wake it up.",
  "This is your star chart. Each dot is a system. Jump between them using fuel. Upgrading your Drive lets you reach further.",
  "Each system has planets. Land on them to begin terraforming. Every world passes through six stages: Barren, Atmosphere, Hydrosphere, Flora, Fauna, Paradise.",
  "Place machines on a planet's surface to push it toward the next stage. Machines cost resources. Different machines drive different stages.",
  "Machines come in tiers. T1 machines cost only Common Ore — always available, always reliable. T2 and T3 machines cost specialty resources from other planet types, but they're faster. Start with T1, then upgrade as your galaxy grows. Solars speed up terraforming. Silos multiply resource output. A world focused on growth wants Solars; a world focused on harvest wants Silos.",
  "Some machines drive terraforming — push the world to the next stage. Others extract resources directly. Mining Drills pull a world's signature resource at any stage. Harvesters extract faster once a world hits Flora. Balance terraforming speed against resource output.",
  "Most worlds start producing their signature resource at Flora. Rocky worlds are special — they produce Common Ore from the very first stage, so they're your lifeline early on. Frozen worlds produce Cryocrystals. Desert worlds produce Rare Metals. Volcanic worlds produce Geothermal Cores. Toxic worlds produce Catalysts. Oceanic worlds produce Biomatter.",
  "These resources feed each other. You need Cryocrystals to cool volcanic worlds. You need Geothermal Cores to power frozen ones. Tend many worlds to keep them all growing.",
  "Worlds keep growing while you're away — even when the game is closed. Check back and you might find a forest where there was only rock.",
  "Upgrade your ship on the Ship View. Hull lets you manage more worlds. Drive lets you jump further. Lab reveals more about what you find.",
  "There is no ending. There is no failure. Take your time. Whenever you're ready, captain."
];

function Tutorial({ onFinish, cartographerName }) {
  const [slide, setSlide] = useState(0);

  return (
    <div className="tutorial-overlay">
      <button className="tutorial-skip" onClick={onFinish}>Skip</button>
      <div className="tutorial-slide">
        <div className="slide-number">
          {slide + 1} / {TUTORIAL_SLIDES.length}
        </div>
        <div className="slide-text">{TUTORIAL_SLIDES[slide]}</div>
        <div className="tutorial-speaker">— {cartographerName}</div>
      </div>
      <div className="tutorial-nav">
        <button
          disabled={slide === 0}
          onClick={() => setSlide(s => s - 1)}
        >Back</button>
        <div className="dots">
          {TUTORIAL_SLIDES.map((_, i) => (
            <div key={i} className={"dot" + (i === slide ? " active" : "")} />
          ))}
        </div>
        {slide < TUTORIAL_SLIDES.length - 1 ? (
          <button className="primary" onClick={() => setSlide(s => s + 1)}>Next</button>
        ) : (
          <button className="primary" onClick={onFinish}>Begin</button>
        )}
      </div>
    </div>
  );
}

// ---------- Character creation ----------
function CharacterCreation({ onFinish }) {
  const [shipName, setShipName] = useState("");
  const [picks, setPicks] = useState({ botanist: null, engineer: null, cartographer: null, cook: null });

  const allPicked = CREW_ROLES.every(r => picks[r.id]) && shipName.trim().length > 0;

  function pick(roleId, candidateId) {
    setPicks(p => ({ ...p, [roleId]: candidateId }));
  }

  return (
    <div className="creation">
      <h2>Choose your crew</h2>
      <p style={{ color: "var(--ink-dim)" }}>
        Four people. Permanent for the run. In a galaxy with no other intelligent life,
        these are the only voices you'll hear.
      </p>
      {CREW_ROLES.map(role => (
        <div key={role.id} className="role-block">
          <h3>{role.label}</h3>
          <div className="domain">{role.domain}</div>
          <div className="candidates">
            {role.candidates.map(c => (
              <div
                key={c.id}
                className={"candidate" + (picks[role.id] === c.id ? " selected" : "")}
                onClick={() => pick(role.id, c.id)}
              >
                <div className="name">{c.name}</div>
                <div className="blurb">{c.blurb}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div className="ship-name">
        <label htmlFor="shipname">Ship name:</label>
        <input
          id="shipname"
          type="text"
          value={shipName}
          onChange={e => setShipName(e.target.value)}
          placeholder="The…"
        />
      </div>
      <div className="launch-row">
        <button
          className="primary"
          disabled={!allPicked}
          onClick={() => onFinish(shipName.trim(), picks)}
        >
          Launch
        </button>
      </div>
    </div>
  );
}

// ---------- Ship view (dollhouse) ----------
function ShipView({ crew, inventory, upgrades, onBuyUpgrade, onShowTutorial, onBackToTitle }) {
  const [activeLine, setActiveLine] = useState(null);
  const [activeRoom, setActiveRoom] = useState(null);
  const mobile = useIsMobile();

  // Map crew picks back to role + candidate objects, then drop them in default rooms.
  const occupants = {};
  CREW_ROLES.forEach(role => {
    const pickedId = crew[role.id];
    if (!pickedId) return;
    const cand = role.candidates.find(c => c.id === pickedId);
    if (!occupants[role.defaultRoom]) occupants[role.defaultRoom] = [];
    occupants[role.defaultRoom].push({ role, cand });
  });

  function speak(role, cand) {
    setActiveLine({
      speaker: cand.name,
      line: PLACEHOLDER_LINES[role.id] || "\"…\""
    });
    setActiveRoom(null);
  }
  function describe(room) {
    setActiveRoom(room);
    setActiveLine(null);
  }

  return (
    <div className="ship-view">
      {mobile ? (
        <div className="ship-room-cards">
          {SHIP_ROOMS.map(room => {
            const crew = occupants[room.id] || [];
            return (
              <div key={room.id} className="ship-room-card" onClick={() => describe(room)}>
                <div className="card-info">
                  <div className="card-room-name">{room.name}</div>
                  <div className="card-room-desc">{room.desc.slice(0, 60)}…</div>
                </div>
                {crew.map(({ role, cand }) => (
                  <button key={cand.id} className="card-crew-btn"
                    onClick={(e) => { e.stopPropagation(); speak(role, cand); }}>
                    {cand.name}
                  </button>
                ))}
              </div>
            );
          })}
          {onShowTutorial && (
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button style={{ fontSize: 13 }} onClick={onShowTutorial}>Review Tutorial</button>
              {onBackToTitle && <button style={{ fontSize: 13 }} onClick={onBackToTitle}>Switch Save</button>}
            </div>
          )}
        </div>
      ) : (
        <div className="dollhouse">
          {SHIP_ROOMS.map(room => (
            <div
              key={room.id}
              className="room"
              style={room.zone}
              onClick={() => describe(room)}
            >
              <div className="room-name">{room.name}</div>
              {(occupants[room.id] || []).map(({ role, cand }, i) => (
                <button
                  key={cand.id}
                  className="crew-pip"
                  style={{ bottom: 22 + i * 26 }}
                  onClick={(e) => { e.stopPropagation(); speak(role, cand); }}
                >
                  {cand.name}
                </button>
              ))}
            </div>
          ))}
          {onShowTutorial && (
            <button className="review-tutorial-btn" onClick={onShowTutorial}>Review Tutorial</button>
            {onBackToTitle && <button className="review-tutorial-btn" style={{ bottom: 30 }} onClick={onBackToTitle}>Switch Save</button>}
          )}
        </div>
      )}
      {activeLine && (
        <div className="dialog">
          <div className="speaker">{activeLine.speaker}</div>
          <div className="line">{activeLine.line}</div>
        </div>
      )}
      {activeRoom && (
        <div className="dialog">
          <div className="speaker">{activeRoom.name}</div>
          <div className="line">{activeRoom.desc}</div>
        </div>
      )}

      <div className="inventory-panel">
        <h4>Stockpiles</h4>
        <div className="inventory-grid">
          {(() => {
            const cap = cargoCap((upgrades && upgrades.hull) || 1);
            return SIGNATURE_RESOURCES.map(r => {
              const amt = Math.floor((inventory && inventory[r.id]) || 0);
              const atCap = amt >= cap;
              const fromType = PLANET_TYPES.find(t => t.id === r.from);
              const neededBy = [];
              UPGRADE_TRACKS.forEach(tr => {
                tr.tiers.forEach(t => {
                  if (t.cost && t.cost[r.id]) neededBy.push(tr.label + " T" + t.tier);
                });
              });
              MACHINES.forEach(m => {
                if (m.cost && m.cost[r.id]) neededBy.push(m.name);
              });
              const tip = `Produced by: ${fromType ? fromType.name : r.from} worlds (Flora+)\n${r.used_for}\nUsed by: ${neededBy.length ? neededBy.join(", ") : "nothing yet"}`;
              return (
                <div key={r.id} className="inventory-cell" title={tip} style={atCap ? { borderColor: "#8a6a3a" } : {}}>
                  <div
                    className="inventory-swatch"
                    style={{ background: PLANET_COLORS[r.from] || "#888" }}
                  />
                  <div className="inventory-text">
                    <div className="inv-name">{r.name}</div>
                    <div className="inv-from">{fromType ? fromType.name : r.from} worlds</div>
                  </div>
                  <div className="inv-amount" style={atCap ? { color: "var(--ink-dim)" } : {}}>
                    {amt} <span style={{ fontSize: 12, color: "var(--ink-dim)", fontWeight: "normal" }}>/ {cap}</span>
                  </div>
                </div>
              );
            });
          })()}
        </div>
      </div>

      <div className="upgrade-panel">
        <h4>Ship Upgrades</h4>
        <div className="upgrade-tracks">
          {UPGRADE_TRACKS.map(track => {
            const current = (upgrades && upgrades[track.id]) || 1;
            const atMax = current >= track.tiers.length;
            const nextTier = atMax ? null : track.tiers[current];
            const affordable = nextTier && canAfford(inventory || {}, nextTier.cost);
            return (
              <div key={track.id} className="upgrade-track">
                <div className="track-header">
                  <div className="track-label">{track.label}</div>
                  <div className="track-tier">Tier {current} / {track.tiers.length}</div>
                </div>
                <div className="track-desc">{track.desc}</div>
                <div className="track-effect">
                  <strong>Now:</strong> {track.tiers[current - 1].effect}
                </div>
                <div className="tier-ladder">
                  {track.tiers.map((t, i) => (
                    <div
                      key={t.tier}
                      className={"tier-pip" + (i < current ? " owned" : "") + (i === current ? " next" : "")}
                    />
                  ))}
                </div>
                {nextTier ? (
                  <>
                    <div className="next-tier">
                      <div className="next-label">Next — Tier {nextTier.tier}: {nextTier.effect}</div>
                      <div className="next-cost">
                        {Object.keys(nextTier.cost).map(k => {
                          const res = SIGNATURE_RESOURCES.find(r => r.id === k);
                          const have = Math.floor((inventory && inventory[k]) || 0);
                          const need = nextTier.cost[k];
                          const ok = have >= need;
                          return (
                            <span key={k} className={"cost-chip" + (ok ? "" : " short")}>
                              {res ? res.name : k}: {have}/{need}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                    <button
                      className="primary"
                      disabled={!affordable}
                      onClick={() => onBuyUpgrade(track.id)}
                    >
                      {affordable ? "Upgrade" : "Not enough resources"}
                    </button>
                  </>
                ) : (
                  <div className="next-label" style={{ color: "var(--accent)" }}>Maxed.</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ---------- Star chart (18 systems, Drive-gated jumps) ----------
function StarChart({ currentSystemId, driveTier, worlds, onJump, onEnter }) {
  const [selectedId, setSelectedId] = useState(currentSystemId);
  const selected = STUB_SYSTEMS.find(s => s.id === selectedId);
  const mobile = useIsMobile();
  const canvasRef = useRef(null);

  const maxHops = driveTier >= 5 ? 999 : driveTier;
  const reachable = reachableSystems(currentSystemId, maxHops);
  const allDist = allHopDistances(currentSystemId);

  // Mobile pan/zoom state.
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(0.28);
  const touchRef = useRef({ startPan: null, startDist: null, startZoom: null });

  // Auto-center on current system when chart opens on mobile.
  useEffect(() => {
    if (!mobile) return;
    const cur = STUB_SYSTEMS.find(s => s.id === currentSystemId);
    if (!cur) return;
    const vw = window.innerWidth - 16;
    const vh = 400;
    setPan({ x: vw / 2 - cur.x * 0.28, y: vh / 2 - cur.y * 0.28 });
    setZoom(0.28);
  }, [currentSystemId, mobile]);

  function centerOnMe() {
    const cur = STUB_SYSTEMS.find(s => s.id === currentSystemId);
    if (!cur) return;
    const vw = window.innerWidth - 16;
    setPan({ x: vw / 2 - cur.x * zoom, y: 200 - cur.y * zoom });
  }

  function handleTouchStart(e) {
    if (e.touches.length === 1) {
      touchRef.current.startPan = { x: e.touches[0].clientX - pan.x, y: e.touches[0].clientY - pan.y };
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchRef.current.startDist = Math.sqrt(dx * dx + dy * dy);
      touchRef.current.startZoom = zoom;
    }
  }
  function handleTouchMove(e) {
    e.preventDefault();
    if (e.touches.length === 1 && touchRef.current.startPan) {
      setPan({ x: e.touches[0].clientX - touchRef.current.startPan.x, y: e.touches[0].clientY - touchRef.current.startPan.y });
    } else if (e.touches.length === 2 && touchRef.current.startDist) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const newZoom = Math.min(1, Math.max(0.15, touchRef.current.startZoom * (dist / touchRef.current.startDist)));
      setZoom(newZoom);
    }
  }
  function handleTouchEnd() {
    touchRef.current.startPan = null;
    touchRef.current.startDist = null;
  }

  // Build lane lines (deduped).
  const lanes = [];
  const seen = new Set();
  STUB_SYSTEMS.forEach(s => {
    s.connections.forEach(otherId => {
      const key = [s.id, otherId].sort().join("|");
      if (seen.has(key)) return;
      seen.add(key);
      const other = STUB_SYSTEMS.find(o => o.id === otherId);
      if (!other) return;
      const dx = other.x - s.x;
      const dy = other.y - s.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      lanes.push({ key, x: s.x, y: s.y, len, angle });
    });
  });

  const canJump =
    selected &&
    selected.id !== currentSystemId &&
    reachable.has(selected.id);

  const selectedHops = selected && allDist.has(selected.id) ? allDist.get(selected.id) : null;

  const starsAndLanes = (
    <React.Fragment>
      {lanes.map(l => (
        <div
          key={l.key}
          className="lane"
          style={{
            left: l.x + "px",
            top: l.y + "px",
            width: l.len + "px",
            transform: `rotate(${l.angle}deg)`
          }}
        />
      ))}
      {STUB_SYSTEMS.map(s => {
        const isReachable = reachable.has(s.id);
        const isCurrent = s.id === currentSystemId;
        const hops = allDist.has(s.id) ? allDist.get(s.id) : "?";
        const tip = isCurrent ? s.name + " (here)" : s.name + " — " + hops + " hop" + (hops === 1 ? "" : "s");
        return (
          <React.Fragment key={s.id}>
            <div
              className={"system-dot" + (isCurrent ? " current" : "") + (!isReachable && !isCurrent ? " dim" : "")}
              style={{ left: s.x + "px", top: s.y + "px", background: s.star.color }}
              onClick={() => setSelectedId(s.id)}
              title={tip}
            />
            <div
              className="system-label"
              style={{ left: s.x + "px", top: s.y + "px", opacity: isReachable || isCurrent ? 1 : 0.35 }}
            >
              {s.name}
            </div>
          </React.Fragment>
        );
      })}
    </React.Fragment>
  );

  const infoPanel = selected && (
    <div className="system-info" style={mobile ? {} : { width: 1400 }}>
      {mobile && <div style={{ width: 40, height: 4, background: "var(--line)", borderRadius: 2, margin: "0 auto 10px" }} />}
      <h3>
        {selected.name} {selected.id === currentSystemId && <span style={{color:"var(--ink-dim)", fontSize:13}}>— here</span>}
        {selectedHops != null && selectedHops > 0 && (
          <span style={{color: reachable.has(selected.id) ? "var(--ink-dim)" : "#c07070", fontSize: 13, marginLeft: 8}}>
            {selectedHops} hop{selectedHops === 1 ? "" : "s"}{!reachable.has(selected.id) ? " — need Drive T" + selectedHops : ""}
          </span>
        )}
      </h3>
      <div className="desc">{selected.description}</div>
      {(() => {
        const isVisited = selected.id === currentSystemId || selected.planets.some(p => worlds && worlds[p.id]);
        const scanReach = driveTier >= 5 || reachable.has(selected.id);
        const scanTier = isVisited ? 5 : (scanReach ? driveTier : 0);
        if (scanTier === 0) {
          return <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>{selected.planets.length} planet{selected.planets.length === 1 ? "" : "s"} — out of scan range</div>;
        }
        if (scanTier < 2) {
          return <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>{selected.planets.length} planet{selected.planets.length === 1 ? "" : "s"} — upgrade Drive to scan</div>;
        }
        return (
          <div className="planets">
            {scanTier >= 4 && <div style={{ fontSize: 11, color: "var(--ink-dim)", marginBottom: 4 }}>Star: {selected.star.kind}</div>}
            {selected.planets.map(p => {
              const type = PLANET_TYPES.find(t => t.id === p.type);
              const w = worlds && worlds[p.id];
              const stageIdx = w ? w.stage : p.stage;
              const stage = TERRAFORM_STAGES[stageIdx];
              return (
                <div key={p.id} className="planet-line">
                  • {isVisited ? <strong>{p.name}</strong> : null} {type ? type.name : p.type}
                  {scanTier >= 3 && <span style={{ color: "var(--ink-dim)" }}> ({stage.name})</span>}
                </div>
              );
            })}
          </div>
        );
      })()}
      <div className="actions">
        {selected.id === currentSystemId ? (
          <button className="primary" onClick={onEnter}>Enter System</button>
        ) : (
          <button className="primary" disabled={!canJump} onClick={() => onJump(selected.id)}>
            {canJump ? "Jump" : (reachable.has(selected.id) ? "Already here" : "Out of drive range")}
          </button>
        )}
        {mobile && <button onClick={() => setSelectedId(null)}>Dismiss</button>}
      </div>
    </div>
  );

  return (
    <div className="chart">
      {mobile ? (
        <div className="chart-canvas" ref={canvasRef}
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
        >
          <div style={{ position: "absolute", left: 0, top: 0, width: 1400, height: 700, transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: "0 0" }}>
            {starsAndLanes}
          </div>
          <button className="center-btn" onClick={centerOnMe}>⊕ Center</button>
        </div>
      ) : (
        <div className="chart-canvas">
          {starsAndLanes}
        </div>
      )}
      {infoPanel}
    </div>
  );
}

// ---------- System map (top-down orbital view of one system) ----------
function SystemMap({ systemId, worlds, onBack, onLand }) {
  const system = STUB_SYSTEMS.find(s => s.id === systemId);
  const [selectedPlanetId, setSelectedPlanetId] = useState(null);
  const mobile = useIsMobile();
  if (!system) return null;

  const cx = 380, cy = 250;
  const baseRadius = 70;
  const orbitStep = 55;

  // Stable angle per planet: evenly spaced, offset by orbit index for visual variety.
  const laidOut = system.planets.map((p, i) => {
    const n = system.planets.length;
    const radius = baseRadius + p.orbit * orbitStep;
    const angle = ((i * 360 / n) + p.orbit * 37) * Math.PI / 180;
    return {
      ...p,
      radius,
      px: cx + radius * Math.cos(angle),
      py: cy + radius * Math.sin(angle)
    };
  });

  const selected = laidOut.find(p => p.id === selectedPlanetId);
  const selectedType = selected && PLANET_TYPES.find(t => t.id === selected.type);
  const selectedWorld = selected && worlds && worlds[selected.id];
  const selectedStageIdx = selectedWorld ? selectedWorld.stage : (selected ? selected.stage : 0);
  const selectedStage = selected && TERRAFORM_STAGES[selectedStageIdx];

  return (
    <div className="system-map">
      <div className="system-canvas" style={mobile ? { width: "100%", height: 0, paddingBottom: "62.5%", position: "relative", overflow: "hidden" } : {}}>
        <div style={mobile ? { position: "absolute", inset: 0, transform: "scale(" + (Math.min(window.innerWidth - 16, 800) / 800) + ")", transformOrigin: "0 0", width: 800, height: 500 } : {}}>
        {laidOut.map(p => (
          <div
            key={"ring-" + p.id}
            className="orbit-ring"
            style={{
              left: cx + "px",
              top: cy + "px",
              width: (p.radius * 2) + "px",
              height: (p.radius * 2) + "px"
            }}
          />
        ))}
        <div
          className="star-body"
          style={{
            left: cx + "px",
            top: cy + "px",
            background: `radial-gradient(circle at 35% 35%, #fff, ${system.star.color} 60%, #6a4a1a 100%)`
          }}
        />
        <div className="star-label" style={{ left: cx + "px", top: cy + "px" }}>
          {system.star.name} — {system.star.kind}
        </div>
        {laidOut.map(p => (
          <React.Fragment key={p.id}>
            <div
              className={"planet-body" + (p.id === selectedPlanetId ? " selected" : "")}
              style={{
                left: p.px + "px",
                top: p.py + "px",
                background: PLANET_COLORS[p.type] || "#888"
              }}
              onClick={() => setSelectedPlanetId(p.id)}
              title={p.name}
            />
            <div className="planet-label" style={{ left: p.px + "px", top: p.py + "px" }}>
              {p.name}
            </div>
          </React.Fragment>
        ))}
        </div>
      </div>
      <div className="system-info">
        {mobile && <div style={{ width: 40, height: 4, background: "var(--line)", borderRadius: 2, margin: "0 auto 10px" }} />}
        <h3>{system.name} System</h3>
        <div className="desc">{system.description}</div>
        {selected ? (
          <div className="planets">
            <div className="planet-line">
              <strong>{selected.name}</strong> — {selectedType ? selectedType.name : selected.type} ({selectedStage.name})
            </div>
            <div className="desc" style={{ marginTop: 6 }}>
              {selectedType ? selectedType.puzzle : ""}
            </div>
            <div className="desc" style={{ marginTop: 4 }}>
              {selectedStage.desc}
            </div>
            {selectedWorld && (selectedWorld.machines || []).length > 0 && (
              <div className="desc" style={{ marginTop: 6, color: "var(--ink-dim)" }}>
                {selectedWorld.machines.length} machine{selectedWorld.machines.length === 1 ? "" : "s"} placed.
              </div>
            )}
            {(() => {
              const resId = PLANET_TYPE_RESOURCE[selected.type];
              const res = SIGNATURE_RESOURCES.find(r => r.id === resId);
              const isRocky = selected.type === "rocky";
              const rate = selectedWorld && (isRocky
                ? ROCKY_PRODUCTION_PER_STAGE[selectedStageIdx]
                : PRODUCTION_PER_STAGE[selectedStageIdx]);
              return res && (
                <div style={{ marginTop: 8, fontSize: 12, borderTop: "1px solid var(--line)", paddingTop: 8 }}>
                  <div style={{ color: "var(--accent)", fontWeight: "bold", marginBottom: 3 }}>
                    Produces: {res.name}
                  </div>
                  <div style={{ color: "var(--ink-dim)" }}>
                    {isRocky
                      ? `Passive — ${(rate || 0).toFixed(2)}/s (accelerates each stage)`
                      : selectedStageIdx >= 3
                        ? `Passive — ${rate.toFixed(2)}/s (${TERRAFORM_STAGES[selectedStageIdx].name})`
                        : `Passive begins at Flora. Place Mining Drills to extract early.`}
                  </div>
                  <div style={{ color: "var(--ink-dim)", fontSize: 11, marginTop: 2 }}>
                    {res.used_for}
                  </div>
                </div>
              );
            })()}
          </div>
        ) : (
          <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>
            Click a planet to inspect it.
          </div>
        )}
        <div className="actions">
          <button onClick={onBack}>Back to Star Chart</button>
          {selected && (
            <button className="primary" onClick={() => onLand(selected.id)}>Land</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- Planet surface (top-down tile grid, click-to-place machines) ----------
function PlanetSurface({ planetId, world, inventory, labTier, hullTier, onPlace, onDeconstruct, onBack, placementError, onClearError }) {
  const [selectedMachineType, setSelectedMachineType] = useState(null);
  const [inspecting, setInspecting] = useState(null); // { machine, def, x, y }
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [infoExpanded, setInfoExpanded] = useState(false);
  const mobile = useIsMobile();
  const gridCols = mobile ? 8 : SURFACE_GRID_COLS;
  const gridRows = mobile ? 6 : SURFACE_GRID_ROWS;
  const found = findPlanet(planetId);
  if (!found || !world) return null;
  const { planet } = found;
  const planetType = PLANET_TYPES.find(t => t.id === planet.type);
  const stage = world.stage;
  const stageDef = TERRAFORM_STAGES[stage];
  const machines = world.machines || [];
  const pps = calcWorldPps(machines, stage);
  const progress = world.progress || 0;
  const progressPct = stage >= 5 ? 100 : Math.min(100, (progress / STAGE_THRESHOLD) * 100);
  const secondsToNext = (stage >= 5 || pps === 0) ? null : Math.ceil((STAGE_THRESHOLD - progress) / pps);

  const tileUrl = `./assets/tiles/tile-${planet.type}-${stage}.jpg`;

  // Group machines into categories for the sidebar.
  const terraformingMachines = MACHINES.filter(m => m.pps > 0);
  const infrastructureMachines = MACHINES.filter(m => m.stage === "Universal");
  const extractionMachines = MACHINES.filter(m => m.stage === "Extraction");

  // Resolve planet-specific flavor for a machine definition.
  function flavorOf(def) {
    const f = def.typeFlavor && def.typeFlavor[planet.type];
    return f || { name: def.name, desc: def.desc };
  }

  const occupied = new Map();
  machines.forEach(m => occupied.set(m.x + "," + m.y, m));

  function handleTileClick(x, y) {
    const m = occupied.get(x + "," + y);
    if (m) {
      const def = MACHINES.find(md => md.id === m.type);
      setInspecting({ machine: m, def: def, x: x, y: y });
      setSelectedMachineType(null);
      setDrawerOpen(false);
      return;
    }
    setInspecting(null);
    if (!selectedMachineType) {
      if (mobile) setDrawerOpen(true);
      return;
    }
    onPlace(planetId, selectedMachineType, x, y);
    if (mobile) setSelectedMachineType(null);
  }

  const tiles = [];
  for (let y = 0; y < gridRows; y++) {
    for (let x = 0; x < gridCols; x++) {
      const key = x + "," + y;
      const m = occupied.get(key);
      const machineDef = m && MACHINES.find(md => md.id === m.type);
      const pipColor = machineDef && MACHINE_CATEGORY_COLORS[machineDef.stage];
      const isExtraction = machineDef && machineDef.extractionRate;
      const isIdle = machineDef && !isExtraction && machineDef.activeStages.indexOf(stage) === -1 && m.type !== "solar_array";
      const isExtractionIdle = isExtraction && stage < machineDef.extractionMinStage;
      const isInspected = inspecting && inspecting.machine.id === (m && m.id);
      tiles.push(
        <div
          key={key}
          className={"tile" + (m ? " occupied" : "") + (selectedMachineType && !m ? " placing" : "") + (isInspected ? " inspected" : "")}
          onClick={() => handleTileClick(x, y)}
          title={machineDef ? flavorOf(machineDef).name + ((isIdle || isExtractionIdle) ? " (idle)" : "") : ""}
        >
          {m && (
            <div className="machine-pip" style={{ background: pipColor, opacity: (isIdle || isExtractionIdle) ? 0.35 : 1 }} />
          )}
        </div>
      );
    }
  }

  // Silo info for the info panel.
  const siloCount = machines.filter(m => m.type === "storage_silo").length;
  const siloMult = siloCount > 0 ? Math.pow(1.15, siloCount) : 1;

  // Count solars on this planet for sidebar display.
  const solarCount = machines.filter(m => m.type === "solar_array").length;
  const solarBoostPct = Math.round(solarCount * 10);

  // Count active vs idle placed machines (includes extraction).
  const activePlaced = machines.filter(m => {
    const def = MACHINES.find(md => md.id === m.type);
    if (!def) return false;
    if (def.pps > 0 && def.activeStages.indexOf(stage) !== -1) return true;
    if (def.extractionRate && stage >= def.extractionMinStage) return true;
    return false;
  }).length;
  const idlePlaced = machines.filter(m => {
    const def = MACHINES.find(md => md.id === m.type);
    if (!def) return false;
    if (m.type === "solar_array" || m.type === "storage_silo") return false;
    if (def.pps > 0 && def.activeStages.indexOf(stage) === -1) return true;
    if (def.extractionRate && stage < def.extractionMinStage) return true;
    return false;
  }).length;

  function formatTime(sec) {
    if (sec == null) return "—";
    if (sec < 60) return sec + "s";
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + "m " + s + "s";
  }

  // Shared machine option renderer for sidebar and mobile drawer.
  function renderMachineOption(m) {
    const flavor = flavorOf(m);
    const affordable = canAfford(inventory || {}, m.cost);
    const isActive = m.activeStages.indexOf(stage) !== -1;
    const isSilo = m.id === "storage_silo";
    const isSolar = m.id === "solar_array";
    const isExtract = !!m.extractionRate;
    const extractActive = isExtract && stage >= m.extractionMinStage;
    const extractIdle = isExtract && stage < m.extractionMinStage;
    const isIdle = !isExtract && !isActive && !isSilo && !isSolar;
    const stageNames = m.activeStages.map(s => ACTIVE_STAGE_NAMES[s]).filter(Boolean);
    const minStageName = isExtract ? TERRAFORM_STAGES[m.extractionMinStage].name : null;
    return (
      <div
        key={m.id}
        className={
          "machine-option" +
          (selectedMachineType === m.id ? " selected" : "") +
          (!affordable ? " disabled" : "") +
          ((isIdle || extractIdle) ? " idle" : "")
        }
        onClick={() => {
          if (!affordable) return;
          setSelectedMachineType(m.id);
          setInspecting(null);
          if (mobile) setDrawerOpen(false);
        }}
      >
        <div className="pip-sample" style={{ background: MACHINE_CATEGORY_COLORS[m.stage], opacity: (isIdle || extractIdle) ? 0.35 : 1 }} />
        <div>
          <div className="m-name">
            {flavor.name} <span style={{ fontSize: 10, color: "var(--ink-dim)", fontWeight: "normal" }}>T{m.tier}</span>
            {isIdle && <span className="m-idle"> (idle)</span>}
            {isActive && <span className="m-active"> (active)</span>}
            {extractActive && <span className="m-active"> (extracting)</span>}
            {extractIdle && <span className="m-idle"> (needs {minStageName}+)</span>}
          </div>
          <div className="m-desc">{flavor.desc}</div>
          <div className="m-stats">
            {m.pps > 0 ? <span>{m.pps} pts/s</span>
              : isSilo ? <span>×1.15 resource output per silo</span>
              : isSolar ? <span>+10% terraforming speed per solar</span>
              : isExtract ? <span>{m.extractionRate.toFixed(2)}/s {m.extractionMinStage > 0 ? minStageName + "+" : "any stage"}</span>
              : null}
            {stageNames.length > 0 && <span className="m-stages">{stageNames.join(", ")}</span>}
          </div>
          {isSolar && solarCount > 0 && (
            <div style={{ fontSize: 11, color: "var(--accent-soft)", marginTop: 2 }}>
              Currently boosting terraforming machines by +{solarBoostPct}% ({solarCount} Solar{solarCount !== 1 ? "s" : ""} on this planet)
            </div>
          )}
          {isSilo && (
            <div style={{ fontSize: 11, color: siloCount > 0 && stage >= 3 ? "var(--accent-soft)" : "var(--ink-dim)", marginTop: 2 }}>
              {siloCount > 0
                ? stage >= 3
                  ? "Currently multiplying output by " + siloMult.toFixed(2) + "× (" + siloCount + " Silo" + (siloCount > 1 ? "s" : "") + ", active at " + TERRAFORM_STAGES[stage].name + ")"
                  : "Currently multiplying output by " + siloMult.toFixed(2) + "× (" + siloCount + " Silo" + (siloCount > 1 ? "s" : "") + ", not yet active — world is at " + TERRAFORM_STAGES[stage].name + ")"
                : stage >= 3 ? "Place silos to multiply resource output" : "Activates at Flora stage"}
            </div>
          )}
          <div className="m-cost">
            {Object.keys(m.cost).map(k => {
              const res = SIGNATURE_RESOURCES.find(r => r.id === k);
              const have = Math.floor((inventory && inventory[k]) || 0);
              const need = m.cost[k];
              return (
                <span key={k} className={"cost-chip" + (have < need ? " short" : "")}>
                  {res ? res.name : k}: {have}/{need}
                </span>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  const machineGroups = [
    { label: "Terraforming", list: terraformingMachines },
    { label: "Infrastructure", list: infrastructureMachines },
    { label: "Extraction", list: extractionMachines }
  ];

  return (
    <div className="surface">
      {/* Mobile compact info header */}
      {mobile && (
        infoExpanded ? (
          <div className="mobile-info-expanded" onClick={() => setInfoExpanded(false)}>
            <div className="row"><span>Stage</span><strong>{stageDef.name}</strong></div>
            <div className="progress-outer"><div className="progress-inner" style={{ width: progressPct + "%" }} /></div>
            <div className="row"><span>Progress</span><strong>{Math.floor(progress)} / {STAGE_THRESHOLD}</strong></div>
            <div className="row"><span>Points / sec</span><strong>{pps.toFixed(1)}</strong></div>
            <div className="row"><span>Next stage</span><strong>{stage >= 5 ? "—" : (pps === 0 ? "place a machine" : formatTime(secondsToNext))}</strong></div>
            <div style={{ fontSize: 11, color: "var(--ink-dim)", marginTop: 4 }}>Tap to collapse</div>
          </div>
        ) : (
          <div className="mobile-info-header" onClick={() => setInfoExpanded(true)}>
            <div className="mih-row">
              <span className="mih-name">{planet.name}</span>
              <span className="mih-detail">{stageDef.name} — {pps.toFixed(1)} pts/s</span>
            </div>
            <div className="progress-outer" style={{ margin: "4px 0 0" }}><div className="progress-inner" style={{ width: progressPct + "%" }} /></div>
          </div>
        )
      )}

      {/* Desktop sidebar — hidden on mobile via CSS */}
      <div className="surface-sidebar">
        {machineGroups.map(group => (
          <div key={group.label}>
            <h4>{group.label}</h4>
            {group.list.map(renderMachineOption)}
          </div>
        ))}
        <div style={{ color: "var(--ink-dim)", fontSize: 11, marginTop: 10, fontStyle: "italic" }}>
          {selectedMachineType ? "Click an empty tile to place." : "Click a machine to build, or a placed machine to inspect."}
        </div>
      </div>

      <div className="surface-main" style={{ position: "relative" }}>
        <div className="tile-grid" style={{ backgroundImage: `url('${tileUrl}')`, gridTemplateColumns: `repeat(${gridCols}, ${mobile ? "1fr" : "44px"})`, gridTemplateRows: `repeat(${gridRows}, ${mobile ? "1fr" : "44px"})` }}>{tiles}</div>
        {inspecting && inspecting.def && (() => {
          const d = inspecting.def;
          const m = inspecting.machine;
          const isSolar = d.id === "solar_array";
          const isSilo = d.id === "storage_silo";
          const isActive = d.activeStages.indexOf(stage) !== -1;
          const isExtract = !!d.extractionRate;
          const extractActive = isExtract && stage >= d.extractionMinStage;
          const statusLabel = isSolar ? "Infrastructure (boost)" : isSilo ? "Infrastructure (storage)" : isExtract ? (extractActive ? "Extracting" : "Idle (needs " + TERRAFORM_STAGES[d.extractionMinStage].name + "+)") : isActive ? "Active" : "Idle";
          const refund = {};
          if (d.cost) { for (const k in d.cost) refund[k] = Math.floor(d.cost[k] * 0.75); }
          const hasRefund = Object.keys(refund).some(k => refund[k] > 0);
          // Position popup near the clicked tile (desktop); centered on mobile via CSS.
          const popLeft = mobile ? undefined : Math.min(inspecting.x * 46 + 6, 12 * 46 - 230);
          const popTop = mobile ? undefined : inspecting.y * 46 + 52;
          return (
            <div className="deconstruct-popup" style={mobile ? {} : { left: popLeft, top: popTop }}>
              <div className="dp-name">{flavorOf(d).name}</div>
              <div className="dp-status">{statusLabel}</div>
              <div className="dp-refund">
                {hasRefund ? "Refund: " : "No refund."}
                {Object.keys(refund).map(k => {
                  if (refund[k] <= 0) return null;
                  const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
                  return <span key={k} className="chip">{r ? r.name : k}: {refund[k]}</span>;
                })}
              </div>
              <div className="dp-actions">
                <button className="danger" onClick={() => { onDeconstruct(planetId, m.id); setInspecting(null); }}>Deconstruct</button>
                <button onClick={() => setInspecting(null)}>Cancel</button>
              </div>
            </div>
          );
        })()}
        {placementError && (
          <div className="placement-error" onClick={onClearError}>
            {placementError}
            <span className="dismiss">dismiss</span>
          </div>
        )}
        {mobile && selectedMachineType && (
          <div style={{ fontSize: 13, color: "var(--accent)", padding: "4px 0" }}>
            Placing: {(() => { const md = MACHINES.find(mm => mm.id === selectedMachineType); return md ? flavorOf(md).name : selectedMachineType; })()} — tap an empty tile
            <button style={{ marginLeft: 8, fontSize: 11, padding: "2px 8px", minHeight: "auto", minWidth: "auto" }} onClick={() => setSelectedMachineType(null)}>Cancel</button>
          </div>
        )}
        <div style={{ display: "flex", gap: 8 }}>
          {mobile && <button onClick={() => setDrawerOpen(true)}>Build</button>}
          <button onClick={onBack}>Back to System</button>
        </div>
      </div>

      {/* Mobile bottom drawer for machine selection */}
      {mobile && drawerOpen && (
        <React.Fragment>
          <div className="mobile-drawer-overlay" onClick={() => setDrawerOpen(false)} />
          <div className="mobile-drawer">
            <div className="drawer-handle" />
            {machineGroups.map(group => (
              <div key={group.label}>
                <h4>{group.label}</h4>
                {group.list.map(renderMachineOption)}
              </div>
            ))}
          </div>
        </React.Fragment>
      )}

      {/* Desktop info panel — hidden on mobile (replaced by compact header) */}
      {!mobile && <div className="surface-info">
        <h3>{planet.name}</h3>
        <div style={{ color: "var(--ink-dim)", fontStyle: "italic", fontSize: 13, marginBottom: 8 }}>
          {planetType ? planetType.name : planet.type} — {planetType ? planetType.puzzle : ""}
        </div>
        <div className="row"><span>Stage</span><strong>{stageDef.name}</strong></div>
        <div className="progress-outer">
          <div className="progress-inner" style={{ width: progressPct + "%" }} />
        </div>
        <div className="row"><span>Progress</span><strong>{Math.floor(progress)} / {STAGE_THRESHOLD}</strong></div>
        <div className="row"><span>Machines</span><strong>{machines.length} ({activePlaced} active, {idlePlaced} idle)</strong></div>
        <div className="row"><span>Points / sec</span><strong>{pps.toFixed(1)}</strong></div>
        <div className="row">
          <span>Next stage in</span>
          <strong>{stage >= 5 ? "—" : (pps === 0 ? "place a machine" : formatTime(secondsToNext))}</strong>
        </div>
        {(() => {
          const isRocky = planet.type === "rocky";
          const resId = PLANET_TYPE_RESOURCE[planet.type];
          const res = SIGNATURE_RESOURCES.find(r => r.id === resId);
          const resName = res ? res.name : "Common Ore";
          const lp = world.lifetimeProduction || {};
          const lt = labTier || 1;

          // Passive rate.
          let passiveRate = 0;
          let passiveLabel = "";
          if (isRocky) {
            passiveRate = (ROCKY_PRODUCTION_PER_STAGE[stage] || 0) * siloMult;
            passiveLabel = resName + ": +" + passiveRate.toFixed(2) + "/s";
          } else if (stage >= 3 && res) {
            passiveRate = (PRODUCTION_PER_STAGE[stage] || 0) * siloMult;
            passiveLabel = resName + ": +" + passiveRate.toFixed(2) + "/s";
          } else {
            passiveRate = BASE_ORE_TRICKLE;
            passiveLabel = "Common Ore: +" + passiveRate.toFixed(2) + "/s (base trickle)";
          }

          // Extraction rate.
          let extractRate = 0;
          let extractCount = 0;
          machines.forEach(m => {
            const def = MACHINES.find(md => md.id === m.type);
            if (def && def.extractionRate && stage >= def.extractionMinStage) {
              extractRate += def.extractionRate;
              extractCount++;
            }
          });
          const extractTotal = extractRate * siloMult;
          const totalRate = passiveRate + extractTotal;
          const showSiloNote = siloCount > 0 && ((isRocky) || (stage >= 3) || extractCount > 0);

          // Lifetime.
          const lpEntries = Object.keys(lp).filter(k => lp[k] > 0).map(k => {
            const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
            return (r ? r.name : k) + ": " + Math.floor(lp[k]);
          });

          // Lab T2: expected production rate at Flora even if below Flora.
          const floraPreview = lt >= 2 && stage < 3 && res;
          const floraRate = floraPreview ? (isRocky ? ROCKY_PRODUCTION_PER_STAGE[3] : PRODUCTION_PER_STAGE[3]) : 0;

          // Lab T4: efficiency formula.
          const solarMult = 1 + solarCount * 0.10;
          const terraCount = machines.filter(m => { const d = MACHINES.find(md => md.id === m.type); return d && d.pps > 0 && d.activeStages.indexOf(stage) !== -1; }).length;

          // Lab T5: paradise ETA.
          const stagesLeft = Math.max(0, 5 - stage);
          const paradiseSeconds = (pps > 0 && stagesLeft > 0) ? Math.ceil(((STAGE_THRESHOLD - progress) + (stagesLeft - 1) * STAGE_THRESHOLD) / pps) : null;

          return (
            <div style={{ marginTop: 10, paddingTop: 8, borderTop: "1px solid var(--line)" }}>
              <div className="row" style={{ fontWeight: "bold", color: "var(--accent)", marginBottom: 2 }}>
                <span>Production</span>
              </div>
              {lt >= 2 && res && (
                <div className="row" style={{ fontSize: 12 }}><span>Signature: {resName}</span></div>
              )}
              {lt >= 3 ? (
                <React.Fragment>
                  <div className="row" style={{ fontSize: 12 }}><span>Passive: {passiveLabel}</span></div>
                  {extractCount > 0 && (
                    <div className="row" style={{ fontSize: 12 }}>
                      <span>Extraction: {resName}: +{extractTotal.toFixed(2)}/s ({extractCount} machine{extractCount > 1 ? "s" : ""})</span>
                    </div>
                  )}
                  {showSiloNote && (
                    <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)" }}>
                      <span>×{siloMult.toFixed(2)} from {siloCount} silo{siloCount > 1 ? "s" : ""}</span>
                    </div>
                  )}
                </React.Fragment>
              ) : null}
              {(totalRate > 0) && (
                <div className="row" style={{ fontWeight: "bold", fontSize: 12 }}>
                  <span>Total: {resName}: +{totalRate.toFixed(2)}/s</span>
                </div>
              )}
              {floraPreview && (
                <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)" }}>
                  <span>At Flora: {resName} +{floraRate.toFixed(2)}/s (passive)</span>
                </div>
              )}
              {lt >= 4 && terraCount > 0 && (
                <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)" }}>
                  <span>Efficiency: {terraCount} machine{terraCount > 1 ? "s" : ""} × {pps.toFixed(1)} pps × {solarMult.toFixed(2)} solar mult</span>
                </div>
              )}
              {lt >= 5 && stage < 5 && paradiseSeconds && (
                <div className="row" style={{ fontSize: 11, color: "var(--accent-soft)" }}>
                  <span>Paradise ETA: {formatTime(paradiseSeconds)} at current loadout</span>
                </div>
              )}
              {lpEntries.length > 0 && (
                <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)", marginTop: 2 }}>
                  <span>Lifetime: {lpEntries.join(", ")}</span>
                </div>
              )}
            </div>
          );
        })()}
        <div style={{ marginTop: 8, fontSize: 12, color: "var(--ink-dim)" }}>
          {stageDef.desc}
        </div>
      </div>}
    </div>
  );
}

// ---------- Crew popout speech bubble ----------
function CrewPopout({ queue, onDismiss }) {
  const [fading, setFading] = useState(false);
  const current = queue && queue.length > 0 ? queue[0] : null;
  const timerRef = useRef(null);

  useEffect(() => {
    if (!current) return;
    setFading(false);
    timerRef.current = setTimeout(() => {
      setFading(true);
      setTimeout(() => onDismiss(), 400);
    }, 6000);
    return () => { clearTimeout(timerRef.current); };
  }, [current && current.ts]);

  if (!current) return null;

  function handleClick() {
    clearTimeout(timerRef.current);
    setFading(true);
    setTimeout(() => onDismiss(), 200);
  }

  return (
    <div className={"crew-popout" + (fading ? " fading" : "")} onClick={handleClick}>
      <img className="portrait" src={`./assets/crew/${current.candidateId}.jpg`}
        alt={current.name}
        onError={(e) => { e.target.style.display = "none"; }}
      />
      <div className="bubble">
        <div className="speaker-name">{current.name}</div>
        <div className="speaker-line">{current.line}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
