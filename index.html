    if (result.worlds) {
      for (const pid in result.worlds) {
        const f = findPlanet(pid);
        if (f) visited[f.system.id] = true;
      }
    }
    // Track first paradise.
    let fp = false;
    if (result.worlds) {
      for (const pid in result.worlds) {
        if (result.worlds[pid].stage >= 5) { fp = true; break; }
      }
    }
    const loadedState = {
      screen: "ship",
      activeSlot: slot,
      shipName: saved.shipName,
      crew: crew,
      currentSystemId: saved.currentSystemId || "harbor",
      currentPlanetId: null,
      worlds: result.worlds,
      inventory: result.inventory,
      upgrades: { ...defaultUpgrades(), ...(saved.upgrades || {}) },
      tutorialSeen: saved.tutorialSeen || false,
      stageToast: null,
      placementError: null,
      crewPopoutQueue: popouts,
      visitedSystems: visited,
      firstParadiseSeen: fp,
      shipRoomTiers: saved.shipRoomTiers || defaultShipRoomTiers(),
      totalPlaySeconds: (saved.totalPlaySeconds || 0) + elapsed,
      totalPopoutsFired: saved.totalPopoutsFired || 0,
      fragmentsFound: saved.fragmentsFound || [],
      // Active Presence: restore time-limited state with defensive defaults.
      activeBoosts: (saved.activeBoosts || []).filter(b => b && b.expiresAt > Date.now()),
      machineCooldowns: saved.machineCooldowns || {},
      weather: saved.weather && saved.weather.endsAt > Date.now() ? saved.weather : null,
      pendingOfflineReport: null, // set below if offline delta captured
      floaters: []
    };
    // Build offline return report if the player was away long enough to notice.
    if (rawElapsed > 60 && result.deltas) {
      loadedState.pendingOfflineReport = {
        elapsedSeconds: rawElapsed,
        effectiveSeconds: Math.round(elapsed * PRESENCE_AWAY),
        cappedAtOffline: rawElapsed > OFFLINE_TICK_CAP_SECONDS,
        worldDeltas: result.deltas.filter(d => d.stageAfter !== d.stageBefore || (d.progressAfter - d.progressBefore) > 0.5),
        resourceDeltas: result.resourceDeltas || {},
        cappedResources: result.cappedResources || []
      };
    }
    loadedState.shipRoomTiers = computeShipRoomTiers(loadedState);
    setState(loadedState);
    }
    // If signed in, fetch cloud save and merge before loading.
    if (getFirebaseUser()) {
      cloudLoadSave(slot).then(cloudData => {
        const localData = loadSave(slot);
        const merged = mergeSlot(slot, localData, cloudData);
        doLoad(merged);
      }).catch(() => doLoad(loadSave(slot)));
    } else {
      doLoad(loadSave(slot));
    }
  }
  function handleDeleteSave(slot) {
    if (!confirm("Delete this save? This cannot be undone.")) return;
    deleteSave(slot);
    // If we're viewing the title, force re-render by staying on title
    setState(s => ({ ...s }));
  }
  function finishCreation(shipName, crew) {
    setState(s => ({ ...s, screen: "tutorial", shipName, crew }));
  }
  function finishTutorial() {
    setState(s => ({ ...s, screen: "ship", tutorialSeen: true }));
  }
  function showTutorial() {
    setState(s => ({ ...s, screen: "tutorial" }));
  }
  function goTo(screen) {
    setState(s => ({ ...s, screen }));
  }
  function jumpTo(systemId) {
    setState(s => ({ ...s, currentSystemId: systemId }));
  }
  function enterSystem() {
    setState(s => {
      const isNew = !s.visitedSystems[s.currentSystemId];
      let popouts = s.crewPopoutQueue;
      if (isNew) {
        const r = pickCrewReaction(s.crew, "new_system");
        if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      }
      return {
        ...s,
        screen: "system",
        visitedSystems: { ...s.visitedSystems, [s.currentSystemId]: true },
        crewPopoutQueue: popouts
      };
    });
  }
  function landOnPlanet(planetId) {
    setState(s => {
      const worlds = { ...s.worlds };
      if (!worlds[planetId]) {
        const found = findPlanet(planetId);
        worlds[planetId] = {
          stage: (found && found.planet.stage) || 0,
          progress: 0,
          machines: []
        };
      }
      return { ...s, screen: "surface", currentPlanetId: planetId, worlds };
    });
  }
  function visitWorld(systemId, planetId) {
    setState(s => ({
      ...s,
      screen: "surface",
      currentSystemId: systemId,
      currentPlanetId: planetId
    }));
  }
  function backToSystem() {
    setState(s => ({ ...s, screen: "system", currentPlanetId: null }));
  }
  function placeMachine(planetId, machineType, x, y) {
    setState(s => {
      const worlds = { ...s.worlds };
      const w = { ...(worlds[planetId] || { stage: 0, progress: 0, machines: [] }) };
      if ((w.machines || []).some(m => m.x === x && m.y === y)) return s;
      const isFirstMachine = (w.machines || []).length === 0;
      if (isFirstMachine && w.stage < 5) {
        const limit = hullWorldLimit(s.upgrades.hull);
        if (countActiveWorlds(s.worlds) >= limit) {
          return {
            ...s,
            placementError: "Tending Focus reached — you can only care for so many worlds at once. Upgrade or complete a world to Paradise."
          };
        }
      }
      const machineDef = MACHINES.find(m => m.id === machineType);
      if (machineDef && machineDef.cost && !canAfford(s.inventory, machineDef.cost)) {
        return { ...s, placementError: "Not enough resources to build " + machineDef.name + "." };
      }
      const newInv = machineDef && machineDef.cost ? spend(s.inventory, machineDef.cost) : s.inventory;
      w.machines = [...(w.machines || []), { id: Date.now() + Math.random(), type: machineType, x, y }];
      worlds[planetId] = w;
      // 10th machine trigger.
      let popouts = s.crewPopoutQueue;
      if (w.machines.length === 10) {
        const r = pickCrewReaction(s.crew, "tenth_machine");
        if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      }
      return { ...s, worlds, inventory: newInv, placementError: null, crewPopoutQueue: popouts };
    });
  }
  function deconstructMachine(planetId, machineId) {
    setState(s => {
      const worlds = { ...s.worlds };
      const w = { ...(worlds[planetId] || { stage: 0, progress: 0, machines: [] }) };
      const idx = (w.machines || []).findIndex(m => m.id === machineId);
      if (idx === -1) return s;
      const removed = w.machines[idx];
      const machineDef = MACHINES.find(m => m.id === removed.type);
      const newInv = { ...s.inventory };
      if (machineDef && machineDef.cost) {
        for (const k in machineDef.cost) {
          newInv[k] = (newInv[k] || 0) + Math.floor(machineDef.cost[k] * 0.75);
        }
      }
      w.machines = w.machines.filter((_, i) => i !== idx);
      worlds[planetId] = w;
      // 20% chance deconstruct reaction.
      let popouts = s.crewPopoutQueue;
      if (Math.random() < 0.2) {
        const r = pickAnyCrewReaction(s.crew, "deconstruct");
        if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      }
      return { ...s, worlds, inventory: newInv, placementError: null, crewPopoutQueue: popouts };
    });
  }
  function clearPlacementError() {
    setState(s => (s.placementError ? { ...s, placementError: null } : s));
  }
  // Active Presence: burst harvest an active extractor. Grants HARVEST_WINDOW_S seconds of output,
  // puts that machine on HARVEST_COOLDOWN_S cooldown, and spawns a +N floater on its tile.
  function harvestMachine(planetId, machine) {
    setState(s => {
      const world = s.worlds[planetId];
      if (!world) return s;
      const found = findPlanet(planetId);
      if (!found) return s;
      const resId = PLANET_TYPE_RESOURCE[found.planet.type];
      if (!resId) return s;
      const cooldowns = s.machineCooldowns || {};
      const now = Date.now();
      if ((cooldowns[machine.id] || 0) > now) return s; // still cooling down
      // Use same math as the passive tick (presence 1.0 since we are on-surface, with boosts).
      const mult = getEffectiveMultipliers(
        { screen: "surface", currentPlanetId: planetId, activeBoosts: s.activeBoosts || [], weather: s.weather || null },
        { id: planetId, type: found.planet.type }
      );
      const ratePerSec = calcMachineExtractionRate({ ...world, id: planetId }, machine, s.worlds, mult);
      const drop = ratePerSec * HARVEST_WINDOW_S;
      if (drop <= 0) return s;
      const newInv = { ...s.inventory };
      const cap = cargoCap(s.upgrades.hull || 1);
      newInv[resId] = Math.min((newInv[resId] || 0) + drop, cap);
      const newCooldowns = { ...cooldowns, [machine.id]: now + HARVEST_COOLDOWN_S * 1000 };
      const resDef = SIGNATURE_RESOURCES.find(r => r.id === resId);
      const resName = resDef ? resDef.name : resId;
      const floaters = [...(s.floaters || []), {
        id: "f" + now + "_" + Math.random().toString(36).slice(2, 6),
        text: "+" + (drop >= 1 ? Math.floor(drop) : drop.toFixed(1)) + " " + resName,
        color: "#6fbf73",
        x: machine.x,
        y: machine.y,
        ts: now
      }];
      return { ...s, inventory: newInv, machineCooldowns: newCooldowns, floaters: floaters };
    });
  }
  function removeFloater(id) {
    setState(s => ({ ...s, floaters: (s.floaters || []).filter(f => f.id !== id) }));
  }
  function buyUpgrade(trackId) {
    setState(s => {
      const track = UPGRADE_TRACKS.find(t => t.id === trackId);
      if (!track) return s;
      const current = s.upgrades[trackId] || 1;
      if (current >= track.tiers.length) return s;
      const nextTier = track.tiers[current];
      if (!canAfford(s.inventory, nextTier.cost)) return s;
      const newUpgrades = { ...s.upgrades, [trackId]: current + 1 };
      const eventType = "upgrade_" + trackId;
      const r = pickCrewReaction(s.crew, eventType);
      let popouts = s.crewPopoutQueue;
      if (r) popouts = [...popouts, { ...r, ts: Date.now() + Math.random() }];
      // Drive unlock: check if new systems became reachable.
      if (trackId === "drive") {
        const oldMax = current >= 5 ? 999 : current;
        const newMax = (current + 1) >= 5 ? 999 : current + 1;
        const oldReach = reachableSystems(s.currentSystemId, oldMax);
        const newReach = reachableSystems(s.currentSystemId, newMax);
        let unlocked = false;
        newReach.forEach((_, k) => { if (!oldReach.has(k)) unlocked = true; });
        if (unlocked) {
          const dr = pickCrewReaction(s.crew, "drive_unlock");
          if (dr) popouts = [...popouts, { ...dr, ts: Date.now() + Math.random() + 0.1 }];
        }
      }
      const ns = {
        ...s,
        inventory: spend(s.inventory, nextTier.cost),
        upgrades: newUpgrades,
        crewPopoutQueue: popouts,
        totalPopoutsFired: (s.totalPopoutsFired || 0) + popouts.length - s.crewPopoutQueue.length
      };
      ns.shipRoomTiers = computeShipRoomTiers(ns);
      return ns;
    });
  }
  function resetGame() {
    if (!confirm("Return to the title screen?")) return;
    setState({
      screen: "title",
      activeSlot: null,
      shipName: "",
      crew: { botanist: null, engineer: null, cartographer: null, cook: null },
      currentSystemId: "harbor",
      currentPlanetId: null,
      worlds: {},
      inventory: emptyInventory(),
      upgrades: defaultUpgrades(),
      tutorialSeen: false,
      stageToast: null,
      placementError: null,
      crewPopoutQueue: [],
      visitedSystems: { harbor: true },
      firstParadiseSeen: false,
      shipRoomTiers: defaultShipRoomTiers(),
      totalPlaySeconds: 0,
      totalPopoutsFired: 0,
      fragmentsFound: []
    });
  }

  if (state.screen === "title") {
    return <TitleScreen onNewGame={startNewGame} onContinue={continueGame} onDelete={handleDeleteSave}
      firebaseUser={firebaseUser} onSignIn={signInWithGoogle} onSignOut={signOut} cloudSyncStatus={cloudSyncStatus} />;
  }

  if (state.screen === "creation") {
    return <CharacterCreation onFinish={finishCreation} />;
  }

  if (state.screen === "tutorial") {
    return <Tutorial onFinish={finishTutorial} cartographerName={
      (() => {
        const cId = state.crew && state.crew.cartographer;
        if (!cId) return "The Cartographer";
        const role = CREW_ROLES.find(r => r.id === "cartographer");
        const cand = role && role.candidates.find(c => c.id === cId);
        return cand ? cand.name : "The Cartographer";
      })()
    } />;
  }

  return (
    <div className="app">
      <div className="topbar">
        <h1>GARDEN</h1>
        <span style={{ color: "var(--ink-dim)" }}>— {state.shipName}{(state.fragmentsFound || []).length >= 10 ? " — Second Tender" : ""}</span>
        <div className="spacer" />
        <button onClick={() => goTo("ship")}>Ship</button>
        <button onClick={() => goTo("chart")}>Star Chart</button>
        <button onClick={resetGame}>Title Screen</button>
      </div>
      {state.screen === "ship" && (
        <ShipView
          crew={state.crew}
          inventory={state.inventory}
          upgrades={state.upgrades}
          worlds={state.worlds}
          shipRoomTiers={state.shipRoomTiers}
          fragmentsFound={state.fragmentsFound}
          onBuyUpgrade={buyUpgrade}
          onShowTutorial={showTutorial}
          onBackToTitle={resetGame}
          onVisitWorld={visitWorld}
        />
      )}
      {state.screen === "chart" && (
        <StarChart
          currentSystemId={state.currentSystemId}
          driveTier={state.upgrades.drive || 1}
          labTier={state.upgrades.lab || 1}
          worlds={state.worlds}
          onJump={jumpTo}
          onEnter={enterSystem}
        />
      )}
      {state.screen === "system" && (
        <SystemMap
          systemId={state.currentSystemId}
          worlds={state.worlds}
          labTier={state.upgrades.lab || 1}
          onBack={() => goTo("chart")}
          onLand={landOnPlanet}
        />
      )}
      {state.screen === "surface" && state.currentPlanetId && (
        <PlanetSurface
          planetId={state.currentPlanetId}
          world={state.worlds[state.currentPlanetId]}
          worlds={state.worlds}
          inventory={state.inventory}
          labTier={state.upgrades.lab || 1}
          hullTier={state.upgrades.hull || 1}
          onPlace={placeMachine}
          onDeconstruct={deconstructMachine}
          onHarvest={harvestMachine}
          onBack={backToSystem}
          placementError={state.placementError}
          onClearError={clearPlacementError}
          activeBoosts={state.activeBoosts || []}
          weather={state.weather}
          machineCooldowns={state.machineCooldowns || {}}
          floaters={state.floaters || []}
          onFloaterExpire={removeFloater}
        />
      )}
      {state.stageToast && (
        <div className="stage-toast">
          <div className="stage-note" style={{ fontWeight: "bold", color: "var(--accent)" }}>
            {(() => {
              const f = findPlanet(state.stageToast.planetId);
              const stageName = TERRAFORM_STAGES[state.stageToast.newStage].name;
              return f ? `${f.planet.name} — ${stageName}` : `Stage advanced — ${stageName}`;
            })()}
          </div>
          {state.stageToast.machineHint && (
            <div className="stage-machine-hint">{state.stageToast.machineHint}</div>
          )}
        </div>
      )}
      <CrewPopout queue={state.crewPopoutQueue} onDismiss={dismissPopout} onAction={handleCrewTaskAction} />
      <AdviceButton crew={state.crew} state={state} screen={state.screen} />
      {state.pendingOfflineReport && (
        <OfflineReturnReport
          report={state.pendingOfflineReport}
          worlds={state.worlds}
          onContinue={() => setState(s => ({ ...s, pendingOfflineReport: null }))}
        />
      )}
    </div>
  );
}

    setSlots(getSaveSlots());
  }

    <div className="title-screen">
      <h1>THE GARDEN OF THE STARS</h1>
      <div className="title-tagline">Tend a galaxy you didn't plant.</div>

        {slots.map(s => (

                  <button className="slot-delete" onClick={() => handleDelete(s.slot)}>Delete</button>

            <div style={{ fontSize: 13, color: "var(--ink-dim)" }}>

            </div>
          ) : (
            <button onClick={onSignIn} style={{ fontSize: 14, padding: "10px 20px" }}>
              Sign in with Google — sync across devices
            </button>
          )}
        </div>
      )}
    </div>
  );
}

  "Machines come in tiers. T1 machines cost only Common Ore — always available, always reliable. T2 and T3 machines cost specialty resources from other planet types, but they're faster. Start with T1, then upgrade as your galaxy grows. Solar Arrays and Storage Silos boost nearby machines — place them next to the machines you want to enhance. Clustering matters.",
  "Some machines drive terraforming — push the world to the next stage. Others extract resources directly. Mining Drills pull a world's signature resource at any stage. Harvesters extract faster once a world hits Flora. Balance terraforming speed against resource output.",

  "Your crew works best when you're with them. Worlds you're visiting terraform at full speed. Worlds you're away from slow to a trickle. Check in on your worlds, tend them actively, and let the others rest.",

function Tutorial({ onFinish, cartographerName }) {
  const [slide, setSlide] = useState(0);

  return (
    <div className="tutorial-overlay">
      <button className="tutorial-skip" onClick={onFinish}>Skip</button>

        <div className="slide-number">
          {slide + 1} / {TUTORIAL_SLIDES.length}

        <button

        {slide < TUTORIAL_SLIDES.length - 1 ? (

// ---------- Character creation ----------

        <div key={role.id} className="role-block">

      <div className="ship-name">
        <label htmlFor="shipname">Ship name:</label>

        <button
          className="primary"

          onClick={() => onFinish(shipName.trim(), picks)}
