<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>The Garden of the Stars</title>
<link rel="manifest" href="./manifest.json" />
<link rel="icon" type="image/png" href="./icon.png" />
<link rel="apple-touch-icon" href="./icon.png" />
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./game-data.js"></script>
<style>
  :root {
    --bg: #0b0f1a;
    --bg-soft: #141a2b;
    --bg-soft-2: #1c2338;
    --ink: #e8ecf5;
    --ink-dim: #9aa3bd;
    --accent: #f4c46d;
    --accent-soft: #c6a55a;
    --line: #2a3350;
  }
  * { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  }
  button {
    font-family: inherit;
    background: var(--bg-soft-2);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #1a1408;
    border-color: var(--accent);
    font-weight: bold;
  }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  input[type="text"] {
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 16px;
  }

  .app { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .topbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
  }
  .topbar h1 { margin: 0; font-size: 20px; letter-spacing: 2px; color: var(--accent); }
  .topbar .spacer { flex: 1; }

  /* Character creation */
  .creation { padding: 30px; max-width: 1100px; margin: 0 auto; }
  .creation h2 { color: var(--accent); margin-top: 0; }
  .role-block { margin-bottom: 24px; }
  .role-block h3 { margin: 0 0 4px 0; }
  .role-block .domain { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .candidates { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .candidate {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 16px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .candidate:hover { border-color: var(--accent-soft); }
  .candidate.selected {
    border-color: var(--accent);
    background: var(--bg-soft-2);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .candidate .portrait {
    width: 120px; height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--line);
    margin-bottom: 10px;
    background: var(--bg-soft-2);
  }
  .candidate.selected .portrait { border-color: var(--accent); }
  .candidate .name { font-weight: bold; margin-bottom: 4px; }
  .candidate .blurb { font-size: 13px; color: var(--ink-dim); }
  .ship-name { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .launch-row { display: flex; justify-content: flex-end; }

  /* Ship view */
  .ship-view { padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .dollhouse {
    width: 1024px; max-width: 100%;
    height: 600px;
    background: url('./assets/ship-interior.jpg') center/cover no-repeat;
    border: 1px solid var(--line);
    border-radius: 6px;
    position: relative;
  }
  .room {
    position: absolute;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  .room:hover {
    border-color: var(--accent-soft);
    background: rgba(244,196,109,0.08);
  }
  .room .room-name {
    position: absolute;
    bottom: 4px; left: 6px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 6px #000, 0 0 3px #000;
    pointer-events: none;
  }
  .room .crew-pip {
    position: absolute;
    bottom: 22px;
    right: 6px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    background: var(--bg-soft-2);
    font-size: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .room .crew-pip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .room .crew-pip:hover { border-color: #fff; box-shadow: 0 0 12px rgba(244,196,109,0.5); }

  .dialog {
    margin-top: 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    max-width: 1024px;
    width: 100%;
    border-radius: 4px;
  }
  .dialog .speaker { color: var(--accent); font-weight: bold; }
  .dialog .line { font-style: italic; margin-top: 4px; color: var(--ink); }

  /* Star chart */
  .chart {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-canvas {
    width: 1400px; height: 700px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
  }
  .system-dot {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 12px rgba(244,196,109,0.4);
  }
  .system-dot.current {
    background: #fff;
    box-shadow: 0 0 18px rgba(255,255,255,0.6);
  }
  .system-dot.dim {
    opacity: 0.3;
    box-shadow: none;
  }
  .system-label {
    position: absolute;
    transform: translate(-50%, 14px);
    color: var(--ink);
    font-size: 12px;
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .lane {
    position: absolute;
    height: 1px;
    background: linear-gradient(to right, rgba(244,196,109,0.0), rgba(244,196,109,0.5), rgba(244,196,109,0.0));
    transform-origin: 0 0;
    pointer-events: none;
  }
  .system-info {
    margin-top: 14px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 12px 16px;
    width: 1400px;
    border-radius: 4px;
  }
  .system-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .system-info .desc { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .system-info .planets { font-size: 13px; }
  .system-info .planet-line { padding: 2px 0; }
  .system-info .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

  /* System map */
  .system-map {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .system-canvas {
    width: 800px; height: 500px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
    overflow: hidden;
  }
  .orbit-ring {
    position: absolute;
    border: 1px dashed rgba(244,196,109,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .star-body {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 40px 8px rgba(244,196,109,0.35);
  }
  .star-label {
    position: absolute;
    transform: translate(-50%, 34px);
    font-size: 12px;
    color: var(--ink-dim);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .planet-body {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(0,0,0,0.6);
  }
  .planet-body.selected {
    box-shadow: 0 0 0 2px var(--accent), 0 0 12px rgba(244,196,109,0.6);
  }
  .planet-label {
    position: absolute;
    transform: translate(-50%, 16px);
    font-size: 11px;
    color: var(--ink);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }

  /* Planet surface */
  .surface {
    padding: 20px;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .surface-main { display: flex; flex-direction: column; gap: 12px; }
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(12, 44px);
    grid-template-rows: repeat(8, 44px);
    gap: 2px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background-size: cover;
    background-position: center;
  }
  .tile {
    width: 44px; height: 44px;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    border: 1px solid rgba(255,255,255,0.12);
    transition: background 0.15s;
    background: transparent;
  }
  .tile:hover { filter: brightness(1.2); }
  .tile.placing:hover { box-shadow: inset 0 0 0 2px var(--accent); }
  .tile.occupied { cursor: pointer; }
  .tile.inspected { box-shadow: inset 0 0 0 2px var(--accent); }
  .machine-pip {
    position: absolute;
    left: 50%; top: 50%;
    width: 34px; height: 34px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 3px solid var(--pip-color, #888);
    background: rgba(11,15,26,0.7);
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow 0.3s;
  }
  .machine-pip .pip-icon {
    width: 26px; height: 26px;
    display: block;
    color: #fff;
    line-height: 0;
  }
  .machine-pip .pip-icon svg { width: 100%; height: 100%; display: block; }
  .machine-pip.active-glow {
    animation: pip-glow 2s ease-in-out infinite alternate;
  }
  @keyframes pip-glow {
    from { box-shadow: 0 0 4px rgba(244,196,109,0.3); }
    to { box-shadow: 0 0 12px rgba(244,196,109,0.7); }
  }
  .surface-sidebar {
    width: 260px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px;
  }
  .surface-sidebar h4 { margin: 12px 0 8px 0; color: var(--accent); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
  .surface-sidebar > div:first-child h4 { margin-top: 0; }
  .machine-option {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .machine-option:hover { border-color: var(--accent-soft); }
  .machine-option.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .machine-option .pip-sample {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .machine-option.disabled { opacity: 0.45; cursor: not-allowed; }
  .machine-option.idle { opacity: 0.55; }
  .machine-option .m-name { font-size: 13px; font-weight: bold; }
  .machine-option .m-idle { font-weight: normal; font-size: 11px; color: #c07070; }
  .machine-option .m-active { font-weight: normal; font-size: 11px; color: #6fbf73; }
  .machine-option .m-desc { font-size: 11px; color: var(--ink-dim); }
  .machine-option .m-stats { font-size: 11px; color: var(--ink-dim); margin-top: 2px; display: flex; gap: 8px; }
  .machine-option .m-stages { font-style: italic; }
  .machine-option .m-cost { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .surface-info {
    width: 280px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .surface-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .surface-info .row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--ink-dim); }
  .surface-info .row strong { color: var(--ink); }

  /* Graduated Paradise surface — finished garden, no grid */
  .paradise-surface {
    padding: 20px;
    display: block;
  }
  .paradise-stage {
    position: relative;
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
  }
  .paradise-landscape {
    width: 100%;
    aspect-ratio: 16 / 9;
    background-size: cover;
    background-position: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.55);
  }
  .paradise-info {
    position: absolute;
    top: 16px;
    left: 16px;
    max-width: 340px;
    background: rgba(11,15,26,0.82);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 16px;
    backdrop-filter: blur(4px);
  }
  .paradise-info h3 { margin: 0 0 2px 0; color: var(--accent); }
  .paradise-info .row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; gap: 12px; color: var(--ink-dim); }
  .paradise-info .row strong { color: var(--ink); }
  .paradise-type {
    color: var(--ink-dim);
    font-style: italic;
    font-size: 13px;
  }
  .paradise-tagline {
    color: var(--accent-soft);
    font-style: italic;
    font-size: 13px;
    margin: 6px 0 10px 0;
  }
  .paradise-actions {
    position: absolute;
    bottom: 16px;
    left: 16px;
  }
  .progress-outer {
    height: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    margin: 6px 0;
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(to right, #6fbf73, #a8d8f0);
    transition: width 0.4s;
  }
  .stage-toast {
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    padding: 14px 22px;
    border-radius: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    z-index: 100;
    max-width: 520px;
  }
  .stage-toast .stage-note { font-size: 13px; color: var(--ink-dim); }
  .stage-toast .stage-machine-hint { margin-top: 8px; font-size: 12px; color: var(--accent-soft); border-top: 1px solid var(--line); padding-top: 8px; }

  .deconstruct-popup {
    position: absolute;
    z-index: 50;
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 12px 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    min-width: 220px;
    font-size: 13px;
  }
  .deconstruct-popup .dp-name { font-weight: bold; color: var(--accent); margin-bottom: 2px; }
  .deconstruct-popup .dp-status { font-size: 11px; color: var(--ink-dim); margin-bottom: 6px; }
  .deconstruct-popup .dp-refund { font-size: 12px; color: var(--ink-dim); margin-bottom: 8px; }
  .deconstruct-popup .dp-refund .chip { display: inline-block; background: var(--bg-soft-2); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; margin: 1px 2px; font-size: 11px; }
  .deconstruct-popup .dp-actions { display: flex; gap: 8px; }
  .deconstruct-popup .dp-actions button { font-size: 12px; padding: 4px 10px; }
  .deconstruct-popup .dp-actions .danger { background: #8a3a3a; color: #f5d0c0; border: 1px solid #c95a3a; }
  .deconstruct-popup .dp-actions .danger:hover { background: #a04a4a; }
  .deconstruct-popup .dp-actions .harvest { background: #3a6a3a; color: #d0f0d0; border: 1px solid #6fbf73; }
  .deconstruct-popup .dp-actions .harvest:hover { background: #4a7a4a; }

  /* Active Presence — harvest cooldown ring on the machine pip. */
  .harvest-cooldown-ring {
    position: absolute;
    inset: -4px;
    pointer-events: none;
    opacity: 0.85;
  }
  .harvest-cooldown-ring circle {
    fill: none;
    stroke: rgba(255,255,255,0.35);
    stroke-width: 3;
    transform-origin: center;
    transform: rotate(-90deg);
  }

  /* Floater "+N resource" rise/fade animations above the tile grid. */
  .surface-floater-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 40;
  }
  .surface-floater {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 13px;
    font-weight: bold;
    text-shadow: 0 1px 3px rgba(0,0,0,0.85), 0 0 6px rgba(0,0,0,0.6);
    animation: floater-rise 1.6s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes floater-rise {
    0%   { opacity: 0; transform: translate(-50%, -30%) scale(0.9); }
    15%  { opacity: 1; transform: translate(-50%, -60%) scale(1.0); }
    100% { opacity: 0; transform: translate(-50%, -140%) scale(1.0); }
  }

  /* Crew popout — action button variant for interactive crew tasks. */
  .crew-popout .bubble .crew-action-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    background: var(--accent);
    color: #1a1208;
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-weight: bold;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .crew-popout .bubble .crew-action-btn:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
  .crew-popout .bubble .crew-reward-note { margin-top: 4px; font-size: 10px; color: var(--ink-dim); font-style: italic; }
  /* Expiring state — last few seconds of a crew task. Text dims, button telegraphs missed window. */
  .crew-popout .bubble .speaker-line.expiring { opacity: 0.55; transition: opacity 0.6s ease; }
  .crew-popout .bubble .crew-action-btn.expiring,
  .crew-popout .bubble .crew-action-btn.expiring:hover {
    background: var(--bg-soft-2);
    color: var(--ink-dim);
    border: 1px solid var(--line);
    font-weight: normal;
    font-style: italic;
    cursor: default;
    opacity: 0.8;
  }

  /* Weather banner — top of surface view during an active event. */
  .weather-banner {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    background: rgba(20,26,43,0.92);
    border: 1px solid var(--accent-soft);
    border-radius: 6px;
    padding: 8px 16px;
    z-index: 45;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 12px;
    max-width: 560px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.6);
  }
  .weather-banner .wx-name { font-weight: bold; color: var(--accent); font-size: 13px; }
  .weather-banner .wx-desc { color: var(--ink-dim); }
  .weather-banner .wx-bonus { color: #6fbf73; font-weight: bold; }
  .weather-banner .wx-remaining { color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  /* Weather tile overlay tints. Kept subtle so the underlying tile art reads. */
  .tile-grid.wx-aurora   { box-shadow: inset 0 0 120px rgba(110,200,180,0.25); transition: box-shadow 0.8s; }
  .tile-grid.wx-melt     { box-shadow: inset 0 0 120px rgba(150,180,230,0.25); transition: box-shadow 0.8s; }
  .tile-grid.wx-crystal  { box-shadow: inset 0 0 120px rgba(200,220,255,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-dust     { box-shadow: inset 0 0 120px rgba(220,170,110,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-oasis    { box-shadow: inset 0 0 120px rgba(140,200,120,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-solar    { box-shadow: inset 0 0 120px rgba(244,196,109,0.35); transition: box-shadow 0.8s; }
  .tile-grid.wx-seismic  { box-shadow: inset 0 0 120px rgba(170,130,100,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-rain     { box-shadow: inset 0 0 120px rgba(120,160,200,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-fossil   { box-shadow: inset 0 0 120px rgba(210,180,140,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-eruption { box-shadow: inset 0 0 120px rgba(230,110,70,0.3);   transition: box-shadow 0.8s; }
  .tile-grid.wx-geo      { box-shadow: inset 0 0 120px rgba(240,130,60,0.3);   transition: box-shadow 0.8s; }
  .tile-grid.wx-obsidian { box-shadow: inset 0 0 120px rgba(60,40,70,0.45);    transition: box-shadow 0.8s; }
  .tile-grid.wx-chemical { box-shadow: inset 0 0 120px rgba(160,220,90,0.3);   transition: box-shadow 0.8s; }
  .tile-grid.wx-spore    { box-shadow: inset 0 0 120px rgba(200,140,220,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-catalyst { box-shadow: inset 0 0 120px rgba(170,220,120,0.35); transition: box-shadow 0.8s; }
  .tile-grid.wx-tidal    { box-shadow: inset 0 0 120px rgba(80,140,200,0.3);   transition: box-shadow 0.8s; }
  .tile-grid.wx-coral    { box-shadow: inset 0 0 120px rgba(240,150,170,0.3);  transition: box-shadow 0.8s; }
  .tile-grid.wx-deep     { box-shadow: inset 0 0 120px rgba(50,80,140,0.4);    transition: box-shadow 0.8s; }

  /* Landmark label — small dark chip that floats above each landmark's top edge. */
  .landmark-label {
    user-select: none;
    font-weight: bold;
    letter-spacing: 0.3px;
    background: rgba(7,9,15,0.7);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .landmark-label:hover { filter: brightness(1.3); }
  .landmark-popup { z-index: 55; }

  /* Landmark art — SVG fills the overlay div and stretches to non-square footprints. */
  .landmark-art svg { width: 100%; height: 100%; display: block; }

  /* Presence pill — shown on My Worlds rows and planet info panels. */
  .presence-pill {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .presence-pill.tended { color: #6fbf73; background: rgba(111,191,115,0.15); border: 1px solid #6fbf73; }
  .presence-pill.aboard { color: #c6a55a; background: rgba(198,165,90,0.15);  border: 1px solid #c6a55a; }
  .presence-pill.away   { color: #8a7a6a; background: rgba(138,122,106,0.15); border: 1px solid #8a7a6a; }

  .placement-error {
    background: #3a1a1a;
    border: 1px solid #8a3a3a;
    border-left: 3px solid #c95a3a;
    color: #f5d0c0;
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .placement-error .dismiss { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* Inventory + upgrades (on Ship View) */
  .inventory-panel, .upgrade-panel {
    width: 1024px; max-width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 18px;
    margin-top: 16px;
  }
  .inventory-panel h4, .upgrade-panel h4 {
    margin: 0 0 10px 0;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  /* Fuel row — visually distinct from signature resource cells to telegraph its ship-consumable role. */
  .fuel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, rgba(244,196,109,0.12), rgba(244,196,109,0.03));
    border: 1px solid var(--accent-soft);
    border-radius: 4px;
    font-size: 13px;
  }
  .fuel-row .fuel-icon { font-size: 18px; }
  .fuel-row .fuel-label { color: var(--ink-dim); letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
  .fuel-row .fuel-amount { color: var(--accent); font-weight: bold; font-size: 16px; margin-left: 4px; }
  .fuel-row .fuel-trickle { margin-left: auto; color: #6fbf73; font-size: 11px; font-style: italic; }

  /* Chemistry panel — queue slots + launcher */
  .chemistry-panel {
    width: 100%;
    max-width: 1024px;
    margin-top: 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 18px;
  }
  .chem-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .chem-header h4 { margin: 0; color: var(--accent); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
  .chem-slot-count { color: var(--ink-dim); font-size: 12px; }
  .chem-queue-btn { margin-left: auto; background: var(--accent); color: #1a1208; border: 1px solid var(--accent); border-radius: 4px; padding: 4px 12px; font-weight: bold; font-size: 12px; cursor: pointer; }
  .chem-queue-btn:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
  .chem-queue-list { display: flex; flex-direction: column; gap: 6px; }
  .chem-slot {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .chem-slot-empty { color: var(--ink-dim); font-style: italic; opacity: 0.7; }
  .chem-slot-queued { border-color: var(--line); }
  .chem-slot-active { border-color: var(--accent-soft); }
  .chem-slot-name { flex: 1; font-weight: bold; color: var(--ink); }
  .chem-slot-state { color: var(--ink-dim); font-size: 12px; }
  .chem-slot-locked { color: var(--ink-dim); font-size: 11px; font-style: italic; margin-left: auto; }
  .chem-slot-cancel { background: var(--bg-soft); border: 1px solid var(--line); color: var(--ink-dim); padding: 3px 8px; font-size: 11px; border-radius: 3px; cursor: pointer; margin-left: auto; }
  .chem-slot-cancel:hover { border-color: #c07070; color: #f5d0c0; }
  .chem-progress-outer { flex-basis: 100%; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .chem-progress-inner { height: 100%; background: var(--accent-soft); transition: width 0.6s ease; }

  /* Queue Recipe modal */
  .chem-modal .chem-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .chem-modal .chem-tab { background: var(--bg-soft-2); border: 1px solid var(--line); color: var(--ink-dim); padding: 4px 14px; border-radius: 3px; cursor: pointer; }
  .chem-modal .chem-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(244,196,109,0.1); }
  .chem-modal .chem-recipe-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
  .chem-modal .chem-recipe { background: var(--bg-soft-2); border: 1px solid var(--line); border-radius: 3px; padding: 6px 10px; cursor: pointer; }
  .chem-modal .chem-recipe:hover { border-color: var(--accent-soft); }
  .chem-modal .chem-recipe.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .chem-modal .chem-recipe-name { color: var(--ink); font-weight: bold; font-size: 13px; }
  .chem-modal .chem-recipe-desc { color: var(--ink-dim); font-size: 11px; font-style: italic; margin-top: 2px; }
  .chem-modal .chem-recipe-detail { margin-top: 10px; padding: 10px; background: var(--bg-soft-2); border: 1px solid var(--line); border-radius: 3px; }
  .chem-modal .chem-cost-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .chem-modal .chem-cost-chip { display: inline-block; background: var(--bg); border: 1px solid var(--line); border-radius: 3px; padding: 1px 6px; font-size: 11px; color: var(--ink-dim); }
  .chem-modal .chem-cost-chip.short { color: #f5d0c0; border-color: #c07070; background: #3a1a1a; }
  .chem-modal .chem-rush-label { display: inline-flex; align-items: center; font-size: 12px; color: var(--ink-dim); margin-bottom: 6px; }
  .chem-modal .chem-target-picker { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .chem-modal .chem-target-picker select { background: var(--bg); color: var(--ink); border: 1px solid var(--line); padding: 4px 8px; font-size: 12px; border-radius: 3px; }

  /* Ship room tier cards */
  .ship-rooms-grid {
    width: 100%;
    max-width: 1024px;
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 10px;
  }
  .ship-room-card {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ship-room-head { display: flex; justify-content: space-between; align-items: baseline; }
  .ship-room-name { color: var(--accent); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }
  .ship-room-tier { color: var(--accent-soft); font-size: 12px; font-variant-numeric: tabular-nums; }
  .ship-room-flavor { color: var(--ink); font-size: 12px; font-style: italic; line-height: 1.4; }
  .ship-room-mech { color: var(--accent-soft); font-size: 11px; font-weight: bold; }
  .ship-room-next { color: var(--ink-dim); font-size: 11px; }
  .inventory-cell {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .inventory-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .inventory-text { flex: 1; }
  .inv-name { font-size: 13px; font-weight: bold; }
  .inv-from { font-size: 11px; color: var(--ink-dim); font-style: italic; }
  .inv-amount {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
    font-family: "Iowan Old Style", Georgia, serif;
  }

  .upgrade-tracks {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .upgrade-track {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .track-header { display: flex; justify-content: space-between; align-items: baseline; }
  .track-label { font-size: 15px; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
  .track-tier { font-size: 11px; color: var(--ink-dim); }
  .track-desc { font-size: 11px; color: var(--ink-dim); font-style: italic; line-height: 1.3; }
  .track-effect { font-size: 12px; color: var(--ink); }
  .tier-ladder { display: flex; gap: 4px; }
  .tier-pip {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .tier-pip.owned { background: var(--accent); border-color: var(--accent); }
  .tier-pip.next { border-color: var(--accent); }
  .next-label { font-size: 12px; font-weight: bold; }
  .next-cost { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .cost-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .cost-chip.short { border-color: #8a3a3a; color: #f5b0a0; }
  .upgrade-track button { margin-top: 4px; }

  /* Title screen */
  .title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
  }
  .title-screen h1 {
    font-size: 42px;
    letter-spacing: 6px;
    color: var(--accent);
    margin: 0 0 12px 0;
    text-shadow: 0 0 40px rgba(244,196,109,0.3);
  }
  .title-tagline {
    font-size: 18px;
    color: var(--ink-dim);
    font-style: italic;
    margin-bottom: 48px;
  }
  .save-slots {
    display: flex;
    gap: 16px;
    max-width: 900px;
    width: 100%;
  }
  .save-slot {
    flex: 1;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 180px;
  }
  .save-slot .slot-label {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .save-slot .slot-ship {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
  }
  .save-slot .slot-crew {
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.4;
  }
  .save-slot .slot-stat {
    font-size: 12px;
    color: var(--ink);
    margin-top: auto;
  }
  .save-slot .slot-empty {
    color: var(--ink-dim);
    font-style: italic;
    margin: auto 0;
    text-align: center;
  }
  .save-slot .slot-buttons {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .save-slot .slot-buttons button { flex: 1; }
  .slot-delete {
    background: transparent !important;
    border-color: #5a2a2a !important;
    color: #c07070 !important;
    font-size: 12px !important;
  }
  .slot-delete:hover { border-color: #c07070 !important; }

  /* Tutorial slideshow */
  .tutorial-overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px;
  }
  .tutorial-slide {
    max-width: 600px;
    text-align: center;
    margin-bottom: 32px;
  }
  .tutorial-slide .slide-number {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .tutorial-slide .slide-text {
    font-size: 18px;
    line-height: 1.7;
    color: var(--ink);
  }
  .tutorial-speaker {
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    margin-top: 24px;
  }
  .tutorial-nav {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .tutorial-nav .dots {
    display: flex;
    gap: 6px;
    margin: 0 16px;
  }
  .tutorial-nav .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
  }
  .tutorial-nav .dot.active { background: var(--accent); }
  .tutorial-skip {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 13px;
    color: var(--ink-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }
  .tutorial-skip:hover { color: var(--ink); }

  /* Review tutorial button */
  .review-tutorial-btn {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 11px;
    color: var(--ink-dim);
    background: transparent;
    border: 1px solid var(--line);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    opacity: 0.6;
  }
  .review-tutorial-btn:hover { opacity: 1; border-color: var(--accent-soft); }

  /* Advice "?" button and panel */
  .advice-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 70;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--accent);
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    font-family: inherit;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .advice-btn:hover { opacity: 1; border-color: var(--accent); }
  .advice-overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.6);
    z-index: 80;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .advice-panel {
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 20px 24px;
    max-width: 500px;
    width: 90%;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  }
  .advice-panel .advice-portrait {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-soft-2);
  }
  .advice-panel .advice-body { flex: 1; }
  .advice-panel .advice-speaker { font-size: 12px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
  .advice-panel .advice-text { font-size: 14px; line-height: 1.5; color: var(--ink); }
  .advice-panel .advice-close { margin-top: 12px; font-size: 13px; }

  /* My Worlds panel */
  .worlds-overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.7);
    z-index: 80;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .worlds-panel {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 20px;
    max-width: 700px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  }
  .worlds-panel h3 { margin: 0 0 12px; color: var(--accent); }

  /* Codex — tabbed panel that consolidates Worlds / Observations / Fragments. */
  .codex-btn { position: relative; }
  .codex-unread-dot {
    position: absolute;
    top: 6px; right: 10px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    display: inline-block;
  }
  .codex-panel h3 { display: none; } /* tabs replace the heading */
  .codex-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .codex-tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--ink-dim);
    padding: 6px 14px 8px;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 0.3px;
    border-radius: 0;
  }
  .codex-tab:hover { color: var(--ink); }
  .codex-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .codex-entry {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .codex-entry-source {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .codex-entry-title {
    font-weight: bold;
    color: var(--ink);
    font-size: 14px;
    margin-bottom: 4px;
  }
  .codex-entry-text {
    color: var(--ink);
    font-size: 13px;
    line-height: 1.45;
    font-style: italic;
  }
  .codex-entry-footer {
    margin-top: 6px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .world-entry {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .world-entry .we-color {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .world-entry .we-info { flex: 1; font-size: 13px; }
  .world-entry .we-name { font-weight: bold; color: var(--ink); }
  .world-entry .we-detail { color: var(--ink-dim); font-size: 12px; }
  .world-entry .we-status { font-size: 11px; font-weight: bold; }
  .world-entry .we-status.active { color: #6fbf73; }
  .world-entry .we-status.idle { color: #c07070; }
  .world-entry .we-status.paradise { color: var(--accent); }
  .world-entry button { font-size: 12px; padding: 6px 12px; min-height: 36px; }

  /* ============ MOBILE (≤768px) ============ */
  @media (max-width: 768px) {
    html { font-size: 16px; }
    button { min-height: 44px; min-width: 44px; padding: 10px 14px; font-size: 15px; }
    input[type="text"] { font-size: 16px; min-height: 44px; }

    /* Topbar */
    .topbar { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
    .topbar h1 { font-size: 16px; letter-spacing: 1px; }
    .topbar button { font-size: 13px; padding: 8px 10px; min-height: 40px; min-width: auto; }

    /* Title screen */
    .title-screen { padding: 24px 16px; min-height: auto; }
    .title-screen h1 { font-size: 24px; letter-spacing: 3px; }
    .title-tagline { font-size: 15px; margin-bottom: 28px; }
    .save-slots { flex-direction: column; gap: 12px; }
    .save-slot { min-height: auto; padding: 16px; }
    .save-slot .slot-buttons { flex-direction: row; }
    .save-slot .slot-buttons button { flex: 1; min-height: 44px; }
