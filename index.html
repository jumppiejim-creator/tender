<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tender</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./game-data.js"></script>
<style>
  :root {
    --bg: #0b0f1a;
    --bg-soft: #141a2b;
    --bg-soft-2: #1c2338;
    --ink: #e8ecf5;
    --ink-dim: #9aa3bd;
    --accent: #f4c46d;
    --accent-soft: #c6a55a;
    --line: #2a3350;
  }
  * { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  }
  button {
    font-family: inherit;
    background: var(--bg-soft-2);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #1a1408;
    border-color: var(--accent);
    font-weight: bold;
  }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  input[type="text"] {
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 16px;
  }

  .app { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .topbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
  }
  .topbar h1 { margin: 0; font-size: 20px; letter-spacing: 2px; color: var(--accent); }
  .topbar .spacer { flex: 1; }

  /* Character creation */
  .creation { padding: 30px; max-width: 1100px; margin: 0 auto; }
  .creation h2 { color: var(--accent); margin-top: 0; }
  .role-block { margin-bottom: 24px; }
  .role-block h3 { margin: 0 0 4px 0; }
  .role-block .domain { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .candidates { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .candidate {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 12px;
    border-radius: 4px;
    cursor: pointer;
  }
  .candidate:hover { border-color: var(--accent-soft); }
  .candidate.selected {
    border-color: var(--accent);
    background: var(--bg-soft-2);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .candidate .name { font-weight: bold; margin-bottom: 4px; }
  .candidate .blurb { font-size: 13px; color: var(--ink-dim); }
  .ship-name { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .launch-row { display: flex; justify-content: flex-end; }

  /* Ship view */
  .ship-view { padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .dollhouse {
    width: 1024px; max-width: 100%;
    height: 600px;
    background: url('./assets/ship-interior.jpg') center/cover no-repeat;
    border: 1px solid var(--line);
    border-radius: 6px;
    position: relative;
  }
  .room {
    position: absolute;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  .room:hover {
    border-color: var(--accent-soft);
    background: rgba(244,196,109,0.08);
  }
  .room .room-name {
    position: absolute;
    bottom: 4px; left: 6px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 6px #000, 0 0 3px #000;
    pointer-events: none;
  }
  .room .crew-pip {
    position: absolute;
    bottom: 22px;
    right: 6px;
    background: var(--accent);
    color: #1a1408;
    border: none;
    border-radius: 14px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .room .crew-pip:hover { background: #fff; }

  .dialog {
    margin-top: 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    max-width: 1024px;
    width: 100%;
    border-radius: 4px;
  }
  .dialog .speaker { color: var(--accent); font-weight: bold; }
  .dialog .line { font-style: italic; margin-top: 4px; color: var(--ink); }

  /* Star chart */
  .chart {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-canvas {
    width: 800px; height: 500px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
  }
  .system-dot {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 12px rgba(244,196,109,0.4);
  }
  .system-dot.current {
    background: #fff;
    box-shadow: 0 0 18px rgba(255,255,255,0.6);
  }
  .system-dot.dim {
    opacity: 0.3;
    box-shadow: none;
  }
  .system-label {
    position: absolute;
    transform: translate(-50%, 14px);
    color: var(--ink);
    font-size: 12px;
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .lane {
    position: absolute;
    height: 1px;
    background: linear-gradient(to right, rgba(244,196,109,0.0), rgba(244,196,109,0.5), rgba(244,196,109,0.0));
    transform-origin: 0 0;
    pointer-events: none;
  }
  .system-info {
    margin-top: 14px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 12px 16px;
    width: 800px;
    border-radius: 4px;
  }
  .system-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .system-info .desc { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .system-info .planets { font-size: 13px; }
  .system-info .planet-line { padding: 2px 0; }
  .system-info .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

  /* System map */
  .system-map {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .system-canvas {
    width: 800px; height: 500px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
    overflow: hidden;
  }
  .orbit-ring {
    position: absolute;
    border: 1px dashed rgba(244,196,109,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .star-body {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 40px 8px rgba(244,196,109,0.35);
  }
  .star-label {
    position: absolute;
    transform: translate(-50%, 34px);
    font-size: 12px;
    color: var(--ink-dim);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .planet-body {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(0,0,0,0.6);
  }
  .planet-body.selected {
    box-shadow: 0 0 0 2px var(--accent), 0 0 12px rgba(244,196,109,0.6);
  }
  .planet-label {
    position: absolute;
    transform: translate(-50%, 16px);
    font-size: 11px;
    color: var(--ink);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }

  /* Planet surface */
  .surface {
    padding: 20px;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .surface-main { display: flex; flex-direction: column; gap: 12px; }
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(12, 44px);
    grid-template-rows: repeat(8, 44px);
    gap: 2px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background-size: cover;
    background-position: center;
  }
  .tile {
    width: 44px; height: 44px;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    border: 1px solid rgba(255,255,255,0.12);
    transition: background 0.15s;
    background: transparent;
  }
  .tile:hover { filter: brightness(1.2); }
  .tile.placing:hover { box-shadow: inset 0 0 0 2px var(--accent); }
  .tile.occupied { cursor: pointer; }
  .tile.inspected { box-shadow: inset 0 0 0 2px var(--accent); }
  .machine-pip {
    position: absolute;
    left: 50%; top: 50%;
    width: 26px; height: 26px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid #1a1408;
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold;
    color: #1a1408;
  }
  .surface-sidebar {
    width: 260px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px;
  }
  .surface-sidebar h4 { margin: 0 0 8px 0; color: var(--accent); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
  .machine-option {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .machine-option:hover { border-color: var(--accent-soft); }
  .machine-option.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .machine-option .pip-sample {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .machine-option.disabled { opacity: 0.45; cursor: not-allowed; }
  .machine-option.idle { opacity: 0.55; }
  .machine-option .m-name { font-size: 13px; font-weight: bold; }
  .machine-option .m-idle { font-weight: normal; font-size: 11px; color: #c07070; }
  .machine-option .m-active { font-weight: normal; font-size: 11px; color: #6fbf73; }
  .machine-option .m-desc { font-size: 11px; color: var(--ink-dim); }
  .machine-option .m-stats { font-size: 11px; color: var(--ink-dim); margin-top: 2px; display: flex; gap: 8px; }
  .machine-option .m-stages { font-style: italic; }
  .machine-option .m-cost { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .surface-info {
    width: 280px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .surface-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .surface-info .row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--ink-dim); }
  .surface-info .row strong { color: var(--ink); }
  .progress-outer {
    height: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    margin: 6px 0;
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(to right, #6fbf73, #a8d8f0);
    transition: width 0.4s;
  }
  .stage-toast {
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    padding: 14px 22px;
    border-radius: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    z-index: 100;
    max-width: 520px;
  }
  .stage-toast .speaker { color: var(--accent); font-weight: bold; font-size: 13px; }
  .stage-toast .line { font-style: italic; margin-top: 4px; }
  .stage-toast .stage-note { margin-top: 6px; font-size: 12px; color: var(--ink-dim); }
  .stage-toast .stage-machine-hint { margin-top: 8px; font-size: 12px; color: var(--accent-soft); border-top: 1px solid var(--line); padding-top: 8px; }

  .deconstruct-popup {
    position: absolute;
    z-index: 50;
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 12px 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    min-width: 220px;
    font-size: 13px;
  }
  .deconstruct-popup .dp-name { font-weight: bold; color: var(--accent); margin-bottom: 2px; }
  .deconstruct-popup .dp-status { font-size: 11px; color: var(--ink-dim); margin-bottom: 6px; }
  .deconstruct-popup .dp-refund { font-size: 12px; color: var(--ink-dim); margin-bottom: 8px; }
  .deconstruct-popup .dp-refund .chip { display: inline-block; background: var(--bg-soft-2); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; margin: 1px 2px; font-size: 11px; }
  .deconstruct-popup .dp-actions { display: flex; gap: 8px; }
  .deconstruct-popup .dp-actions button { font-size: 12px; padding: 4px 10px; }
  .deconstruct-popup .dp-actions .danger { background: #8a3a3a; color: #f5d0c0; border: 1px solid #c95a3a; }
  .deconstruct-popup .dp-actions .danger:hover { background: #a04a4a; }

  .placement-error {
    background: #3a1a1a;
    border: 1px solid #8a3a3a;
    border-left: 3px solid #c95a3a;
    color: #f5d0c0;
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .placement-error .dismiss { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* Inventory + upgrades (on Ship View) */
  .inventory-panel, .upgrade-panel {
    width: 1024px; max-width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 18px;
    margin-top: 16px;
  }
  .inventory-panel h4, .upgrade-panel h4 {
    margin: 0 0 10px 0;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .inventory-cell {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .inventory-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .inventory-text { flex: 1; }
  .inv-name { font-size: 13px; font-weight: bold; }
  .inv-from { font-size: 11px; color: var(--ink-dim); font-style: italic; }
  .inv-amount {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
    font-family: "Iowan Old Style", Georgia, serif;
  }

  .upgrade-tracks {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .upgrade-track {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .track-header { display: flex; justify-content: space-between; align-items: baseline; }
  .track-label { font-size: 15px; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
  .track-tier { font-size: 11px; color: var(--ink-dim); }
  .track-desc { font-size: 11px; color: var(--ink-dim); font-style: italic; line-height: 1.3; }
  .track-effect { font-size: 12px; color: var(--ink); }
  .tier-ladder { display: flex; gap: 4px; }
  .tier-pip {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .tier-pip.owned { background: var(--accent); border-color: var(--accent); }
  .tier-pip.next { border-color: var(--accent); }
  .next-label { font-size: 12px; font-weight: bold; }
  .next-cost { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .cost-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .cost-chip.short { border-color: #8a3a3a; color: #f5b0a0; }
  .upgrade-track button { margin-top: 4px; }

  /* Title screen */
  .title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
  }
  .title-screen h1 {
    font-size: 72px;
    letter-spacing: 12px;
    color: var(--accent);
    margin: 0 0 12px 0;
    text-shadow: 0 0 40px rgba(244,196,109,0.3);
  }
  .title-tagline {
    font-size: 18px;
    color: var(--ink-dim);
    font-style: italic;
    margin-bottom: 48px;
  }
  .save-slots {
    display: flex;
    gap: 16px;
    max-width: 900px;
    width: 100%;
  }
  .save-slot {
    flex: 1;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 180px;
  }
  .save-slot .slot-label {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .save-slot .slot-ship {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
  }
  .save-slot .slot-crew {
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.4;
  }
  .save-slot .slot-stat {
    font-size: 12px;
    color: var(--ink);
    margin-top: auto;
  }
  .save-slot .slot-empty {
    color: var(--ink-dim);
    font-style: italic;
    margin: auto 0;
    text-align: center;
  }
  .save-slot .slot-buttons {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .save-slot .slot-buttons button { flex: 1; }
  .slot-delete {
    background: transparent !important;
    border-color: #5a2a2a !important;
    color: #c07070 !important;
    font-size: 12px !important;
  }
  .slot-delete:hover { border-color: #c07070 !important; }

  /* Tutorial slideshow */
  .tutorial-overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px;
  }
  .tutorial-slide {
    max-width: 600px;
    text-align: center;
    margin-bottom: 32px;
  }
  .tutorial-slide .slide-number {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .tutorial-slide .slide-text {
    font-size: 18px;
    line-height: 1.7;
    color: var(--ink);
  }
  .tutorial-speaker {
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    margin-top: 24px;
  }
  .tutorial-nav {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .tutorial-nav .dots {
    display: flex;
    gap: 6px;
    margin: 0 16px;
  }
  .tutorial-nav .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
  }
  .tutorial-nav .dot.active { background: var(--accent); }
  .tutorial-skip {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 13px;
    color: var(--ink-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }
  .tutorial-skip:hover { color: var(--ink); }

  /* Review tutorial button */
  .review-tutorial-btn {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 11px;
    color: var(--ink-dim);
    background: transparent;
    border: 1px solid var(--line);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    opacity: 0.6;
  }
  .review-tutorial-btn:hover { opacity: 1; border-color: var(--accent-soft); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ---------- Save / load (3-slot system) ----------
function slotKey(slot) { return "tender.save.slot." + slot; }

function loadSave(slot) {
  try {
    const raw = localStorage.getItem(slotKey(slot));
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.saveVersion !== SAVE_VERSION) return null;
    return data;
  } catch (e) {
    console.warn("Save load failed (slot " + slot + "):", e);
    return null;
  }
}

function writeSave(state, slot) {
  const blob = {
    saveVersion: SAVE_VERSION,
    shipName: state.shipName,
    crew: state.crew,
    currentSystemId: state.currentSystemId,
    worlds: state.worlds,
    inventory: state.inventory,
    upgrades: state.upgrades,
    tutorialSeen: state.tutorialSeen || false,
    lastTickTimestamp: Date.now()
  };
  localStorage.setItem(slotKey(slot), JSON.stringify(blob));
}

function deleteSave(slot) {
  localStorage.removeItem(slotKey(slot));
}

// Migrate old single-save key into slot 0 if present.
(function migrateOldSave() {
  const OLD_KEY = "tender.save.v1";
  try {
    const raw = localStorage.getItem(OLD_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.saveVersion !== SAVE_VERSION) return;
    if (!localStorage.getItem(slotKey(0))) {
      data.tutorialSeen = true; // existing players already know the game
      localStorage.setItem(slotKey(0), JSON.stringify(data));
    }
    localStorage.removeItem(OLD_KEY);
  } catch (e) { /* ignore */ }
})();

// Return summaries of all 3 save slots for the title screen.
function getSaveSlots() {
  return [0, 1, 2].map(slot => {
    const data = loadSave(slot);
    if (!data) return { slot, empty: true };
    const crewNames = [];
    CREW_ROLES.forEach(role => {
      const pickedId = data.crew && data.crew[role.id];
      if (pickedId) {
        const cand = role.candidates.find(c => c.id === pickedId);
        if (cand) crewNames.push(cand.name);
      }
    });
    let terraformed = 0;
    if (data.worlds) {
      for (const id in data.worlds) {
        if (data.worlds[id].stage >= 5) terraformed++;
      }
    }
    return {
      slot,
      empty: false,
      shipName: data.shipName,
      crewNames,
      terraformed
    };
  });
}

// ---------- Growth tick (the architectural call from PRIMER.md) ----------
// Walks all in-progress worlds and advances stage thresholds based on installed machines.
// Phase 0: worlds dictionary is empty, machines aren't placed yet — but the plumbing exists
// so Phase 1 doesn't have to retrofit anything.
// Calculate effective pps for a world based on its machines and current stage.
function calcWorldPps(machines, stage) {
  var arr = machines || [];
  var solarCount = 0;
  arr.forEach(m => { if (m.type === "solar_array") solarCount++; });
  var solarMult = 1 + solarCount * 0.10;
  var total = 0;
  arr.forEach(m => {
    var def = MACHINES.find(md => md.id === m.type);
    if (def && def.pps > 0 && def.activeStages.indexOf(stage) !== -1) {
      total += def.pps * solarMult;
    }
  });
  return total;
}

// Count storage silos on a world for resource production multiplier (1.15 per silo, multiplicative).
function siloMultiplier(machines) {
  let count = 0;
  (machines || []).forEach(m => { if (m.type === "storage_silo") count++; });
  return Math.pow(1.15, count);
}

function applyGrowthTicks(worlds, inventory, elapsedSeconds) {
  if (!worlds) return { worlds: worlds, inventory: inventory || {} };
  const outWorlds = { ...worlds };
  const outInv = { ...(inventory || {}) };
  for (const id in outWorlds) {
    const w = { ...outWorlds[id] };
    const machines = w.machines || [];
    if (machines.length > 0 && w.stage < 5) {
      const pps = calcWorldPps(machines, w.stage);
      if (pps > 0) {
        w.progress = (w.progress || 0) + pps * elapsedSeconds;
        while (w.progress >= STAGE_THRESHOLD && w.stage < 5) {
          w.progress -= STAGE_THRESHOLD;
          w.stage += 1;
        }
        if (w.stage >= 5) w.progress = 0;
      }
    }
    // Resource production.
    const found = findPlanet(id);
    const pType = found && found.planet.type;
    const mult = siloMultiplier(machines);
    const lp = w.lifetimeProduction || {};
    if (pType === "rocky") {
      // Rocky worlds produce Common Ore from stage 0.
      const rockyRate = ROCKY_PRODUCTION_PER_STAGE[w.stage];
      if (rockyRate) {
        const produced = rockyRate * mult * elapsedSeconds;
        outInv["common_ore"] = (outInv["common_ore"] || 0) + produced;
        lp["common_ore"] = (lp["common_ore"] || 0) + produced;
      }
    } else {
      // Non-Rocky: signature resource at Flora (stage 3)+.
      const rate = PRODUCTION_PER_STAGE[w.stage];
      const resId = pType && PLANET_TYPE_RESOURCE[pType];
      if (rate && resId) {
        const produced = rate * mult * elapsedSeconds;
        outInv[resId] = (outInv[resId] || 0) + produced;
        lp[resId] = (lp[resId] || 0) + produced;
      }
      // Non-Rocky: base Common Ore trickle at stages 0–2.
      if (w.stage < 3) {
        const produced = BASE_ORE_TRICKLE * elapsedSeconds;
        outInv["common_ore"] = (outInv["common_ore"] || 0) + produced;
        lp["common_ore"] = (lp["common_ore"] || 0) + produced;
      }
    }
    w.lifetimeProduction = lp;
    outWorlds[id] = w;
  }
  return { worlds: outWorlds, inventory: outInv };
}

function emptyInventory() {
  const inv = {};
  SIGNATURE_RESOURCES.forEach(r => { inv[r.id] = 0; });
  for (const k in STARTING_INVENTORY) inv[k] = (inv[k] || 0) + STARTING_INVENTORY[k];
  return inv;
}
function defaultUpgrades() {
  return { hull: 1, drive: 1, lab: 1 };
}
function canAfford(inventory, cost) {
  if (!cost) return true;
  for (const k in cost) if ((inventory[k] || 0) < cost[k]) return false;
  return true;
}
function spend(inventory, cost) {
  const out = { ...inventory };
  if (!cost) return out;
  for (const k in cost) out[k] = (out[k] || 0) - cost[k];
  return out;
}
function countActiveWorlds(worlds) {
  let n = 0;
  for (const id in worlds) {
    const w = worlds[id];
    if ((w.machines || []).length > 0 && w.stage < 5) n++;
  }
  return n;
}

// Diff two worlds maps and return list of stage-advance events.
function stageAdvanceEvents(prev, next) {
  const events = [];
  for (const id in next) {
    const p = prev && prev[id];
    if (p && next[id].stage > p.stage) {
      events.push({ planetId: id, newStage: next[id].stage });
    }
  }
  return events;
}

// Look up a planet by id across stub systems. Returns {system, planet} or null.
function findPlanet(planetId) {
  for (const sys of STUB_SYSTEMS) {
    const p = sys.planets.find(pl => pl.id === planetId);
    if (p) return { system: sys, planet: p };
  }
  return null;
}

// BFS: returns set of system ids reachable from `fromId` within `maxHops` jumps.
function reachableSystems(fromId, maxHops) {
  const visited = new Set([fromId]);
  let frontier = [fromId];
  for (let hop = 0; hop < maxHops; hop++) {
    const next = [];
    for (const sid of frontier) {
      const sys = STUB_SYSTEMS.find(s => s.id === sid);
      if (!sys) continue;
      for (const nid of sys.connections) {
        if (!visited.has(nid)) { visited.add(nid); next.push(nid); }
      }
    }
    frontier = next;
    if (frontier.length === 0) break;
  }
  return visited;
}

// ---------- Root app ----------
function App() {
  const [state, setState] = useState({
    screen: "title",
    activeSlot: null,
    shipName: "",
    crew: { botanist: null, engineer: null, cartographer: null, cook: null },
    currentSystemId: "harbor",
    currentPlanetId: null,
    worlds: {},
    inventory: emptyInventory(),
    upgrades: defaultUpgrades(),
    tutorialSeen: false,
    stageToast: null,
    placementError: null
  });

  // Live tick during play (cozy interval). Ticks every 2 seconds for responsive feedback
  // on the surface view — this is a cozy game, the math is cheap.
  useEffect(() => {
    if (state.screen === "creation" || state.screen === "title" || state.screen === "tutorial") return;
    const handle = setInterval(() => {
      setState(s => {
        const result = applyGrowthTicks(s.worlds, s.inventory, 2);
        const next = result.worlds;
        const events = stageAdvanceEvents(s.worlds, next);
        let toast = s.stageToast;
        if (events.length > 0) {
          const ev = events[events.length - 1];
          const congrats = STAGE_CONGRATS[ev.newStage];
          if (congrats) {
            const roleDef = CREW_ROLES.find(r => r.id === congrats.role);
            const pickedId = s.crew[congrats.role];
            const cand = roleDef && roleDef.candidates.find(c => c.id === pickedId);
            // Find machines that just went idle and machines needed for the new stage.
            const w = next[ev.planetId];
            const prevStage = ev.newStage - 1;
            const nowIdle = [];
            const seen = new Set();
            (w && w.machines || []).forEach(m => {
              const def = MACHINES.find(md => md.id === m.type);
              if (def && def.pps > 0 && def.activeStages.indexOf(prevStage) !== -1 && def.activeStages.indexOf(ev.newStage) === -1) {
                if (!seen.has(def.id)) { seen.add(def.id); nowIdle.push(def.name); }
              }
            });
            const needed = MACHINES.filter(m => m.pps > 0 && m.activeStages.indexOf(ev.newStage) !== -1).map(m => m.name);
            let machineHint = "";
            if (nowIdle.length > 0) machineHint += nowIdle.join(", ") + (nowIdle.length === 1 ? " is" : " are") + " now idle. Tap idle machines to deconstruct and reclaim 75% of their resources.";
            if (needed.length > 0 && ev.newStage < 5) machineHint += (machineHint ? " " : "") + "You'll need " + needed.join(" or ") + " to keep progressing.";
            toast = {
              planetId: ev.planetId,
              newStage: ev.newStage,
              speaker: cand ? cand.name : (roleDef ? roleDef.label : congrats.role),
              line: congrats.line,
              machineHint: machineHint || null,
              ts: Date.now()
            };
          }
        }
        return { ...s, worlds: next, inventory: result.inventory, stageToast: toast };
      });
    }, 2000);
    return () => clearInterval(handle);
  }, [state.screen]);

  // Auto-dismiss the stage toast after a few seconds so it doesn't linger.
  useEffect(() => {
    if (!state.stageToast) return;
    const h = setTimeout(() => {
      setState(s => (s.stageToast && s.stageToast.ts === state.stageToast.ts ? { ...s, stageToast: null } : s));
    }, 7000);
    return () => clearTimeout(h);
  }, [state.stageToast]);

  // Persist on meaningful changes.
  useEffect(() => {
    if (state.screen === "creation" || state.screen === "title" || state.screen === "tutorial") return;
    if (state.activeSlot == null) return;
    writeSave(state, state.activeSlot);
  }, [state.screen, state.shipName, state.crew, state.currentSystemId, state.currentPlanetId, state.worlds, state.inventory, state.upgrades, state.activeSlot]);

  function startNewGame(slot) {
    setState(s => ({
      ...s,
      screen: "creation",
      activeSlot: slot,
      shipName: "",
      crew: { botanist: null, engineer: null, cartographer: null, cook: null },
      currentSystemId: "harbor",
      currentPlanetId: null,
      worlds: {},
      inventory: emptyInventory(),
      upgrades: defaultUpgrades(),
      tutorialSeen: false,
      stageToast: null,
      placementError: null
    }));
  }
  function continueGame(slot) {
    const saved = loadSave(slot);
    if (!saved) return;
    const now = Date.now();
    const elapsed = Math.min(
      Math.floor((now - (saved.lastTickTimestamp || now)) / 1000),
      OFFLINE_TICK_CAP_SECONDS
    );
    const startInv = { ...emptyInventory(), ...(saved.inventory || {}) };
    const result = applyGrowthTicks(saved.worlds || {}, startInv, elapsed);
    setState({
      screen: "ship",
      activeSlot: slot,
      shipName: saved.shipName,
      crew: saved.crew,
      currentSystemId: saved.currentSystemId || "harbor",
      currentPlanetId: null,
      worlds: result.worlds,
      inventory: result.inventory,
      upgrades: { ...defaultUpgrades(), ...(saved.upgrades || {}) },
      tutorialSeen: saved.tutorialSeen || false,
      stageToast: null,
      placementError: null
    });
  }
  function handleDeleteSave(slot) {
    if (!confirm("Delete this save? This cannot be undone.")) return;
    deleteSave(slot);
    // If we're viewing the title, force re-render by staying on title
    setState(s => ({ ...s }));
  }
  function finishCreation(shipName, crew) {
    setState(s => ({ ...s, screen: "tutorial", shipName, crew }));
  }
  function finishTutorial() {
    setState(s => ({ ...s, screen: "ship", tutorialSeen: true }));
  }
  function showTutorial() {
    setState(s => ({ ...s, screen: "tutorial" }));
  }
  function goTo(screen) {
    setState(s => ({ ...s, screen }));
  }
  function jumpTo(systemId) {
    setState(s => ({ ...s, currentSystemId: systemId }));
  }
  function enterSystem() {
    setState(s => ({ ...s, screen: "system" }));
  }
  function landOnPlanet(planetId) {
    setState(s => {
      const worlds = { ...s.worlds };
      if (!worlds[planetId]) {
        const found = findPlanet(planetId);
        worlds[planetId] = {
          stage: (found && found.planet.stage) || 0,
          progress: 0,
          machines: []
        };
      }
      return { ...s, screen: "surface", currentPlanetId: planetId, worlds };
    });
  }
  function backToSystem() {
    setState(s => ({ ...s, screen: "system", currentPlanetId: null }));
  }
  function placeMachine(planetId, machineType, x, y) {
    setState(s => {
      const worlds = { ...s.worlds };
      const w = { ...(worlds[planetId] || { stage: 0, progress: 0, machines: [] }) };
      if ((w.machines || []).some(m => m.x === x && m.y === y)) return s;
      const isFirstMachine = (w.machines || []).length === 0;
      if (isFirstMachine && w.stage < 5) {
        const limit = hullWorldLimit(s.upgrades.hull);
        if (countActiveWorlds(s.worlds) >= limit) {
          return {
            ...s,
            placementError: "Hull capacity reached — upgrade your ship or complete a world to Paradise."
          };
        }
      }
      const machineDef = MACHINES.find(m => m.id === machineType);
      if (machineDef && machineDef.cost && !canAfford(s.inventory, machineDef.cost)) {
        return { ...s, placementError: "Not enough resources to build " + machineDef.name + "." };
      }
      const newInv = machineDef && machineDef.cost ? spend(s.inventory, machineDef.cost) : s.inventory;
      w.machines = [...(w.machines || []), { id: Date.now() + Math.random(), type: machineType, x, y }];
      worlds[planetId] = w;
      return { ...s, worlds, inventory: newInv, placementError: null };
    });
  }
  function deconstructMachine(planetId, machineId) {
    setState(s => {
      const worlds = { ...s.worlds };
      const w = { ...(worlds[planetId] || { stage: 0, progress: 0, machines: [] }) };
      const idx = (w.machines || []).findIndex(m => m.id === machineId);
      if (idx === -1) return s;
      const removed = w.machines[idx];
      const machineDef = MACHINES.find(m => m.id === removed.type);
      const newInv = { ...s.inventory };
      if (machineDef && machineDef.cost) {
        for (const k in machineDef.cost) {
          newInv[k] = (newInv[k] || 0) + Math.floor(machineDef.cost[k] * 0.75);
        }
      }
      w.machines = w.machines.filter((_, i) => i !== idx);
      worlds[planetId] = w;
      return { ...s, worlds, inventory: newInv, placementError: null };
    });
  }
  function clearPlacementError() {
    setState(s => (s.placementError ? { ...s, placementError: null } : s));
  }
  function buyUpgrade(trackId) {
    setState(s => {
      const track = UPGRADE_TRACKS.find(t => t.id === trackId);
      if (!track) return s;
      const current = s.upgrades[trackId] || 1;
      if (current >= track.tiers.length) return s;
      const nextTier = track.tiers[current];
      if (!canAfford(s.inventory, nextTier.cost)) return s;
      return {
        ...s,
        inventory: spend(s.inventory, nextTier.cost),
        upgrades: { ...s.upgrades, [trackId]: current + 1 }
      };
    });
  }
  function resetGame() {
    if (!confirm("Return to the title screen?")) return;
    setState({
      screen: "title",
      activeSlot: null,
      shipName: "",
      crew: { botanist: null, engineer: null, cartographer: null, cook: null },
      currentSystemId: "harbor",
      currentPlanetId: null,
      worlds: {},
      inventory: emptyInventory(),
      upgrades: defaultUpgrades(),
      tutorialSeen: false,
      stageToast: null,
      placementError: null
    });
  }

  if (state.screen === "title") {
    return <TitleScreen onNewGame={startNewGame} onContinue={continueGame} onDelete={handleDeleteSave} />;
  }

  if (state.screen === "creation") {
    return <CharacterCreation onFinish={finishCreation} />;
  }

  if (state.screen === "tutorial") {
    return <Tutorial onFinish={finishTutorial} cartographerName={
      (() => {
        const cId = state.crew && state.crew.cartographer;
        if (!cId) return "The Cartographer";
        const role = CREW_ROLES.find(r => r.id === "cartographer");
        const cand = role && role.candidates.find(c => c.id === cId);
        return cand ? cand.name : "The Cartographer";
      })()
    } />;
  }

  return (
    <div className="app">
      <div className="topbar">
        <h1>TENDER</h1>
        <span style={{ color: "var(--ink-dim)" }}>— {state.shipName}</span>
        <div className="spacer" />
        <button onClick={() => goTo("ship")}>Ship</button>
        <button onClick={() => goTo("chart")}>Star Chart</button>
        <button onClick={resetGame}>Title Screen</button>
      </div>
      {state.screen === "ship" && (
        <ShipView
          crew={state.crew}
          inventory={state.inventory}
          upgrades={state.upgrades}
          onBuyUpgrade={buyUpgrade}
          onShowTutorial={showTutorial}
        />
      )}
      {state.screen === "chart" && (
        <StarChart
          currentSystemId={state.currentSystemId}
          driveTier={state.upgrades.drive || 1}
          onJump={jumpTo}
          onEnter={enterSystem}
        />
      )}
      {state.screen === "system" && (
        <SystemMap
          systemId={state.currentSystemId}
          worlds={state.worlds}
          onBack={() => goTo("chart")}
          onLand={landOnPlanet}
        />
      )}
      {state.screen === "surface" && state.currentPlanetId && (
        <PlanetSurface
          planetId={state.currentPlanetId}
          world={state.worlds[state.currentPlanetId]}
          inventory={state.inventory}
          onPlace={placeMachine}
          onDeconstruct={deconstructMachine}
          onBack={backToSystem}
          placementError={state.placementError}
          onClearError={clearPlacementError}
        />
      )}
      {state.stageToast && (
        <div className="stage-toast">
          <div className="speaker">{state.stageToast.speaker}</div>
          <div className="line">{state.stageToast.line}</div>
          <div className="stage-note">
            {(() => {
              const f = findPlanet(state.stageToast.planetId);
              const stageName = TERRAFORM_STAGES[state.stageToast.newStage].name;
              return f ? `${f.planet.name} — ${stageName}` : stageName;
            })()}
          </div>
          {state.stageToast.machineHint && (
            <div className="stage-machine-hint">{state.stageToast.machineHint}</div>
          )}
        </div>
      )}
    </div>
  );
}

// ---------- Title screen ----------
function TitleScreen({ onNewGame, onContinue, onDelete }) {
  const [slots, setSlots] = useState(() => getSaveSlots());

  // Refresh slots after a delete
  function handleDelete(slot) {
    onDelete(slot);
    setSlots(getSaveSlots());
  }

  return (
    <div className="title-screen">
      <h1>TENDER</h1>
      <div className="title-tagline">Tend a galaxy you didn't plant.</div>
      <div className="save-slots">
        {slots.map(s => (
          <div key={s.slot} className="save-slot">
            <div className="slot-label">Slot {s.slot + 1}</div>
            {s.empty ? (
              <>
                <div className="slot-empty">Empty Slot</div>
                <div className="slot-buttons">
                  <button className="primary" onClick={() => onNewGame(s.slot)}>New Game</button>
                </div>
              </>
            ) : (
              <>
                <div className="slot-ship">{s.shipName}</div>
                <div className="slot-crew">{s.crewNames.join(", ")}</div>
                <div className="slot-stat">{s.terraformed} world{s.terraformed === 1 ? "" : "s"} terraformed</div>
                <div className="slot-buttons">
                  <button className="primary" onClick={() => onContinue(s.slot)}>Continue</button>
                  <button className="slot-delete" onClick={() => handleDelete(s.slot)}>Delete</button>
                </div>
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------- Tutorial slideshow ----------

  "You and your crew are alone out here. No one else is coming. The galaxy is quiet — your job is to wake it up.",
  "This is your star chart. Each dot is a system. Jump between them using fuel. Upgrading your Drive lets you reach further.",
  "Each system has planets. Land on them to begin terraforming. Every world passes through six stages: Barren, Atmosphere, Hydrosphere, Flora, Fauna, Paradise.",
  "Place machines on a planet's surface to push it toward the next stage. Machines cost resources. Different machines drive different stages.",
  "Machines come in tiers. T1 machines cost only Common Ore — always available, always reliable. T2 and T3 machines cost specialty resources from other planet types, but they're faster. Start with T1, then upgrade as your galaxy grows.",
  "Most worlds start producing their signature resource at Flora. Rocky worlds are special — they produce Common Ore from the very first stage, so they're your lifeline early on. Frozen worlds produce Cryocrystals. Desert worlds produce Rare Metals. Volcanic worlds produce Geothermal Cores. Toxic worlds produce Catalysts. Oceanic worlds produce Biomatter.",
  "These resources feed each other. You need Cryocrystals to cool volcanic worlds. You need Geothermal Cores to power frozen ones. Tend many worlds to keep them all growing.",
  "Worlds keep growing while you're away — even when the game is closed. Check back and you might find a forest where there was only rock.",
  "Upgrade your ship on the Ship View. Hull lets you manage more worlds. Drive lets you jump further. Lab reveals more about what you find.",
  "There is no ending. There is no failure. Take your time. Whenever you're ready, captain."
];

function Tutorial({ onFinish, cartographerName }) {
  const [slide, setSlide] = useState(0);

  return (
    <div className="tutorial-overlay">
      <button className="tutorial-skip" onClick={onFinish}>Skip</button>
      <div className="tutorial-slide">
        <div className="slide-number">
          {slide + 1} / {TUTORIAL_SLIDES.length}
        </div>
        <div className="slide-text">{TUTORIAL_SLIDES[slide]}</div>
        <div className="tutorial-speaker">— {cartographerName}</div>
      </div>
      <div className="tutorial-nav">
        <button
          disabled={slide === 0}
          onClick={() => setSlide(s => s - 1)}
        >Back</button>
        <div className="dots">
          {TUTORIAL_SLIDES.map((_, i) => (
            <div key={i} className={"dot" + (i === slide ? " active" : "")} />
          ))}
        </div>
        {slide < TUTORIAL_SLIDES.length - 1 ? (
          <button className="primary" onClick={() => setSlide(s => s + 1)}>Next</button>
        ) : (
          <button className="primary" onClick={onFinish}>Begin</button>
        )}
      </div>
    </div>
  );
}

// ---------- Character creation ----------
function CharacterCreation({ onFinish }) {
  const [shipName, setShipName] = useState("");
  const [picks, setPicks] = useState({ botanist: null, engineer: null, cartographer: null, cook: null });

  const allPicked = CREW_ROLES.every(r => picks[r.id]) && shipName.trim().length > 0;

  function pick(roleId, candidateId) {
    setPicks(p => ({ ...p, [roleId]: candidateId }));
  }

  return (
    <div className="creation">
      <h2>Choose your crew</h2>
      <p style={{ color: "var(--ink-dim)" }}>
        Four people. Permanent for the run. In a galaxy with no other intelligent life,
        these are the only voices you'll hear.
      </p>
      {CREW_ROLES.map(role => (
        <div key={role.id} className="role-block">
          <h3>{role.label}</h3>
          <div className="domain">{role.domain}</div>
          <div className="candidates">
            {role.candidates.map(c => (
              <div
                key={c.id}
                className={"candidate" + (picks[role.id] === c.id ? " selected" : "")}
                onClick={() => pick(role.id, c.id)}
              >
                <div className="name">{c.name}</div>
                <div className="blurb">{c.blurb}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div className="ship-name">
        <label htmlFor="shipname">Ship name:</label>
        <input
          id="shipname"
          type="text"
          value={shipName}
          onChange={e => setShipName(e.target.value)}
          placeholder="The…"
        />
      </div>
      <div className="launch-row">
        <button
          className="primary"
          disabled={!allPicked}
          onClick={() => onFinish(shipName.trim(), picks)}
        >
          Launch
        </button>
      </div>
    </div>
  );
}

// ---------- Ship view (dollhouse) ----------
function ShipView({ crew, inventory, upgrades, onBuyUpgrade, onShowTutorial }) {
  const [activeLine, setActiveLine] = useState(null);
  const [activeRoom, setActiveRoom] = useState(null);

  // Map crew picks back to role + candidate objects, then drop them in default rooms.
  const occupants = {};
  CREW_ROLES.forEach(role => {
    const pickedId = crew[role.id];
    if (!pickedId) return;
    const cand = role.candidates.find(c => c.id === pickedId);
    if (!occupants[role.defaultRoom]) occupants[role.defaultRoom] = [];
    occupants[role.defaultRoom].push({ role, cand });
  });

  function speak(role, cand) {
    setActiveLine({
      speaker: cand.name,
      line: PLACEHOLDER_LINES[role.id] || "\"…\""
    });
    setActiveRoom(null);
  }
  function describe(room) {
    setActiveRoom(room);
    setActiveLine(null);
  }

  return (
    <div className="ship-view">
      <div className="dollhouse">
        {SHIP_ROOMS.map(room => (
          <div
            key={room.id}
            className="room"
            style={room.zone}
            onClick={() => describe(room)}
          >
            <div className="room-name">{room.name}</div>
            {(occupants[room.id] || []).map(({ role, cand }, i) => (
              <button
                key={cand.id}
                className="crew-pip"
                style={{ bottom: 22 + i * 26 }}
                onClick={(e) => { e.stopPropagation(); speak(role, cand); }}
              >
                {cand.name}
              </button>
            ))}
          </div>
        ))}
        {onShowTutorial && (
          <button className="review-tutorial-btn" onClick={onShowTutorial}>Review Tutorial</button>
        )}
      </div>
      {activeLine && (
        <div className="dialog">
          <div className="speaker">{activeLine.speaker}</div>
          <div className="line">{activeLine.line}</div>
        </div>
      )}
      {activeRoom && (
        <div className="dialog">
          <div className="speaker">{activeRoom.name}</div>
          <div className="line">{activeRoom.desc}</div>
        </div>
      )}

      <div className="inventory-panel">
        <h4>Stockpiles</h4>
        <div className="inventory-grid">
          {SIGNATURE_RESOURCES.map(r => {
            const amt = Math.floor((inventory && inventory[r.id]) || 0);
            const fromType = PLANET_TYPES.find(t => t.id === r.from);
            const neededBy = [];
            UPGRADE_TRACKS.forEach(tr => {
              tr.tiers.forEach(t => {
                if (t.cost && t.cost[r.id]) neededBy.push(tr.label + " T" + t.tier);
              });
            });
            MACHINES.forEach(m => {
              if (m.cost && m.cost[r.id]) neededBy.push(m.name);
            });
            const tip = `Produced by: ${fromType ? fromType.name : r.from} worlds (Flora+)\n${r.used_for}\nUsed by: ${neededBy.length ? neededBy.join(", ") : "nothing yet"}`;
            return (
              <div key={r.id} className="inventory-cell" title={tip}>
                <div
                  className="inventory-swatch"
                  style={{ background: PLANET_COLORS[r.from] || "#888" }}
                />
                <div className="inventory-text">
                  <div className="inv-name">{r.name}</div>
                  <div className="inv-from">{fromType ? fromType.name : r.from} worlds</div>
                </div>
                <div className="inv-amount">{amt}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="upgrade-panel">
        <h4>Ship Upgrades</h4>
        <div className="upgrade-tracks">
          {UPGRADE_TRACKS.map(track => {
            const current = (upgrades && upgrades[track.id]) || 1;
            const atMax = current >= track.tiers.length;
            const nextTier = atMax ? null : track.tiers[current];
            const affordable = nextTier && canAfford(inventory || {}, nextTier.cost);
            return (
              <div key={track.id} className="upgrade-track">
                <div className="track-header">
                  <div className="track-label">{track.label}</div>
                  <div className="track-tier">Tier {current} / {track.tiers.length}</div>
                </div>
                <div className="track-desc">{track.desc}</div>
                <div className="track-effect">
                  <strong>Now:</strong> {track.tiers[current - 1].effect}
                </div>
                <div className="tier-ladder">
                  {track.tiers.map((t, i) => (
                    <div
                      key={t.tier}
                      className={"tier-pip" + (i < current ? " owned" : "") + (i === current ? " next" : "")}
                    />
                  ))}
                </div>
                {nextTier ? (
                  <>
                    <div className="next-tier">
                      <div className="next-label">Next — Tier {nextTier.tier}: {nextTier.effect}</div>
                      <div className="next-cost">
                        {Object.keys(nextTier.cost).map(k => {
                          const res = SIGNATURE_RESOURCES.find(r => r.id === k);
                          const have = Math.floor((inventory && inventory[k]) || 0);
                          const need = nextTier.cost[k];
                          const ok = have >= need;
                          return (
                            <span key={k} className={"cost-chip" + (ok ? "" : " short")}>
                              {res ? res.name : k}: {have}/{need}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                    <button
                      className="primary"
                      disabled={!affordable}
                      onClick={() => onBuyUpgrade(track.id)}
                    >
                      {affordable ? "Upgrade" : "Not enough resources"}
                    </button>
                  </>
                ) : (
                  <div className="next-label" style={{ color: "var(--accent)" }}>Maxed.</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ---------- Star chart (3 stub systems, working jump) ----------
function StarChart({ currentSystemId, driveTier, onJump, onEnter }) {
  const [selectedId, setSelectedId] = useState(currentSystemId);
  const selected = STUB_SYSTEMS.find(s => s.id === selectedId);

  const maxHops = driveTier >= 5 ? 999 : driveTier;
  const reachable = reachableSystems(currentSystemId, maxHops);

  // Build lane lines (deduped).
  const lanes = [];
  const seen = new Set();
  STUB_SYSTEMS.forEach(s => {
    s.connections.forEach(otherId => {
      const key = [s.id, otherId].sort().join("|");
      if (seen.has(key)) return;
      seen.add(key);
      const other = STUB_SYSTEMS.find(o => o.id === otherId);
      if (!other) return;
      const dx = other.x - s.x;
      const dy = other.y - s.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      lanes.push({ key, x: s.x, y: s.y, len, angle });
    });
  });

  const canJump =
    selected &&
    selected.id !== currentSystemId &&
    reachable.has(selected.id);

  return (
    <div className="chart">
      <div className="chart-canvas">
        {lanes.map(l => (
          <div
            key={l.key}
            className="lane"
            style={{
              left: l.x + "px",
              top: l.y + "px",
              width: l.len + "px",
              transform: `rotate(${l.angle}deg)`
            }}
          />
        ))}
        {STUB_SYSTEMS.map(s => {
          const isReachable = reachable.has(s.id);
          const isCurrent = s.id === currentSystemId;
          return (
            <React.Fragment key={s.id}>
              <div
                className={"system-dot" + (isCurrent ? " current" : "") + (!isReachable && !isCurrent ? " dim" : "")}
                style={{ left: s.x + "px", top: s.y + "px" }}
                onClick={() => setSelectedId(s.id)}
                title={s.name}
              />
              <div
                className="system-label"
                style={{ left: s.x + "px", top: s.y + "px", opacity: isReachable || isCurrent ? 1 : 0.35 }}
              >
                {s.name}
              </div>
            </React.Fragment>
          );
        })}
      </div>
      {selected && (
        <div className="system-info">
          <h3>{selected.name} {selected.id === currentSystemId && <span style={{color:"var(--ink-dim)", fontSize:13}}>— here</span>}</h3>
          <div className="desc">{selected.description}</div>
          <div className="planets">
            {selected.planets.map(p => {
              const type = PLANET_TYPES.find(t => t.id === p.type);
              const stage = TERRAFORM_STAGES[p.stage];
              return (
                <div key={p.id} className="planet-line">
                  • <strong>{p.name}</strong> — {type ? type.name : p.type} ({stage.name})
                </div>
              );
            })}
          </div>
          <div className="actions">
            {selected.id === currentSystemId ? (
              <button className="primary" onClick={onEnter}>
                Enter System
              </button>
            ) : (
              <button
                className="primary"
                disabled={!canJump}
                onClick={() => onJump(selected.id)}
              >
                {canJump ? "Jump" : (reachable.has(selected.id) ? "Already here" : "Out of drive range")}
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- System map (top-down orbital view of one system) ----------
function SystemMap({ systemId, worlds, onBack, onLand }) {
  const system = STUB_SYSTEMS.find(s => s.id === systemId);
  const [selectedPlanetId, setSelectedPlanetId] = useState(null);
  if (!system) return null;

  const cx = 380, cy = 250;
  const baseRadius = 70;
  const orbitStep = 55;

  // Stable angle per planet: evenly spaced, offset by orbit index for visual variety.
  const laidOut = system.planets.map((p, i) => {
    const n = system.planets.length;
    const radius = baseRadius + p.orbit * orbitStep;
    const angle = ((i * 360 / n) + p.orbit * 37) * Math.PI / 180;
    return {
      ...p,
      radius,
      px: cx + radius * Math.cos(angle),
      py: cy + radius * Math.sin(angle)
    };
  });

  const selected = laidOut.find(p => p.id === selectedPlanetId);
  const selectedType = selected && PLANET_TYPES.find(t => t.id === selected.type);
  const selectedWorld = selected && worlds && worlds[selected.id];
  const selectedStageIdx = selectedWorld ? selectedWorld.stage : (selected ? selected.stage : 0);
  const selectedStage = selected && TERRAFORM_STAGES[selectedStageIdx];

  return (
    <div className="system-map">
      <div className="system-canvas">
        {laidOut.map(p => (
          <div
            key={"ring-" + p.id}
            className="orbit-ring"
            style={{
              left: cx + "px",
              top: cy + "px",
              width: (p.radius * 2) + "px",
              height: (p.radius * 2) + "px"
            }}
          />
        ))}
        <div
          className="star-body"
          style={{
            left: cx + "px",
            top: cy + "px",
            background: `radial-gradient(circle at 35% 35%, #fff, ${system.star.color} 60%, #6a4a1a 100%)`
          }}
        />
        <div className="star-label" style={{ left: cx + "px", top: cy + "px" }}>
          {system.star.name} — {system.star.kind}
        </div>
        {laidOut.map(p => (
          <React.Fragment key={p.id}>
            <div
              className={"planet-body" + (p.id === selectedPlanetId ? " selected" : "")}
              style={{
                left: p.px + "px",
                top: p.py + "px",
                background: PLANET_COLORS[p.type] || "#888"
              }}
              onClick={() => setSelectedPlanetId(p.id)}
              title={p.name}
            />
            <div className="planet-label" style={{ left: p.px + "px", top: p.py + "px" }}>
              {p.name}
            </div>
          </React.Fragment>
        ))}
      </div>
      <div className="system-info">
        <h3>{system.name} System</h3>
        <div className="desc">{system.description}</div>
        {selected ? (
          <div className="planets">
            <div className="planet-line">
              <strong>{selected.name}</strong> — {selectedType ? selectedType.name : selected.type} ({selectedStage.name})
            </div>
            <div className="desc" style={{ marginTop: 6 }}>
              {selectedType ? selectedType.puzzle : ""}
            </div>
            <div className="desc" style={{ marginTop: 4 }}>
              {selectedStage.desc}
            </div>
            {selectedWorld && (selectedWorld.machines || []).length > 0 && (
              <div className="desc" style={{ marginTop: 6, color: "var(--ink-dim)" }}>
                {selectedWorld.machines.length} machine{selectedWorld.machines.length === 1 ? "" : "s"} placed.
              </div>
            )}
            {(() => {
              const resId = PLANET_TYPE_RESOURCE[selected.type];
              const res = SIGNATURE_RESOURCES.find(r => r.id === resId);
              const isRocky = selected.type === "rocky";
              const rate = selectedWorld && (isRocky
                ? ROCKY_PRODUCTION_PER_STAGE[selectedStageIdx]
                : PRODUCTION_PER_STAGE[selectedStageIdx]);
              return res && (
                <div style={{ marginTop: 8, fontSize: 12, borderTop: "1px solid var(--line)", paddingTop: 8 }}>
                  <div style={{ color: "var(--accent)", fontWeight: "bold", marginBottom: 3 }}>
                    Produces: {res.name}
                  </div>
                  <div style={{ color: "var(--ink-dim)" }}>
                    {isRocky
                      ? `Active — ${(rate || 0).toFixed(2)}/s (accelerates each stage)`
                      : selectedStageIdx >= 3
                        ? `Active — ${rate.toFixed(2)}/s (${TERRAFORM_STAGES[selectedStageIdx].name})`
                        : `Begins at Flora stage (stage 3)`}
                  </div>
                  <div style={{ color: "var(--ink-dim)", fontSize: 11, marginTop: 2 }}>
                    {res.used_for}
                  </div>
                </div>
              );
            })()}
          </div>
        ) : (
          <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>
            Click a planet to inspect it.
          </div>
        )}
        <div className="actions">
          <button onClick={onBack}>Back to Star Chart</button>
          {selected && (
            <button className="primary" onClick={() => onLand(selected.id)}>Land</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- Planet surface (top-down tile grid, click-to-place machines) ----------
function PlanetSurface({ planetId, world, inventory, onPlace, onDeconstruct, onBack, placementError, onClearError }) {
  const [selectedMachineType, setSelectedMachineType] = useState(null);
  const [inspecting, setInspecting] = useState(null); // { machine, def, x, y }
  const found = findPlanet(planetId);
  if (!found || !world) return null;
  const { planet } = found;
  const planetType = PLANET_TYPES.find(t => t.id === planet.type);
  const stage = world.stage;
  const stageDef = TERRAFORM_STAGES[stage];
  const machines = world.machines || [];
  const pps = calcWorldPps(machines, stage);
  const progress = world.progress || 0;
  const progressPct = stage >= 5 ? 100 : Math.min(100, (progress / STAGE_THRESHOLD) * 100);
  const secondsToNext = (stage >= 5 || pps === 0) ? null : Math.ceil((STAGE_THRESHOLD - progress) / pps);

  const tileUrl = `./assets/tiles/tile-${planet.type}-${stage}.jpg`;

  // Show all machines — active ones first, then idle ones.
  const allMachines = MACHINES.slice().sort((a, b) => {
    const aActive = a.activeStages.indexOf(stage) !== -1 || a.id === "solar_array" || a.id === "storage_silo";
    const bActive = b.activeStages.indexOf(stage) !== -1 || b.id === "solar_array" || b.id === "storage_silo";
    if (aActive && !bActive) return -1;
    if (!aActive && bActive) return 1;
    return 0;
  });

  const occupied = new Map();
  machines.forEach(m => occupied.set(m.x + "," + m.y, m));

  function handleTileClick(x, y) {
    const m = occupied.get(x + "," + y);
    if (m) {
      const def = MACHINES.find(md => md.id === m.type);
      setInspecting({ machine: m, def: def, x: x, y: y });
      setSelectedMachineType(null);
      return;
    }
    setInspecting(null);
    if (!selectedMachineType) return;
    onPlace(planetId, selectedMachineType, x, y);
  }

  const tiles = [];
  for (let y = 0; y < SURFACE_GRID_ROWS; y++) {
    for (let x = 0; x < SURFACE_GRID_COLS; x++) {
      const key = x + "," + y;
      const m = occupied.get(key);
      const machineDef = m && MACHINES.find(md => md.id === m.type);
      const pipColor = machineDef && MACHINE_CATEGORY_COLORS[machineDef.stage];
      const isIdle = machineDef && machineDef.activeStages.indexOf(stage) === -1 && m.type !== "solar_array";
      const isInspected = inspecting && inspecting.machine.id === (m && m.id);
      tiles.push(
        <div
          key={key}
          className={"tile" + (m ? " occupied" : "") + (selectedMachineType && !m ? " placing" : "") + (isInspected ? " inspected" : "")}
          onClick={() => handleTileClick(x, y)}
          title={machineDef ? machineDef.name + (isIdle ? " (idle)" : "") : ""}
        >
          {m && (
            <div className="machine-pip" style={{ background: pipColor, opacity: isIdle ? 0.35 : 1 }} />
          )}
        </div>
      );
    }
  }

  // Silo info for the info panel.
  const siloCount = machines.filter(m => m.type === "storage_silo").length;
  const siloMult = siloCount > 0 ? Math.pow(1.15, siloCount) : 1;

  // Count solars on this planet for sidebar display.
  const solarCount = machines.filter(m => m.type === "solar_array").length;
  const solarBoostPct = Math.round(solarCount * 10);

  // Count active vs idle placed machines.
  const activePlaced = machines.filter(m => {
    const def = MACHINES.find(md => md.id === m.type);
    return def && def.pps > 0 && def.activeStages.indexOf(stage) !== -1;
  }).length;
  const idlePlaced = machines.filter(m => {
    const def = MACHINES.find(md => md.id === m.type);
    return def && m.type !== "solar_array" && (def.pps === 0 || def.activeStages.indexOf(stage) === -1);
  }).length;

  function formatTime(sec) {
    if (sec == null) return "—";
    if (sec < 60) return sec + "s";
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + "m " + s + "s";
  }

  return (
    <div className="surface">
      <div className="surface-sidebar">
        <h4>Machines</h4>
        {allMachines.map(m => {
          const affordable = canAfford(inventory || {}, m.cost);
          const isActive = m.activeStages.indexOf(stage) !== -1;
          const isSilo = m.id === "storage_silo";
          const isSolar = m.id === "solar_array";
          const isIdle = !isActive && !isSilo && !isSolar;
          const stageNames = m.activeStages.map(s => ACTIVE_STAGE_NAMES[s]).filter(Boolean);
          return (
            <div
              key={m.id}
              className={
                "machine-option" +
                (selectedMachineType === m.id ? " selected" : "") +
                (!affordable ? " disabled" : "") +
                (isIdle ? " idle" : "")
              }
              onClick={() => { if (affordable) { setSelectedMachineType(m.id); setInspecting(null); } }}
            >
              <div className="pip-sample" style={{ background: MACHINE_CATEGORY_COLORS[m.stage], opacity: isIdle ? 0.35 : 1 }} />
              <div>
                <div className="m-name">
                  {m.name} <span style={{ fontSize: 10, color: "var(--ink-dim)", fontWeight: "normal" }}>T{m.tier}</span>
                  {isIdle && <span className="m-idle"> (idle at this stage)</span>}
                  {isActive && <span className="m-active"> (active)</span>}
                  {isSilo && stage >= 3 && <span className="m-active"> (+{Math.round((1.15 - 1) * 100)}% production)</span>}
                  {isSolar && solarCount > 0 && <span className="m-active"> (+{solarBoostPct}% machine output — {solarCount} solar{solarCount !== 1 ? "s" : ""} on this planet)</span>}
                </div>
                <div className="m-desc">{m.desc}</div>
                <div className="m-stats">
                  {m.pps > 0 ? (
                    <span>{m.pps} pts/s</span>
                  ) : isSilo ? (
                    <span>×1.15 resource output</span>
                  ) : isSolar ? (
                    <span>+10% machine output each</span>
                  ) : null}
                  {stageNames.length > 0 && (
                    <span className="m-stages">{stageNames.join(", ")}</span>
                  )}
                </div>
                <div className="m-cost">
                  {Object.keys(m.cost).map(k => {
                    const res = SIGNATURE_RESOURCES.find(r => r.id === k);
                    const have = Math.floor((inventory && inventory[k]) || 0);
                    const need = m.cost[k];
                    return (
                      <span key={k} className={"cost-chip" + (have < need ? " short" : "")}>
                        {res ? res.name : k}: {have}/{need}
                      </span>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })}
        <div style={{ color: "var(--ink-dim)", fontSize: 11, marginTop: 10, fontStyle: "italic" }}>
          {selectedMachineType ? "Click an empty tile to place." : "Click a machine to build, or a placed machine to inspect."}
        </div>
      </div>

      <div className="surface-main" style={{ position: "relative" }}>
        <div className="tile-grid" style={{ backgroundImage: `url('${tileUrl}')` }}>{tiles}</div>
        {inspecting && inspecting.def && (() => {
          const d = inspecting.def;
          const m = inspecting.machine;
          const isSolar = d.id === "solar_array";
          const isSilo = d.id === "storage_silo";
          const isActive = d.activeStages.indexOf(stage) !== -1;
          const statusLabel = isSolar ? "Infrastructure (boost)" : isSilo ? "Infrastructure (storage)" : isActive ? "Active" : "Idle";
          const refund = {};
          if (d.cost) { for (const k in d.cost) refund[k] = Math.floor(d.cost[k] * 0.75); }
          const hasRefund = Object.keys(refund).some(k => refund[k] > 0);
          // Position popup near the clicked tile.
          const popLeft = Math.min(inspecting.x * 46 + 6, 12 * 46 - 230);
          const popTop = inspecting.y * 46 + 52;
          return (
            <div className="deconstruct-popup" style={{ left: popLeft, top: popTop }}>
              <div className="dp-name">{d.name}</div>
              <div className="dp-status">{statusLabel}</div>
              <div className="dp-refund">
                {hasRefund ? "Refund: " : "No refund."}
                {Object.keys(refund).map(k => {
                  if (refund[k] <= 0) return null;
                  const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
                  return <span key={k} className="chip">{r ? r.name : k}: {refund[k]}</span>;
                })}
              </div>
              <div className="dp-actions">
                <button className="danger" onClick={() => { onDeconstruct(planetId, m.id); setInspecting(null); }}>Deconstruct</button>
                <button onClick={() => setInspecting(null)}>Cancel</button>
              </div>
            </div>
          );
        })()}
        {placementError && (
          <div className="placement-error" onClick={onClearError}>
            {placementError}
            <span className="dismiss">dismiss</span>
          </div>
        )}
        <button onClick={onBack}>Back to System</button>
      </div>

      <div className="surface-info">
        <h3>{planet.name}</h3>
        <div style={{ color: "var(--ink-dim)", fontStyle: "italic", fontSize: 13, marginBottom: 8 }}>
          {planetType ? planetType.name : planet.type} — {planetType ? planetType.puzzle : ""}
        </div>
        <div className="row"><span>Stage</span><strong>{stageDef.name}</strong></div>
        <div className="progress-outer">
          <div className="progress-inner" style={{ width: progressPct + "%" }} />
        </div>
        <div className="row"><span>Progress</span><strong>{Math.floor(progress)} / {STAGE_THRESHOLD}</strong></div>
        <div className="row"><span>Machines</span><strong>{machines.length} ({activePlaced} active, {idlePlaced} idle)</strong></div>
        <div className="row"><span>Points / sec</span><strong>{pps.toFixed(1)}</strong></div>
        <div className="row">
          <span>Next stage in</span>
          <strong>{stage >= 5 ? "—" : (pps === 0 ? "place a machine" : formatTime(secondsToNext))}</strong>
        </div>
        {(() => {
          const isRocky = planet.type === "rocky";
          const resId = PLANET_TYPE_RESOURCE[planet.type];
          const res = SIGNATURE_RESOURCES.find(r => r.id === resId);
          const lp = world.lifetimeProduction || {};
          let prodLabel, prodRate;
          if (isRocky) {
            const rawRate = ROCKY_PRODUCTION_PER_STAGE[stage] || 0;
            prodRate = rawRate * siloMult;
            prodLabel = (res ? res.name : "Common Ore") + ": +" + prodRate.toFixed(2) + "/s";
          } else if (stage >= 3 && res) {
            const rawRate = PRODUCTION_PER_STAGE[stage] || 0;
            prodRate = rawRate * siloMult;
            prodLabel = res.name + ": +" + prodRate.toFixed(2) + "/s";
          } else {
            prodRate = BASE_ORE_TRICKLE;
            prodLabel = "Common Ore: +" + prodRate.toFixed(2) + "/s (base trickle)";
          }
          const showSiloNote = siloCount > 0 && ((isRocky) || (stage >= 3));
          // Summarise lifetime production across all resources this world has produced.
          const lpEntries = Object.keys(lp).filter(k => lp[k] > 0).map(k => {
            const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
            return (r ? r.name : k) + ": " + Math.floor(lp[k]);
          });
          return (
            <div style={{ marginTop: 10, paddingTop: 8, borderTop: "1px solid var(--line)" }}>
              <div className="row" style={{ fontWeight: "bold", color: "var(--accent)", marginBottom: 2 }}>
                <span>Production</span>
              </div>
              <div className="row"><span>{prodLabel}</span></div>
              {showSiloNote && (
                <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)" }}>
                  <span>×{siloMult.toFixed(2)} from {siloCount} silo{siloCount > 1 ? "s" : ""}</span>
                </div>
              )}
              {lpEntries.length > 0 && (
                <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)", marginTop: 2 }}>
                  <span>Lifetime: {lpEntries.join(", ")}</span>
                </div>
              )}
            </div>
          );
        })()}
        <div style={{ marginTop: 8, fontSize: 12, color: "var(--ink-dim)" }}>
          {stageDef.desc}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
