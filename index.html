<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tender</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./game-data.js"></script>
<style>
  :root {
    --bg: #0b0f1a;
    --bg-soft: #141a2b;
    --bg-soft-2: #1c2338;
    --ink: #e8ecf5;
    --ink-dim: #9aa3bd;
    --accent: #f4c46d;
    --accent-soft: #c6a55a;
    --line: #2a3350;
  }
  * { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  }
  button {
    font-family: inherit;
    background: var(--bg-soft-2);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #1a1408;
    border-color: var(--accent);
    font-weight: bold;
  }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  input[type="text"] {
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 16px;
  }

  .app { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .topbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
  }
  .topbar h1 { margin: 0; font-size: 20px; letter-spacing: 2px; color: var(--accent); }
  .topbar .spacer { flex: 1; }

  /* Character creation */
  .creation { padding: 30px; max-width: 1100px; margin: 0 auto; }
  .creation h2 { color: var(--accent); margin-top: 0; }
  .role-block { margin-bottom: 24px; }
  .role-block h3 { margin: 0 0 4px 0; }
  .role-block .domain { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .candidates { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .candidate {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 12px;
    border-radius: 4px;
    cursor: pointer;
  }
  .candidate:hover { border-color: var(--accent-soft); }
  .candidate.selected {
    border-color: var(--accent);
    background: var(--bg-soft-2);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .candidate .name { font-weight: bold; margin-bottom: 4px; }
  .candidate .blurb { font-size: 13px; color: var(--ink-dim); }
  .ship-name { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .launch-row { display: flex; justify-content: flex-end; }

  /* Ship view */
  .ship-view { padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .dollhouse {
    width: 1024px; max-width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 220px 220px;
    gap: 6px;
    padding: 6px;
  }
  .room {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    padding: 12px;
    position: relative;
    border-radius: 4px;
    cursor: pointer;
  }
  .room:hover { border-color: var(--accent-soft); }
  .room .room-name { font-size: 12px; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
  .room .room-desc { font-size: 13px; color: var(--ink-dim); margin-top: 6px; line-height: 1.4; }
  .room .crew-pip {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: var(--accent);
    color: #1a1408;
    border: none;
    border-radius: 14px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  .room .crew-pip:hover { background: #fff; }

  .dialog {
    margin-top: 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    max-width: 1024px;
    width: 100%;
    border-radius: 4px;
  }
  .dialog .speaker { color: var(--accent); font-weight: bold; }
  .dialog .line { font-style: italic; margin-top: 4px; color: var(--ink); }

  /* Star chart */
  .chart {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-canvas {
    width: 760px; height: 500px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
  }
  .system-dot {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 12px rgba(244,196,109,0.4);
  }
  .system-dot.current {
    background: #fff;
    box-shadow: 0 0 18px rgba(255,255,255,0.6);
  }
  .system-label {
    position: absolute;
    transform: translate(-50%, 14px);
    color: var(--ink);
    font-size: 12px;
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .lane {
    position: absolute;
    height: 1px;
    background: linear-gradient(to right, rgba(244,196,109,0.0), rgba(244,196,109,0.5), rgba(244,196,109,0.0));
    transform-origin: 0 0;
    pointer-events: none;
  }
  .system-info {
    margin-top: 14px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 12px 16px;
    width: 760px;
    border-radius: 4px;
  }
  .system-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .system-info .desc { color: var(--ink-dim); font-style: italic; margin-bottom: 8px; font-size: 14px; }
  .system-info .planets { font-size: 13px; }
  .system-info .planet-line { padding: 2px 0; }
  .system-info .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

  /* System map */
  .system-map {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .system-canvas {
    width: 760px; height: 500px;
    background: radial-gradient(ellipse at center, #131a2e 0%, #07090f 100%);
    border: 1px solid var(--line);
    position: relative;
    border-radius: 6px;
    overflow: hidden;
  }
  .orbit-ring {
    position: absolute;
    border: 1px dashed rgba(244,196,109,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .star-body {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 40px 8px rgba(244,196,109,0.35);
  }
  .star-label {
    position: absolute;
    transform: translate(-50%, 34px);
    font-size: 12px;
    color: var(--ink-dim);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  .planet-body {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(0,0,0,0.6);
  }
  .planet-body.selected {
    box-shadow: 0 0 0 2px var(--accent), 0 0 12px rgba(244,196,109,0.6);
  }
  .planet-label {
    position: absolute;
    transform: translate(-50%, 16px);
    font-size: 11px;
    color: var(--ink);
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }

  /* Planet surface */
  .surface {
    padding: 20px;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .surface-main { display: flex; flex-direction: column; gap: 12px; }
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(12, 44px);
    grid-template-rows: repeat(8, 44px);
    gap: 2px;
    background: var(--bg-soft);
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .tile {
    width: 44px; height: 44px;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    border: 1px solid rgba(0,0,0,0.25);
    transition: filter 0.15s;
  }
  .tile:hover { filter: brightness(1.2); }
  .tile.placing:hover { box-shadow: inset 0 0 0 2px var(--accent); }
  .tile.occupied { cursor: default; }
  .machine-pip {
    position: absolute;
    left: 50%; top: 50%;
    width: 26px; height: 26px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid #1a1408;
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold;
    color: #1a1408;
  }
  .surface-sidebar {
    width: 260px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px;
  }
  .surface-sidebar h4 { margin: 0 0 8px 0; color: var(--accent); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
  .machine-option {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .machine-option:hover { border-color: var(--accent-soft); }
  .machine-option.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .machine-option .pip-sample {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .machine-option .m-name { font-size: 13px; font-weight: bold; }
  .machine-option .m-desc { font-size: 11px; color: var(--ink-dim); }
  .surface-info {
    width: 280px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .surface-info h3 { margin: 0 0 4px 0; color: var(--accent); }
  .surface-info .row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--ink-dim); }
  .surface-info .row strong { color: var(--ink); }
  .progress-outer {
    height: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    margin: 6px 0;
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(to right, #6fbf73, #a8d8f0);
    transition: width 0.4s;
  }
  .stage-toast {
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    background: var(--bg-soft);
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    padding: 14px 22px;
    border-radius: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    z-index: 100;
    max-width: 520px;
  }
  .stage-toast .speaker { color: var(--accent); font-weight: bold; font-size: 13px; }
  .stage-toast .line { font-style: italic; margin-top: 4px; }
  .stage-toast .stage-note { margin-top: 6px; font-size: 12px; color: var(--ink-dim); }

  .placement-error {
    background: #3a1a1a;
    border: 1px solid #8a3a3a;
    border-left: 3px solid #c95a3a;
    color: #f5d0c0;
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .placement-error .dismiss { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* Inventory + upgrades (on Ship View) */
  .inventory-panel, .upgrade-panel {
    width: 1024px; max-width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 18px;
    margin-top: 16px;
  }
  .inventory-panel h4, .upgrade-panel h4 {
    margin: 0 0 10px 0;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .inventory-cell {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .inventory-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #1a1408;
    flex-shrink: 0;
  }
  .inventory-text { flex: 1; }
  .inv-name { font-size: 13px; font-weight: bold; }
  .inv-from { font-size: 11px; color: var(--ink-dim); font-style: italic; }
  .inv-amount {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
    font-family: "Iowan Old Style", Georgia, serif;
  }

  .upgrade-tracks {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .upgrade-track {
    background: var(--bg-soft-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .track-header { display: flex; justify-content: space-between; align-items: baseline; }
  .track-label { font-size: 15px; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
  .track-tier { font-size: 11px; color: var(--ink-dim); }
  .track-desc { font-size: 11px; color: var(--ink-dim); font-style: italic; line-height: 1.3; }
  .track-effect { font-size: 12px; color: var(--ink); }
  .tier-ladder { display: flex; gap: 4px; }
  .tier-pip {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .tier-pip.owned { background: var(--accent); border-color: var(--accent); }
  .tier-pip.next { border-color: var(--accent); }
  .next-label { font-size: 12px; font-weight: bold; }
  .next-cost { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .cost-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .cost-chip.short { border-color: #8a3a3a; color: #f5b0a0; }
  .upgrade-track button { margin-top: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ---------- Save / load ----------
const SAVE_KEY = "tender.save.v1";

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.saveVersion !== SAVE_VERSION) return null;
    return data;
  } catch (e) {
    console.warn("Save load failed:", e);
    return null;
  }
}

function writeSave(state) {
  const blob = {
    saveVersion: SAVE_VERSION,
    shipName: state.shipName,
    crew: state.crew,
    currentSystemId: state.currentSystemId,
    worlds: state.worlds,
    inventory: state.inventory,
    upgrades: state.upgrades,
    lastTickTimestamp: Date.now()
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(blob));
}

// ---------- Growth tick (the architectural call from PRIMER.md) ----------
// Walks all in-progress worlds and advances stage thresholds based on installed machines.
// Phase 0: worlds dictionary is empty, machines aren't placed yet — but the plumbing exists
// so Phase 1 doesn't have to retrofit anything.
function applyGrowthTicks(worlds, inventory, elapsedSeconds) {
  if (!worlds) return { worlds: worlds, inventory: inventory || {} };
  const outWorlds = { ...worlds };
  const outInv = { ...(inventory || {}) };
  for (const id in outWorlds) {
    const w = { ...outWorlds[id] };
    const machineCount = (w.machines || []).length;
    if (machineCount > 0 && w.stage < 5) {
      w.progress = (w.progress || 0) + machineCount * MACHINE_POINTS_PER_SECOND * elapsedSeconds;
      while (w.progress >= STAGE_THRESHOLD && w.stage < 5) {
        w.progress -= STAGE_THRESHOLD;
        w.stage += 1;
      }
      if (w.stage >= 5) w.progress = 0;
    }
    // Resource production: Flora (3) and above produce the planet's signature resource.
    const rate = PRODUCTION_PER_STAGE[w.stage];
    if (rate) {
      const found = findPlanet(id);
      const resId = found && PLANET_TYPE_RESOURCE[found.planet.type];
      if (resId) {
        outInv[resId] = (outInv[resId] || 0) + rate * elapsedSeconds;
      }
    }
    outWorlds[id] = w;
  }
  return { worlds: outWorlds, inventory: outInv };
}

function emptyInventory() {
  const inv = {};
  SIGNATURE_RESOURCES.forEach(r => { inv[r.id] = 0; });
  return inv;
}
function defaultUpgrades() {
  return { hull: 1, drive: 1, lab: 1 };
}
function canAfford(inventory, cost) {
  if (!cost) return true;
  for (const k in cost) if ((inventory[k] || 0) < cost[k]) return false;
  return true;
}
function spend(inventory, cost) {
  const out = { ...inventory };
  if (!cost) return out;
  for (const k in cost) out[k] = (out[k] || 0) - cost[k];
  return out;
}
function countActiveWorlds(worlds) {
  let n = 0;
  for (const id in worlds) {
    const w = worlds[id];
    if ((w.machines || []).length > 0 && w.stage < 5) n++;
  }
  return n;
}

// Diff two worlds maps and return list of stage-advance events.
function stageAdvanceEvents(prev, next) {
  const events = [];
  for (const id in next) {
    const p = prev && prev[id];
    if (p && next[id].stage > p.stage) {
      events.push({ planetId: id, newStage: next[id].stage });
    }
  }
  return events;
}

// Look up a planet by id across stub systems. Returns {system, planet} or null.
function findPlanet(planetId) {
  for (const sys of STUB_SYSTEMS) {
    const p = sys.planets.find(pl => pl.id === planetId);
    if (p) return { system: sys, planet: p };
  }
  return null;
}

// ---------- Root app ----------
function App() {
  const [state, setState] = useState(() => {
    const saved = loadSave();
    if (saved) {
      const now = Date.now();
      const elapsed = Math.min(
        Math.floor((now - (saved.lastTickTimestamp || now)) / 1000),
        OFFLINE_TICK_CAP_SECONDS
      );
      const startInv = { ...emptyInventory(), ...(saved.inventory || {}) };
      const result = applyGrowthTicks(saved.worlds || {}, startInv, elapsed);
      return {
        screen: "ship",
        shipName: saved.shipName,
        crew: saved.crew,
        currentSystemId: saved.currentSystemId || "harbor",
        currentPlanetId: null,
        worlds: result.worlds,
        inventory: result.inventory,
        upgrades: { ...defaultUpgrades(), ...(saved.upgrades || {}) },
        stageToast: null,
        placementError: null
      };
    }
    return {
      screen: "creation",
      shipName: "",
      crew: { botanist: null, engineer: null, cartographer: null, cook: null },
      currentSystemId: "harbor",
      currentPlanetId: null,
      worlds: {},
      inventory: emptyInventory(),
      upgrades: defaultUpgrades(),
      stageToast: null,
      placementError: null
    };
  });

  // Live tick during play (cozy interval). Ticks every 2 seconds for responsive feedback
  // on the surface view — this is a cozy game, the math is cheap.
  useEffect(() => {
    if (state.screen === "creation") return;
    const handle = setInterval(() => {
      setState(s => {
        const result = applyGrowthTicks(s.worlds, s.inventory, 2);
        const next = result.worlds;
        const events = stageAdvanceEvents(s.worlds, next);
        let toast = s.stageToast;
        if (events.length > 0) {
          const ev = events[events.length - 1];
          const congrats = STAGE_CONGRATS[ev.newStage];
          if (congrats) {
            const roleDef = CREW_ROLES.find(r => r.id === congrats.role);
            const pickedId = s.crew[congrats.role];
            const cand = roleDef && roleDef.candidates.find(c => c.id === pickedId);
            toast = {
              planetId: ev.planetId,
              newStage: ev.newStage,
              speaker: cand ? cand.name : (roleDef ? roleDef.label : congrats.role),
              line: congrats.line,
              ts: Date.now()
            };
          }
        }
        return { ...s, worlds: next, inventory: result.inventory, stageToast: toast };
      });
    }, 2000);
    return () => clearInterval(handle);
  }, [state.screen]);

  // Auto-dismiss the stage toast after a few seconds so it doesn't linger.
  useEffect(() => {
    if (!state.stageToast) return;
    const h = setTimeout(() => {
      setState(s => (s.stageToast && s.stageToast.ts === state.stageToast.ts ? { ...s, stageToast: null } : s));
    }, 7000);
    return () => clearTimeout(h);
  }, [state.stageToast]);

  // Persist on meaningful changes.
  useEffect(() => {
    if (state.screen === "creation") return;
    writeSave(state);
  }, [state.screen, state.shipName, state.crew, state.currentSystemId, state.currentPlanetId, state.worlds, state.inventory, state.upgrades]);

  function finishCreation(shipName, crew) {
    setState(s => ({ ...s, screen: "ship", shipName, crew }));
  }
  function goTo(screen) {
    setState(s => ({ ...s, screen }));
  }
  function jumpTo(systemId) {
    setState(s => ({ ...s, currentSystemId: systemId }));
  }
  function enterSystem() {
    setState(s => ({ ...s, screen: "system" }));
  }
  function landOnPlanet(planetId) {
    setState(s => {
      const worlds = { ...s.worlds };
      if (!worlds[planetId]) {
        const found = findPlanet(planetId);
        worlds[planetId] = {
          stage: (found && found.planet.stage) || 0,
          progress: 0,
          machines: []
        };
      }
      return { ...s, screen: "surface", currentPlanetId: planetId, worlds };
    });
  }
  function backToSystem() {
    setState(s => ({ ...s, screen: "system", currentPlanetId: null }));
  }
  function placeMachine(planetId, machineType, x, y) {
    setState(s => {
      const worlds = { ...s.worlds };
      const w = { ...(worlds[planetId] || { stage: 0, progress: 0, machines: [] }) };
      if ((w.machines || []).some(m => m.x === x && m.y === y)) return s;
      // Hull capacity: placing the FIRST machine on a world occupies a slot.
      // Paradise worlds (stage 5) don't count against the limit.
      const isFirstMachine = (w.machines || []).length === 0;
      if (isFirstMachine && w.stage < 5) {
        const limit = hullWorldLimit(s.upgrades.hull);
        if (countActiveWorlds(s.worlds) >= limit) {
          return {
            ...s,
            placementError: "Hull capacity reached — upgrade your ship or complete a world to Paradise."
          };
        }
      }
      w.machines = [...(w.machines || []), { id: Date.now() + Math.random(), type: machineType, x, y }];
      worlds[planetId] = w;
      return { ...s, worlds, placementError: null };
    });
  }
  function clearPlacementError() {
    setState(s => (s.placementError ? { ...s, placementError: null } : s));
  }
  function buyUpgrade(trackId) {
    setState(s => {
      const track = UPGRADE_TRACKS.find(t => t.id === trackId);
      if (!track) return s;
      const current = s.upgrades[trackId] || 1;
      if (current >= track.tiers.length) return s;
      const nextTier = track.tiers[current];
      if (!canAfford(s.inventory, nextTier.cost)) return s;
      return {
        ...s,
        inventory: spend(s.inventory, nextTier.cost),
        upgrades: { ...s.upgrades, [trackId]: current + 1 }
      };
    });
  }
  function resetGame() {
    if (!confirm("Wipe save and return to character creation?")) return;
    localStorage.removeItem(SAVE_KEY);
    setState({
      screen: "creation",
      shipName: "",
      crew: { botanist: null, engineer: null, cartographer: null, cook: null },
      currentSystemId: "harbor",
      currentPlanetId: null,
      worlds: {},
      inventory: emptyInventory(),
      upgrades: defaultUpgrades(),
      stageToast: null,
      placementError: null
    });
  }

  if (state.screen === "creation") {
    return <CharacterCreation onFinish={finishCreation} />;
  }

  return (
    <div className="app">
      <div className="topbar">
        <h1>TENDER</h1>
        <span style={{ color: "var(--ink-dim)" }}>— {state.shipName}</span>
        <div className="spacer" />
        <button onClick={() => goTo("ship")}>Ship</button>
        <button onClick={() => goTo("chart")}>Star Chart</button>
        <button onClick={resetGame}>Reset</button>
      </div>
      {state.screen === "ship" && (
        <ShipView
          crew={state.crew}
          inventory={state.inventory}
          upgrades={state.upgrades}
          onBuyUpgrade={buyUpgrade}
        />
      )}
      {state.screen === "chart" && (
        <StarChart
          currentSystemId={state.currentSystemId}
          onJump={jumpTo}
          onEnter={enterSystem}
        />
      )}
      {state.screen === "system" && (
        <SystemMap
          systemId={state.currentSystemId}
          worlds={state.worlds}
          onBack={() => goTo("chart")}
          onLand={landOnPlanet}
        />
      )}
      {state.screen === "surface" && state.currentPlanetId && (
        <PlanetSurface
          planetId={state.currentPlanetId}
          world={state.worlds[state.currentPlanetId]}
          onPlace={placeMachine}
          onBack={backToSystem}
          placementError={state.placementError}
          onClearError={clearPlacementError}
        />
      )}
      {state.stageToast && (
        <div className="stage-toast">
          <div className="speaker">{state.stageToast.speaker}</div>
          <div className="line">{state.stageToast.line}</div>
          <div className="stage-note">
            {(() => {
              const f = findPlanet(state.stageToast.planetId);
              const stageName = TERRAFORM_STAGES[state.stageToast.newStage].name;
              return f ? `${f.planet.name} — ${stageName}` : stageName;
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- Character creation ----------
function CharacterCreation({ onFinish }) {
  const [shipName, setShipName] = useState("");
  const [picks, setPicks] = useState({ botanist: null, engineer: null, cartographer: null, cook: null });

  const allPicked = CREW_ROLES.every(r => picks[r.id]) && shipName.trim().length > 0;

  function pick(roleId, candidateId) {
    setPicks(p => ({ ...p, [roleId]: candidateId }));
  }

  return (
    <div className="creation">
      <h2>Choose your crew</h2>
      <p style={{ color: "var(--ink-dim)" }}>
        Four people. Permanent for the run. In a galaxy with no other intelligent life,
        these are the only voices you'll hear.
      </p>
      {CREW_ROLES.map(role => (
        <div key={role.id} className="role-block">
          <h3>{role.label}</h3>
          <div className="domain">{role.domain}</div>
          <div className="candidates">
            {role.candidates.map(c => (
              <div
                key={c.id}
                className={"candidate" + (picks[role.id] === c.id ? " selected" : "")}
                onClick={() => pick(role.id, c.id)}
              >
                <div className="name">{c.name}</div>
                <div className="blurb">{c.blurb}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div className="ship-name">
        <label htmlFor="shipname">Ship name:</label>
        <input
          id="shipname"
          type="text"
          value={shipName}
          onChange={e => setShipName(e.target.value)}
          placeholder="The…"
        />
      </div>
      <div className="launch-row">
        <button
          className="primary"
          disabled={!allPicked}
          onClick={() => onFinish(shipName.trim(), picks)}
        >
          Launch
        </button>
      </div>
    </div>
  );
}

// ---------- Ship view (dollhouse) ----------
function ShipView({ crew, inventory, upgrades, onBuyUpgrade }) {
  const [activeLine, setActiveLine] = useState(null);
  const [activeRoom, setActiveRoom] = useState(null);

  // Map crew picks back to role + candidate objects, then drop them in default rooms.
  const occupants = {};
  CREW_ROLES.forEach(role => {
    const pickedId = crew[role.id];
    if (!pickedId) return;
    const cand = role.candidates.find(c => c.id === pickedId);
    if (!occupants[role.defaultRoom]) occupants[role.defaultRoom] = [];
    occupants[role.defaultRoom].push({ role, cand });
  });

  function speak(role, cand) {
    setActiveLine({
      speaker: cand.name,
      line: PLACEHOLDER_LINES[role.id] || "\"…\""
    });
    setActiveRoom(null);
  }
  function describe(room) {
    setActiveRoom(room);
    setActiveLine(null);
  }

  return (
    <div className="ship-view">
      <div className="dollhouse">
        {SHIP_ROOMS.map(room => (
          <div key={room.id} className="room" onClick={() => describe(room)}>
            <div className="room-name">{room.name}</div>
            <div className="room-desc">{room.desc}</div>
            {(occupants[room.id] || []).map(({ role, cand }, i) => (
              <button
                key={cand.id}
                className="crew-pip"
                style={{ bottom: 10 + i * 28 }}
                onClick={(e) => { e.stopPropagation(); speak(role, cand); }}
              >
                {cand.name}
              </button>
            ))}
          </div>
        ))}
      </div>
      {activeLine && (
        <div className="dialog">
          <div className="speaker">{activeLine.speaker}</div>
          <div className="line">{activeLine.line}</div>
        </div>
      )}
      {activeRoom && (
        <div className="dialog">
          <div className="speaker">{activeRoom.name}</div>
          <div className="line">{activeRoom.desc}</div>
        </div>
      )}

      <div className="inventory-panel">
        <h4>Stockpiles</h4>
        <div className="inventory-grid">
          {SIGNATURE_RESOURCES.map(r => {
            const amt = Math.floor((inventory && inventory[r.id]) || 0);
            return (
              <div key={r.id} className="inventory-cell">
                <div
                  className="inventory-swatch"
                  style={{ background: PLANET_COLORS[r.from] || "#888" }}
                />
                <div className="inventory-text">
                  <div className="inv-name">{r.name}</div>
                  <div className="inv-from">from {r.from}</div>
                </div>
                <div className="inv-amount">{amt}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="upgrade-panel">
        <h4>Ship Upgrades</h4>
        <div className="upgrade-tracks">
          {UPGRADE_TRACKS.map(track => {
            const current = (upgrades && upgrades[track.id]) || 1;
            const atMax = current >= track.tiers.length;
            const nextTier = atMax ? null : track.tiers[current];
            const affordable = nextTier && canAfford(inventory || {}, nextTier.cost);
            return (
              <div key={track.id} className="upgrade-track">
                <div className="track-header">
                  <div className="track-label">{track.label}</div>
                  <div className="track-tier">Tier {current} / {track.tiers.length}</div>
                </div>
                <div className="track-desc">{track.desc}</div>
                <div className="track-effect">
                  <strong>Now:</strong> {track.tiers[current - 1].effect}
                </div>
                <div className="tier-ladder">
                  {track.tiers.map((t, i) => (
                    <div
                      key={t.tier}
                      className={"tier-pip" + (i < current ? " owned" : "") + (i === current ? " next" : "")}
                    />
                  ))}
                </div>
                {nextTier ? (
                  <>
                    <div className="next-tier">
                      <div className="next-label">Next — Tier {nextTier.tier}: {nextTier.effect}</div>
                      <div className="next-cost">
                        {Object.keys(nextTier.cost).map(k => {
                          const res = SIGNATURE_RESOURCES.find(r => r.id === k);
                          const have = Math.floor((inventory && inventory[k]) || 0);
                          const need = nextTier.cost[k];
                          const ok = have >= need;
                          return (
                            <span key={k} className={"cost-chip" + (ok ? "" : " short")}>
                              {res ? res.name : k}: {have}/{need}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                    <button
                      className="primary"
                      disabled={!affordable}
                      onClick={() => onBuyUpgrade(track.id)}
                    >
                      {affordable ? "Upgrade" : "Not enough resources"}
                    </button>
                  </>
                ) : (
                  <div className="next-label" style={{ color: "var(--accent)" }}>Maxed.</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ---------- Star chart (3 stub systems, working jump) ----------
function StarChart({ currentSystemId, onJump, onEnter }) {
  const [selectedId, setSelectedId] = useState(currentSystemId);
  const selected = STUB_SYSTEMS.find(s => s.id === selectedId);
  const current  = STUB_SYSTEMS.find(s => s.id === currentSystemId);

  // Build lane lines (deduped).
  const lanes = [];
  const seen = new Set();
  STUB_SYSTEMS.forEach(s => {
    s.connections.forEach(otherId => {
      const key = [s.id, otherId].sort().join("|");
      if (seen.has(key)) return;
      seen.add(key);
      const other = STUB_SYSTEMS.find(o => o.id === otherId);
      if (!other) return;
      const dx = other.x - s.x;
      const dy = other.y - s.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      lanes.push({ key, x: s.x, y: s.y, len, angle });
    });
  });

  const canJump =
    selected &&
    selected.id !== currentSystemId &&
    current.connections.includes(selected.id);

  return (
    <div className="chart">
      <div className="chart-canvas">
        {lanes.map(l => (
          <div
            key={l.key}
            className="lane"
            style={{
              left: l.x + "px",
              top: l.y + "px",
              width: l.len + "px",
              transform: `rotate(${l.angle}deg)`
            }}
          />
        ))}
        {STUB_SYSTEMS.map(s => (
          <React.Fragment key={s.id}>
            <div
              className={"system-dot" + (s.id === currentSystemId ? " current" : "")}
              style={{ left: s.x + "px", top: s.y + "px" }}
              onClick={() => setSelectedId(s.id)}
              title={s.name}
            />
            <div className="system-label" style={{ left: s.x + "px", top: s.y + "px" }}>
              {s.name}
            </div>
          </React.Fragment>
        ))}
      </div>
      {selected && (
        <div className="system-info">
          <h3>{selected.name} {selected.id === currentSystemId && <span style={{color:"var(--ink-dim)", fontSize:13}}>— here</span>}</h3>
          <div className="desc">{selected.description}</div>
          <div className="planets">
            {selected.planets.map(p => {
              const type = PLANET_TYPES.find(t => t.id === p.type);
              const stage = TERRAFORM_STAGES[p.stage];
              return (
                <div key={p.id} className="planet-line">
                  • <strong>{p.name}</strong> — {type ? type.name : p.type} ({stage.name})
                </div>
              );
            })}
          </div>
          <div className="actions">
            {selected.id === currentSystemId ? (
              <button className="primary" onClick={onEnter}>
                Enter System
              </button>
            ) : (
              <button
                className="primary"
                disabled={!canJump}
                onClick={() => onJump(selected.id)}
              >
                {canJump ? "Jump" : "No lane from here"}
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- System map (top-down orbital view of one system) ----------
function SystemMap({ systemId, worlds, onBack, onLand }) {
  const system = STUB_SYSTEMS.find(s => s.id === systemId);
  const [selectedPlanetId, setSelectedPlanetId] = useState(null);
  if (!system) return null;

  const cx = 380, cy = 250;
  const baseRadius = 70;
  const orbitStep = 55;

  // Stable angle per planet: evenly spaced, offset by orbit index for visual variety.
  const laidOut = system.planets.map((p, i) => {
    const n = system.planets.length;
    const radius = baseRadius + p.orbit * orbitStep;
    const angle = ((i * 360 / n) + p.orbit * 37) * Math.PI / 180;
    return {
      ...p,
      radius,
      px: cx + radius * Math.cos(angle),
      py: cy + radius * Math.sin(angle)
    };
  });

  const selected = laidOut.find(p => p.id === selectedPlanetId);
  const selectedType = selected && PLANET_TYPES.find(t => t.id === selected.type);
  const selectedWorld = selected && worlds && worlds[selected.id];
  const selectedStageIdx = selectedWorld ? selectedWorld.stage : (selected ? selected.stage : 0);
  const selectedStage = selected && TERRAFORM_STAGES[selectedStageIdx];

  return (
    <div className="system-map">
      <div className="system-canvas">
        {laidOut.map(p => (
          <div
            key={"ring-" + p.id}
            className="orbit-ring"
            style={{
              left: cx + "px",
              top: cy + "px",
              width: (p.radius * 2) + "px",
              height: (p.radius * 2) + "px"
            }}
          />
        ))}
        <div
          className="star-body"
          style={{
            left: cx + "px",
            top: cy + "px",
            background: `radial-gradient(circle at 35% 35%, #fff, ${system.star.color} 60%, #6a4a1a 100%)`
          }}
        />
        <div className="star-label" style={{ left: cx + "px", top: cy + "px" }}>
          {system.star.name} — {system.star.kind}
        </div>
        {laidOut.map(p => (
          <React.Fragment key={p.id}>
            <div
              className={"planet-body" + (p.id === selectedPlanetId ? " selected" : "")}
              style={{
                left: p.px + "px",
                top: p.py + "px",
                background: PLANET_COLORS[p.type] || "#888"
              }}
              onClick={() => setSelectedPlanetId(p.id)}
              title={p.name}
            />
            <div className="planet-label" style={{ left: p.px + "px", top: p.py + "px" }}>
              {p.name}
            </div>
          </React.Fragment>
        ))}
      </div>
      <div className="system-info">
        <h3>{system.name} System</h3>
        <div className="desc">{system.description}</div>
        {selected ? (
          <div className="planets">
            <div className="planet-line">
              <strong>{selected.name}</strong> — {selectedType ? selectedType.name : selected.type} ({selectedStage.name})
            </div>
            <div className="desc" style={{ marginTop: 6 }}>
              {selectedType ? selectedType.puzzle : ""}
            </div>
            <div className="desc" style={{ marginTop: 4 }}>
              {selectedStage.desc}
            </div>
            {selectedWorld && (selectedWorld.machines || []).length > 0 && (
              <div className="desc" style={{ marginTop: 6, color: "var(--ink-dim)" }}>
                {selectedWorld.machines.length} machine{selectedWorld.machines.length === 1 ? "" : "s"} placed.
              </div>
            )}
          </div>
        ) : (
          <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>
            Click a planet to inspect it.
          </div>
        )}
        <div className="actions">
          <button onClick={onBack}>Back to Star Chart</button>
          {selected && (
            <button className="primary" onClick={() => onLand(selected.id)}>Land</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- Planet surface (top-down tile grid, click-to-place machines) ----------
function PlanetSurface({ planetId, world, onPlace, onBack, placementError, onClearError }) {
  const [selectedMachineType, setSelectedMachineType] = useState(null);
  const found = findPlanet(planetId);
  if (!found || !world) return null;
  const { planet } = found;
  const planetType = PLANET_TYPES.find(t => t.id === planet.type);
  const baseColor = PLANET_COLORS[planet.type] || "#888";

  const stage = world.stage;
  const stageDef = TERRAFORM_STAGES[stage];
  const machineCount = (world.machines || []).length;
  const pps = machineCount * MACHINE_POINTS_PER_SECOND;
  const progress = world.progress || 0;
  const progressPct = stage >= 5 ? 100 : Math.min(100, (progress / STAGE_THRESHOLD) * 100);
  const secondsToNext = (stage >= 5 || pps === 0) ? null : Math.ceil((STAGE_THRESHOLD - progress) / pps);

  // Tile color = base planet color + stage-proportional green overlay, simulating the
  // slow shift toward a living world as stages advance.
  const overlay = stage * 0.14;
  const tileBackground = `linear-gradient(rgba(90,170,100,${overlay}), rgba(90,170,100,${overlay})), ${baseColor}`;

  // Filter machines: T1 only, matching the current stage's needed category, plus universals.
  const stageToCategory = ["Atmosphere", "Hydrosphere", "Flora", "Fauna", "Universal", "Universal"];
  const neededCategory = stageToCategory[stage];
  const availableMachines = MACHINES.filter(m => {
    if (m.tier !== 1) return false;
    if (m.stage === "Universal") return true;
    return m.stage === neededCategory;
  });

  // Auto-deselect if the selected machine isn't in the filtered list anymore (after stage advance).
  useEffect(() => {
    if (selectedMachineType && !availableMachines.some(m => m.id === selectedMachineType)) {
      setSelectedMachineType(null);
    }
  }, [stage]);

  const occupied = new Map();
  (world.machines || []).forEach(m => occupied.set(m.x + "," + m.y, m));

  function handleTileClick(x, y) {
    if (!selectedMachineType) return;
    if (occupied.has(x + "," + y)) return;
    onPlace(planetId, selectedMachineType, x, y);
  }

  const tiles = [];
  for (let y = 0; y < SURFACE_GRID_ROWS; y++) {
    for (let x = 0; x < SURFACE_GRID_COLS; x++) {
      const key = x + "," + y;
      const m = occupied.get(key);
      const machineDef = m && MACHINES.find(md => md.id === m.type);
      const pipColor = machineDef && MACHINE_CATEGORY_COLORS[machineDef.stage];
      tiles.push(
        <div
          key={key}
          className={"tile" + (m ? " occupied" : "") + (selectedMachineType && !m ? " placing" : "")}
          style={{ background: tileBackground }}
          onClick={() => handleTileClick(x, y)}
          title={machineDef ? machineDef.name : ""}
        >
          {m && (
            <div className="machine-pip" style={{ background: pipColor }} />
          )}
        </div>
      );
    }
  }

  function formatTime(sec) {
    if (sec == null) return "—";
    if (sec < 60) return sec + "s";
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + "m " + s + "s";
  }

  return (
    <div className="surface">
      <div className="surface-sidebar">
        <h4>Machines</h4>
        {availableMachines.length === 0 && (
          <div style={{ color: "var(--ink-dim)", fontSize: 12, fontStyle: "italic" }}>
            Nothing T1 applies here yet.
          </div>
        )}
        {availableMachines.map(m => (
          <div
            key={m.id}
            className={"machine-option" + (selectedMachineType === m.id ? " selected" : "")}
            onClick={() => setSelectedMachineType(m.id)}
          >
            <div className="pip-sample" style={{ background: MACHINE_CATEGORY_COLORS[m.stage] }} />
            <div>
              <div className="m-name">{m.name}</div>
              <div className="m-desc">{m.desc}</div>
            </div>
          </div>
        ))}
        <div style={{ color: "var(--ink-dim)", fontSize: 11, marginTop: 10, fontStyle: "italic" }}>
          {selectedMachineType ? "Click an empty tile to place." : "Click a machine, then a tile."}
        </div>
      </div>

      <div className="surface-main">
        <div className="tile-grid">{tiles}</div>
        {placementError && (
          <div className="placement-error" onClick={onClearError}>
            {placementError}
            <span className="dismiss">dismiss</span>
          </div>
        )}
        <button onClick={onBack}>Back to System</button>
      </div>

      <div className="surface-info">
        <h3>{planet.name}</h3>
        <div style={{ color: "var(--ink-dim)", fontStyle: "italic", fontSize: 13, marginBottom: 8 }}>
          {planetType ? planetType.name : planet.type} — {planetType ? planetType.puzzle : ""}
        </div>
        <div className="row"><span>Stage</span><strong>{stageDef.name}</strong></div>
        <div className="progress-outer">
          <div className="progress-inner" style={{ width: progressPct + "%" }} />
        </div>
        <div className="row"><span>Progress</span><strong>{Math.floor(progress)} / {STAGE_THRESHOLD}</strong></div>
        <div className="row"><span>Machines</span><strong>{machineCount}</strong></div>
        <div className="row"><span>Points / sec</span><strong>{pps.toFixed(1)}</strong></div>
        <div className="row">
          <span>Next stage in</span>
          <strong>{stage >= 5 ? "—" : (pps === 0 ? "place a machine" : formatTime(secondsToNext))}</strong>
        </div>
        <div style={{ marginTop: 8, fontSize: 12, color: "var(--ink-dim)" }}>
          {stageDef.desc}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
