        </button>
      </div>
    </div>
  );
}

// ---------- Ship view (dollhouse) ----------
function ShipView({ crew, inventory, upgrades, worlds, shipRoomTiers, fragmentsFound, onBuyUpgrade, onShowTutorial, onBackToTitle, onVisitWorld }) {
  const [activeLine, setActiveLine] = useState(null);
  const [activeRoom, setActiveRoom] = useState(null);
  const mobile = useIsMobile();

  // Map crew picks back to role + candidate objects, then drop them in default rooms.
  const [showWorlds, setShowWorlds] = useState(false);
  const [showFragments, setShowFragments] = useState(false);
  const occupants = {};
  CREW_ROLES.forEach(role => {
    const pickedId = crew[role.id];
    if (!pickedId) return;
    const cand = role.candidates.find(c => c.id === pickedId);
    if (!occupants[role.defaultRoom]) occupants[role.defaultRoom] = [];
    occupants[role.defaultRoom].push({ role, cand });
  });

  function speak(role, cand) {
    setActiveLine({
      speaker: cand.name,
      line: PLACEHOLDER_LINES[role.id] || "\"…\""
    });
    setActiveRoom(null);
  }
  function describe(room) {
    setActiveRoom(room);
    setActiveLine(null);
  }

  return (
    <div className="ship-view">
      {mobile ? (
        <div className="ship-room-cards">
          {SHIP_ROOMS.map(room => {
            const crew = occupants[room.id] || [];
            return (
              <div key={room.id} className="ship-room-card" onClick={() => describe(room)}>
                <div className="card-info">
                  <div className="card-room-name">{room.name}</div>
                  <div className="card-room-desc">{room.desc.slice(0, 60)}…</div>
                </div>
                {crew.map(({ role, cand }) => (
                  <button key={cand.id} className="card-crew-btn"
                    onClick={(e) => { e.stopPropagation(); speak(role, cand); }}
                    title={cand.name}>
                    <img src={`./assets/crew/${cand.id}.jpg`} alt={cand.name}
                      onError={(e) => { e.target.parentNode.textContent = cand.name.charAt(0); }} />
                  </button>
                ))}
              </div>
            );
          })}
          {onShowTutorial && (
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button style={{ fontSize: 13 }} onClick={onShowTutorial}>Review Tutorial</button>
              {onBackToTitle && <button style={{ fontSize: 13 }} onClick={onBackToTitle}>Switch Save</button>}
            </div>
          )}
        </div>
      ) : (
        <div className="dollhouse">
          {SHIP_ROOMS.map(room => (
            <div
              key={room.id}
              className="room"
              style={room.zone}
              onClick={() => describe(room)}
            >
              <div className="room-name">{room.name}</div>
              {(occupants[room.id] || []).map(({ role, cand }, i) => (
                <button
                  key={cand.id}
                  className="crew-pip"
                  style={{ bottom: 22 + i * 56 }}
                  onClick={(e) => { e.stopPropagation(); speak(role, cand); }}
                  title={cand.name}
                >
                  <img src={`./assets/crew/${cand.id}.jpg`} alt={cand.name}
                    onError={(e) => { e.target.parentNode.textContent = cand.name.charAt(0); }} />
                </button>
              ))}
            </div>
          ))}
          {onShowTutorial && (
            <button className="review-tutorial-btn" onClick={onShowTutorial}>Review Tutorial</button>
          )}
          {onBackToTitle && (
            <button className="review-tutorial-btn" style={{ bottom: 30 }} onClick={onBackToTitle}>Switch Save</button>
          )}
        </div>
      )}
      {activeLine && (
        <div className="dialog">
          <div className="speaker">{activeLine.speaker}</div>
          <div className="line">{activeLine.line}</div>
        </div>
      )}
      {activeRoom && (
        <div className="dialog">
          <div className="speaker">{activeRoom.name}</div>
          <div className="line">{activeRoom.desc}</div>
        </div>
      )}

      <div className="inventory-panel">
        <h4>Stockpiles</h4>
        <div className="inventory-grid">
          {(() => {
            const cap = cargoCap((upgrades && upgrades.hull) || 1);
            return SIGNATURE_RESOURCES.map(r => {
              const amt = Math.floor((inventory && inventory[r.id]) || 0);
              const atCap = amt >= cap;
              const fromType = PLANET_TYPES.find(t => t.id === r.from);
              const neededBy = [];
              UPGRADE_TRACKS.forEach(tr => {
                tr.tiers.forEach(t => {
                  if (t.cost && t.cost[r.id]) neededBy.push(tr.label + " T" + t.tier);
                });
              });
              MACHINES.forEach(m => {
                if (m.cost && m.cost[r.id]) neededBy.push(m.name);
              });
              const tip = `Produced by: ${fromType ? fromType.name : r.from} worlds (Flora+)\n${r.used_for}\nUsed by: ${neededBy.length ? neededBy.join(", ") : "nothing yet"}`;
              return (
                <div key={r.id} className="inventory-cell" title={tip} style={atCap ? { borderColor: "#8a6a3a" } : {}}>
                  <div
                    className="inventory-swatch"
                    style={{ background: PLANET_COLORS[r.from] || "#888" }}
                  />
                  <div className="inventory-text">
                    <div className="inv-name">{r.name}</div>
                    <div className="inv-from">{fromType ? fromType.name : r.from} worlds</div>
                  </div>
                  <div className="inv-amount" style={atCap ? { color: "var(--ink-dim)" } : {}}>
                    {amt} <span style={{ fontSize: 12, color: "var(--ink-dim)", fontWeight: "normal" }}>/ {cap}</span>
                  </div>
                </div>
              );
            });
          })()}
        </div>
      </div>

      <div className="upgrade-panel">
        <h4>Ship Upgrades</h4>
        <div className="upgrade-tracks">
          {UPGRADE_TRACKS.map(track => {
            const current = (upgrades && upgrades[track.id]) || 1;
            const atMax = current >= track.tiers.length;
            const nextTier = atMax ? null : track.tiers[current];
            const affordable = nextTier && canAfford(inventory || {}, nextTier.cost);
            return (
              <div key={track.id} className="upgrade-track">
                <div className="track-header">
                  <div className="track-label">{track.label}</div>
                  <div className="track-tier">Tier {current} / {track.tiers.length}</div>
                </div>
                <div className="track-desc">{track.desc}</div>
                <div className="track-effect">
                  <strong>Now:</strong> {track.tiers[current - 1].effect}
                </div>
                <div className="tier-ladder">
                  {track.tiers.map((t, i) => (
                    <div
                      key={t.tier}
                      className={"tier-pip" + (i < current ? " owned" : "") + (i === current ? " next" : "")}
                    />
                  ))}
                </div>
                {nextTier ? (
                  <>
                    <div className="next-tier">
                      <div className="next-label">Next — Tier {nextTier.tier}: {nextTier.effect}</div>
                      <div className="next-cost">
                        {Object.keys(nextTier.cost).map(k => {
                          const res = SIGNATURE_RESOURCES.find(r => r.id === k);
                          const have = Math.floor((inventory && inventory[k]) || 0);
                          const need = nextTier.cost[k];
                          const ok = have >= need;
                          return (
                            <span key={k} className={"cost-chip" + (ok ? "" : " short")}>
                              {res ? res.name : k}: {have}/{need}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                    <button
                      className="primary"
                      disabled={!affordable}
                      onClick={() => onBuyUpgrade(track.id)}
                    >
                      {affordable ? "Upgrade" : "Not enough resources"}
                    </button>
                  </>
                ) : (
                  <div className="next-label" style={{ color: "var(--accent)" }}>Maxed.</div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ display: "flex", gap: 12, marginTop: 16, width: "100%", maxWidth: 1024 }}>
        <button className="primary" style={{ flex: 1 }} onClick={() => setShowWorlds(true)}>My Worlds</button>
        <button style={{ flex: 1 }} onClick={() => setShowFragments(true)}>Fragments {(fragmentsFound || []).length}/10</button>
      </div>

      {showWorlds && (
        <div className="worlds-overlay" onClick={() => setShowWorlds(false)}>
          <div className="worlds-panel" onClick={e => e.stopPropagation()}>
            <h3>My Worlds</h3>
            {(() => {
              const entries = [];
              for (const pid in worlds) {
                const w = worlds[pid];
                const f = findPlanet(pid);
                if (!f) continue;
                const pType = PLANET_TYPES.find(t => t.id === f.planet.type);
                const stageDef = TERRAFORM_STAGES[w.stage || 0];
                const mCount = (w.machines || []).length;
                // Use raw (no-multiplier) pps/extraction for the My Worlds summary so the numbers
                // reflect the machine loadout rather than the current presence tier. The pill
                // below the row communicates presence separately.
                const worldPps = calcWorldPps(w.machines || [], w.stage);
                const resId = PLANET_TYPE_RESOURCE[f.planet.type];
                const res = SIGNATURE_RESOURCES.find(r => r.id === resId);
                const isRocky = f.planet.type === "rocky";
                let prodRate = 0;
                if (isRocky) prodRate = ROCKY_PRODUCTION_PER_STAGE[w.stage] || 0;
                else if (w.stage >= 3) prodRate = PRODUCTION_PER_STAGE[w.stage] || 0;
                // Add adjacency-aware extraction (raw, same reasoning).
                prodRate += calcWorldExtraction(w.machines || [], w.stage);
                const isPara = w.stage >= 5;
                const hasActive = mCount > 0 && (w.machines || []).some(m => {
                  const def = MACHINES.find(md => md.id === m.type);
                  return def && ((def.pps > 0 && def.activeStages.indexOf(w.stage) !== -1) || (def.extractionRate && w.stage >= def.extractionMinStage));
                });
                const status = isPara ? "paradise" : hasActive ? "active" : "idle";
                const progressPct = isPara ? 100 : Math.min(100, ((w.progress || 0) / stageThreshold(w.stage)) * 100);
                entries.push({ pid, planet: f.planet, system: f.system, pType, stageDef, mCount, worldPps, res, prodRate, status, progressPct, stageNum: w.stage });
              }
              entries.sort((a, b) => {
                const order = { active: 0, idle: 1, paradise: 2 };
                if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
                return b.stageNum - a.stageNum;
              });
              if (entries.length === 0) {
                return <div style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>No worlds tended yet. Open the Star Chart and land on a planet to begin.</div>;
              }
              return entries.map(e => (
                <div key={e.pid} className="world-entry">
                  <div className="we-color" style={{ background: PLANET_COLORS[e.planet.type] || "#888" }} />
                  <div className="we-info">
                    <div className="we-name">{e.planet.name}</div>
                    <div className="we-detail">
                      {e.pType ? e.pType.name : e.planet.type} — {e.system.name} system
                    </div>
                    <div className="we-detail">
                      {e.stageDef.name} — {e.worldPps.toFixed(1)} pps — {e.mCount} machine{e.mCount !== 1 ? "s" : ""}
                      {e.res && e.prodRate > 0 ? " — " + e.res.name + " +" + e.prodRate.toFixed(2) + "/s" : ""}
                    </div>
                    <div style={{ marginTop: 2, height: 6, background: "var(--bg)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: e.progressPct + "%", background: "linear-gradient(to right, #6fbf73, #a8d8f0)" }} />
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div className={"we-status " + e.status}>{e.status === "paradise" ? "Paradise" : e.status === "active" ? "Active" : "Idle"}</div>
                    {/* Active Presence: My Worlds is only reachable from Ship View, so every entry is "Aboard". */}
                    {e.status !== "paradise" && (
                      <div style={{ marginTop: 3 }}>
                        <span className="presence-pill aboard">Aboard (25%)</span>
                      </div>
                    )}
                    <button style={{ marginTop: 4 }} onClick={() => { setShowWorlds(false); onVisitWorld(e.system.id, e.pid); }}>Visit</button>
                  </div>
                </div>
              ));
            })()}
            <button style={{ marginTop: 8 }} onClick={() => setShowWorlds(false)}>Close</button>
          </div>
        </div>
      )}

      {showFragments && (
        <div className="worlds-overlay" onClick={() => setShowFragments(false)}>
          <div className="worlds-panel" onClick={e => e.stopPropagation()}>
            <h3>Fragments {(fragmentsFound || []).length}/10</h3>
            {(fragmentsFound || []).length === 0 ? (
              <div style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>No fragments discovered yet. Explore, terraform, and upgrade your Lab to find Tender ruins.</div>
            ) : (
              (fragmentsFound || []).map(pid => {
                const fp = findPlanet(pid);
                if (!fp || !fp.planet.tenderRuin) return null;
                const ruin = fp.planet.tenderRuin;
                return (
                  <div key={pid} className="world-entry" style={{ flexDirection: "column", alignItems: "stretch" }}>
                    <div className="we-name" style={{ color: "var(--accent)" }}>{ruin.ruinName}</div>
                    <div className="we-detail">{fp.planet.name} — {fp.system.name} system</div>
                    <div style={{ fontSize: 13, fontStyle: "italic", marginTop: 6, lineHeight: 1.5, color: "var(--ink)" }}>
                      {ruin.fragment}
                    </div>
                  </div>
                );
              })
            )}
            {(fragmentsFound || []).length >= 10 && (
              <div style={{ marginTop: 12, padding: "10px 14px", background: "var(--bg-soft-2)", border: "1px solid var(--accent)", borderRadius: 6, fontStyle: "italic", color: "var(--accent)" }}>
                "We were here. We tended. It was good. Tend after us." — You have found all 10 fragments. The Tenders' message is complete.
              </div>
            )}
            <button style={{ marginTop: 8 }} onClick={() => setShowFragments(false)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- Star chart (18 systems, Drive-gated jumps) ----------
function StarChart({ currentSystemId, driveTier, labTier, worlds, onJump, onEnter }) {
  const [selectedId, setSelectedId] = useState(currentSystemId);
  const selected = STUB_SYSTEMS.find(s => s.id === selectedId);
  const mobile = useIsMobile();
  const canvasRef = useRef(null);

  const maxHops = driveTier >= 5 ? 999 : driveTier;
  const reachable = reachableSystems(currentSystemId, maxHops);
  const allDist = allHopDistances(currentSystemId);

  // Mobile pan/zoom state.
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(0.28);
  const touchRef = useRef({ startPan: null, startDist: null, startZoom: null });

  // Auto-center on current system when chart opens on mobile.
  useEffect(() => {
    if (!mobile) return;
    const cur = STUB_SYSTEMS.find(s => s.id === currentSystemId);
    if (!cur) return;
    const vw = window.innerWidth - 16;
    const vh = 400;
    setPan({ x: vw / 2 - cur.x * 0.28, y: vh / 2 - cur.y * 0.28 });
    setZoom(0.28);
  }, [currentSystemId, mobile]);

  function centerOnMe() {
    const cur = STUB_SYSTEMS.find(s => s.id === currentSystemId);
    if (!cur) return;
    const vw = window.innerWidth - 16;
    setPan({ x: vw / 2 - cur.x * zoom, y: 200 - cur.y * zoom });
  }

  function handleTouchStart(e) {
    if (e.touches.length === 1) {
      touchRef.current.startPan = { x: e.touches[0].clientX - pan.x, y: e.touches[0].clientY - pan.y };
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchRef.current.startDist = Math.sqrt(dx * dx + dy * dy);
      touchRef.current.startZoom = zoom;
    }
  }
  function handleTouchMove(e) {
    e.preventDefault();
    if (e.touches.length === 1 && touchRef.current.startPan) {
      setPan({ x: e.touches[0].clientX - touchRef.current.startPan.x, y: e.touches[0].clientY - touchRef.current.startPan.y });
    } else if (e.touches.length === 2 && touchRef.current.startDist) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const newZoom = Math.min(1, Math.max(0.15, touchRef.current.startZoom * (dist / touchRef.current.startDist)));
      setZoom(newZoom);
    }
  }
  function handleTouchEnd() {
    touchRef.current.startPan = null;
    touchRef.current.startDist = null;
  }

  // Build lane lines (deduped).
  const lanes = [];
  const seen = new Set();
  STUB_SYSTEMS.forEach(s => {
    s.connections.forEach(otherId => {
      const key = [s.id, otherId].sort().join("|");
      if (seen.has(key)) return;
      seen.add(key);
      const other = STUB_SYSTEMS.find(o => o.id === otherId);
      if (!other) return;
      const dx = other.x - s.x;
      const dy = other.y - s.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      lanes.push({ key, x: s.x, y: s.y, len, angle });
    });
  });

  const canJump =
    selected &&
    selected.id !== currentSystemId &&
    reachable.has(selected.id);

  const selectedHops = selected && allDist.has(selected.id) ? allDist.get(selected.id) : null;

  const starsAndLanes = (
    <React.Fragment>
      {lanes.map(l => (
        <div
          key={l.key}
          className="lane"
          style={{
            left: l.x + "px",
            top: l.y + "px",
            width: l.len + "px",
            transform: `rotate(${l.angle}deg)`
          }}
        />
      ))}
      {STUB_SYSTEMS.map(s => {
        const isReachable = reachable.has(s.id);
        const isCurrent = s.id === currentSystemId;
        const hops = allDist.has(s.id) ? allDist.get(s.id) : "?";
        const tip = isCurrent ? s.name + " (here)" : s.name + " — " + hops + " hop" + (hops === 1 ? "" : "s");
        // Flourishing indicators (visible at all Lab tiers).
        const fb = flourishingBonus(s.id, worlds);
        const isFlourishing = fb >= 1.25;
        const isFullyFlourishing = fb >= 1.50;
        // Exceptional fertility shimmer (Lab T5 only).
        const hasExceptional = (labTier || 1) >= 5 && s.planets.some(p => (p.fertility || 1) >= 1.7);
        // Ruin icon (Lab T5 only).
        const hasRuin = (labTier || 1) >= 5 && s.planets.some(p => p.tenderRuin);
        // Ring style.
        let ringStyle = {};
        if (isFullyFlourishing) ringStyle = { boxShadow: "0 0 0 3px #f4c46d, 0 0 12px rgba(244,196,109,0.6)" };
        else if (isFlourishing) ringStyle = { boxShadow: "0 0 0 3px #6fbf73, 0 0 12px rgba(111,191,115,0.5)" };
        else if (hasExceptional) ringStyle = { boxShadow: "0 0 8px rgba(244,196,109,0.6), 0 0 16px rgba(244,196,109,0.3)" };
        return (
          <React.Fragment key={s.id}>
            <div
              className={"system-dot" + (isCurrent ? " current" : "") + (!isReachable && !isCurrent ? " dim" : "")}
              style={{ left: s.x + "px", top: s.y + "px", background: s.star.color, ...ringStyle }}
              onClick={() => setSelectedId(s.id)}
              title={tip}
            />
            {hasRuin && (
              <div style={{ position: "absolute", left: s.x + 10 + "px", top: s.y - 12 + "px", fontSize: 10, color: "var(--accent-soft)", pointerEvents: "none" }}>◆</div>
            )}
            <div
              className="system-label"
              style={{ left: s.x + "px", top: s.y + "px", opacity: isReachable || isCurrent ? 1 : 0.35 }}
            >
              {s.name}
            </div>
          </React.Fragment>
        );
      })}
    </React.Fragment>
  );

  const infoPanel = selected && (
    <div className="system-info" style={mobile ? {} : { width: 1400 }}>
      {mobile && <div style={{ width: 40, height: 4, background: "var(--line)", borderRadius: 2, margin: "0 auto 10px" }} />}
      <h3>
        {selected.name} {selected.id === currentSystemId && <span style={{color:"var(--ink-dim)", fontSize:13}}>— here</span>}
        {selectedHops != null && selectedHops > 0 && (
          <span style={{color: reachable.has(selected.id) ? "var(--ink-dim)" : "#c07070", fontSize: 13, marginLeft: 8}}>
            {selectedHops} hop{selectedHops === 1 ? "" : "s"}{!reachable.has(selected.id) ? " — need Drive T" + selectedHops : ""}
          </span>
        )}
      </h3>
      <div className="desc">{selected.description}</div>
      {(() => {
        const isVisited = selected.id === currentSystemId || selected.planets.some(p => worlds && worlds[p.id]);
        const scanReach = driveTier >= 5 || reachable.has(selected.id);
        const scanTier = isVisited ? 5 : (scanReach ? driveTier : 0);
        if (scanTier === 0) {
          return <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>{selected.planets.length} planet{selected.planets.length === 1 ? "" : "s"} — out of scan range</div>;
        }
        if (scanTier < 2) {
          return <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>{selected.planets.length} planet{selected.planets.length === 1 ? "" : "s"} — upgrade Drive to scan</div>;
        }
        return (
          <div className="planets">
            {scanTier >= 4 && <div style={{ fontSize: 11, color: "var(--ink-dim)", marginBottom: 4 }}>Star: {selected.star.kind}</div>}
            {selected.planets.map(p => {
              const type = PLANET_TYPES.find(t => t.id === p.type);
              const w = worlds && worlds[p.id];
              const stageIdx = w ? w.stage : p.stage;
              const stage = TERRAFORM_STAGES[stageIdx];
              return (
                <div key={p.id} className="planet-line">
                  • {isVisited ? <strong>{p.name}</strong> : null} {type ? type.name : p.type}
                  {scanTier >= 3 && <span style={{ color: "var(--ink-dim)" }}> ({stage.name})</span>}
                </div>
              );
            })}
            {(labTier || 1) >= 5 && (() => {
              const best = selected.planets.reduce((b, p) => (!b || (p.fertility || 1) > (b.fertility || 1)) ? p : b, null);
              const bestType = best && PLANET_TYPES.find(t => t.id === best.type);
              return best && (best.fertility || 1) >= 1.3 ? (
                <div style={{ fontSize: 11, color: "var(--accent-soft)", marginTop: 4 }}>
                  Best: {fertilityCategory(best.fertility)} {bestType ? bestType.name : best.type} ({best.fertility.toFixed(2)}×)
                </div>
              ) : null;
            })()}
            {(() => {
              const fb = flourishingBonus(selected.id, worlds);
              if (fb >= 1.50) return <div style={{ fontSize: 11, color: "#f4c46d", fontWeight: "bold", marginTop: 4 }}>Fully Flourishing — +50% production</div>;
              if (fb >= 1.25) return <div style={{ fontSize: 11, color: "#6fbf73", fontWeight: "bold", marginTop: 4 }}>Flourishing — +25% production</div>;
              return null;
            })()}
          </div>
        );
      })()}
      <div className="actions">
        {selected.id === currentSystemId ? (
          <button className="primary" onClick={onEnter}>Enter System</button>
        ) : (
          <button className="primary" disabled={!canJump} onClick={() => onJump(selected.id)}>
            {canJump ? "Jump" : (reachable.has(selected.id) ? "Already here" : "Out of drive range")}
          </button>
        )}
        {mobile && <button onClick={() => setSelectedId(null)}>Dismiss</button>}
      </div>
    </div>
  );

  return (
    <div className="chart">
      {mobile ? (
        <div className="chart-canvas" ref={canvasRef}
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
        >
          <div style={{ position: "absolute", left: 0, top: 0, width: 1400, height: 700, transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: "0 0" }}>
            {starsAndLanes}
          </div>
          <button className="center-btn" onClick={centerOnMe}>⊕ Center</button>
        </div>
      ) : (
        <div className="chart-canvas">
          {starsAndLanes}
        </div>
      )}
      {infoPanel}
    </div>
  );
}

// ---------- System map (top-down orbital view of one system) ----------
function SystemMap({ systemId, worlds, labTier, onBack, onLand }) {
  const system = STUB_SYSTEMS.find(s => s.id === systemId);
  const [selectedPlanetId, setSelectedPlanetId] = useState(null);
  const mobile = useIsMobile();
  if (!system) return null;

  const cx = 380, cy = 250;
  const baseRadius = 70;
  const orbitStep = 55;

  // Stable angle per planet: evenly spaced, offset by orbit index for visual variety.
  const laidOut = system.planets.map((p, i) => {
    const n = system.planets.length;
    const radius = baseRadius + p.orbit * orbitStep;
    const angle = ((i * 360 / n) + p.orbit * 37) * Math.PI / 180;
    return {
      ...p,
      radius,
      px: cx + radius * Math.cos(angle),
      py: cy + radius * Math.sin(angle)
    };
  });

  const selected = laidOut.find(p => p.id === selectedPlanetId);
  const selectedType = selected && PLANET_TYPES.find(t => t.id === selected.type);
  const selectedWorld = selected && worlds && worlds[selected.id];
  const selectedStageIdx = selectedWorld ? selectedWorld.stage : (selected ? selected.stage : 0);
  const selectedStage = selected && TERRAFORM_STAGES[selectedStageIdx];

  return (
    <div className="system-map">
      <div className="system-canvas" style={mobile ? { width: "100%", height: 0, paddingBottom: "62.5%", position: "relative", overflow: "hidden" } : {}}>
        <div style={mobile ? { position: "absolute", inset: 0, transform: "scale(" + (Math.min(window.innerWidth - 16, 800) / 800) + ")", transformOrigin: "0 0", width: 800, height: 500 } : {}}>
        {laidOut.map(p => (
          <div
            key={"ring-" + p.id}
            className="orbit-ring"
            style={{
              left: cx + "px",
              top: cy + "px",
              width: (p.radius * 2) + "px",
              height: (p.radius * 2) + "px"
            }}
          />
        ))}
        <div
          className="star-body"
          style={{
            left: cx + "px",
            top: cy + "px",
            background: `radial-gradient(circle at 35% 35%, #fff, ${system.star.color} 60%, #6a4a1a 100%)`
          }}
        />
        <div className="star-label" style={{ left: cx + "px", top: cy + "px" }}>
          {system.star.name} — {system.star.kind}
        </div>
        {laidOut.map(p => (
          <React.Fragment key={p.id}>
            <div
              className={"planet-body" + (p.id === selectedPlanetId ? " selected" : "")}
              style={{
                left: p.px + "px",
                top: p.py + "px",
                background: PLANET_COLORS[p.type] || "#888"
              }}
              onClick={() => setSelectedPlanetId(p.id)}
              title={p.name}
            />
            <div className="planet-label" style={{ left: p.px + "px", top: p.py + "px" }}>
              {p.name}
            </div>
          </React.Fragment>
        ))}
        </div>
      </div>
      <div className="system-info">
        {mobile && <div style={{ width: 40, height: 4, background: "var(--line)", borderRadius: 2, margin: "0 auto 10px" }} />}
        <h3>{system.name} System</h3>
        <div className="desc">{system.description}</div>
        {selected ? (
          <div className="planets">
            <div className="planet-line">
              <strong>{selected.name}</strong> — {selectedType ? selectedType.name : selected.type} ({selectedStage.name})
            </div>
            <div className="desc" style={{ marginTop: 6 }}>
              {selectedType ? selectedType.puzzle : ""}
            </div>
            <div className="desc" style={{ marginTop: 4 }}>
              {selectedStage.desc}
            </div>
            {selectedWorld && (selectedWorld.machines || []).length > 0 && (
              <div className="desc" style={{ marginTop: 6, color: "var(--ink-dim)" }}>
                {selectedWorld.machines.length} machine{selectedWorld.machines.length === 1 ? "" : "s"} placed.
              </div>
            )}
            {(() => {
              const resId = PLANET_TYPE_RESOURCE[selected.type];
              const res = SIGNATURE_RESOURCES.find(r => r.id === resId);
              const isRocky = selected.type === "rocky";
              const rate = selectedWorld && (isRocky
                ? ROCKY_PRODUCTION_PER_STAGE[selectedStageIdx]
                : PRODUCTION_PER_STAGE[selectedStageIdx]);
              return res && (
                <div style={{ marginTop: 8, fontSize: 12, borderTop: "1px solid var(--line)", paddingTop: 8 }}>
                  <div style={{ color: "var(--accent)", fontWeight: "bold", marginBottom: 3 }}>
                    Produces: {res.name}
                  </div>
                  <div style={{ color: "var(--ink-dim)" }}>
                    {isRocky
                      ? `Passive — ${(rate || 0).toFixed(2)}/s (accelerates each stage)`
                      : selectedStageIdx >= 3
                        ? `Passive — ${rate.toFixed(2)}/s (${TERRAFORM_STAGES[selectedStageIdx].name})`
                        : `Passive begins at Flora. Place Mining Drills to extract early.`}
                  </div>
                  <div style={{ color: "var(--ink-dim)", fontSize: 11, marginTop: 2 }}>
                    {res.used_for}
                  </div>
                </div>
              );
            })()}
            {(() => {
              const lt = labTier || 1;
              const f = selected.fertility || 1.0;
              if (lt <= 2) return <div style={{ fontSize: 12, color: "var(--ink-dim)", marginTop: 4 }}>Fertility: Unknown — upgrade Lab to scan</div>;
              if (lt === 3) return <div style={{ fontSize: 12, color: "var(--ink-dim)", marginTop: 4 }}>Fertility: {fertilityCategory(f)}</div>;
              return <div style={{ fontSize: 12, color: "var(--ink-dim)", marginTop: 4 }}>Fertility: {f.toFixed(2)}× ({fertilityCategory(f)})</div>;
            })()}
            {labTier >= 4 && selected.tenderRuin && (
              <div style={{ fontSize: 12, color: "var(--accent-soft)", marginTop: 4 }}>
                {labTier >= 5 ? selected.tenderRuin.ruinName + " — activates at " + TERRAFORM_STAGES[selected.tenderRuin.activationStage].name : "Anomaly Detected"}
              </div>
            )}
          </div>
        ) : (
          <div className="planets" style={{ color: "var(--ink-dim)", fontStyle: "italic" }}>
            Click a planet to inspect it.
          </div>
        )}
        <div className="actions">
          <button onClick={onBack}>Back to Star Chart</button>
          {selected && (
            <button className="primary" onClick={() => onLand(selected.id)}>Land</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- Planet surface (top-down tile grid, click-to-place machines) ----------
function PlanetSurface({ planetId, world, worlds, inventory, labTier, hullTier, onPlace, onDeconstruct, onHarvest, onBack, placementError, onClearError, activeBoosts, weather, machineCooldowns, floaters, onFloaterExpire }) {
  // Effective multipliers for THIS planet as the tended one. Surface view always means
  // the currentPlanetId is this one — so we synthesize the ctx here.
  const surfaceCtx = { screen: "surface", currentPlanetId: planetId, activeBoosts: activeBoosts || [], weather: weather || null };
  const surfacePType = (findPlanet(planetId) || { planet: {} }).planet.type;
  const surfaceMultipliers = getEffectiveMultipliers(surfaceCtx, { id: planetId, type: surfacePType });
  // Weather banner + tile overlay: built when there's an active, non-expired weather event
  // scoped to this planet. Defined here so the surface-main render can reference them.
  const weatherNow = weather && weather.planetId === planetId && weather.endsAt > Date.now() ? weather : null;
  const weatherDef = (weatherNow && typeof WEATHER_EVENTS !== "undefined" && WEATHER_EVENTS[surfacePType])
    ? WEATHER_EVENTS[surfacePType].find(e => e.id === weatherNow.eventId)
    : null;
  const weatherTileClass = weatherDef ? (weatherDef.tileClass || "") : "";
  const weatherRemainingS = weatherNow ? Math.max(0, Math.ceil((weatherNow.endsAt - Date.now()) / 1000)) : 0;
  const weatherBanner = weatherDef ? (
    <div className="weather-banner">
      <div>
        <div className="wx-name">{weatherDef.name}</div>
        <div className="wx-desc">{weatherDef.desc}</div>
      </div>
      <span className="wx-bonus">{formatBoostShort(weatherDef)}</span>
      <span className="wx-remaining">{formatTime(weatherRemainingS)}</span>
    </div>
  ) : null;
  const [selectedMachineType, setSelectedMachineType] = useState(null);
  const [inspecting, setInspecting] = useState(null); // { machine, def, x, y }
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [infoExpanded, setInfoExpanded] = useState(false);
  const mobile = useIsMobile();
  const gridCols = mobile ? 8 : SURFACE_GRID_COLS;
  const gridRows = mobile ? 6 : SURFACE_GRID_ROWS;
  const found = findPlanet(planetId);
  if (!found || !world) return null;
  const { planet } = found;
  const planetType = PLANET_TYPES.find(t => t.id === planet.type);
  const stage = world.stage;
  const stageDef = TERRAFORM_STAGES[stage];
  const machines = world.machines || [];
  // Effective pps including presence (always 1.0 on own surface), active boosts, and weather.
  const pps = calcWorldPps(machines, stage, surfaceMultipliers);
  // Raw pps (no multipliers) for "base" comparisons if the boost set is non-trivial.
  const rawPps = calcWorldPps(machines, stage);
  const progress = world.progress || 0;
  const curThreshold = stageThreshold(stage);
  const progressPct = stage >= 5 ? 100 : Math.min(100, (progress / curThreshold) * 100);
  const secondsToNext = (stage >= 5 || pps === 0) ? null : Math.ceil((curThreshold - progress) / pps);

  const tileUrl = `./assets/tiles/tile-${planet.type}-${stage}.jpg`;

  // Graduated Paradise worlds render as a finished garden — no grid, no build UI.
  if (world.graduated) {
    const paradiseTile = `./assets/tiles/tile-${planet.type}-5.jpg`;
    const fertility = planet.fertility || 1.0;
    const flourish = found.system ? flourishingBonus(found.system.id, worlds || {}) : 1.0;
    const resId = PLANET_TYPE_RESOURCE[planet.type];
    const resDef = SIGNATURE_RESOURCES.find(r => r.id === resId);
    const resName = resDef ? resDef.name : resId;
    const passiveRate = PARADISE_PASSIVE_RATE * fertility * flourish;
    const lp = world.lifetimeProduction || {};
    const lpEntries = Object.keys(lp).filter(k => lp[k] > 0).map(k => {
      const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
      return { name: r ? r.name : k, amount: Math.floor(lp[k]) };
    });
    const ruinActivated = planet.tenderRuin && stage >= planet.tenderRuin.activationStage;
    const lt = labTier || 1;
    const infoPanel = (
      <div className="paradise-info">
        <h3>{planet.name}</h3>
        <div className="paradise-type">
          {planetType ? planetType.name : planet.type}
        </div>
        <div className="paradise-tagline">Paradise — This world tends itself now</div>
        {(() => {
          if (lt <= 2) return <div className="row"><span>Fertility</span><strong style={{ color: "var(--ink-dim)" }}>Unknown — upgrade Lab to scan</strong></div>;
          if (lt === 3) return <div className="row"><span>Fertility</span><strong>{fertilityCategory(fertility)}</strong></div>;
          return <div className="row"><span>Fertility</span><strong>{fertility.toFixed(2)}× ({fertilityCategory(fertility)})</strong></div>;
        })()}
        <div className="row"><span>Passive production</span><strong>{resName}: +{passiveRate.toFixed(3)}/s</strong></div>
        {flourish > 1.0 && (
          <div className="row"><span>Flourishing bonus</span><strong style={{ color: "var(--accent-soft)" }}>×{flourish.toFixed(2)}</strong></div>
        )}
        {lpEntries.length > 0 && (
          <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid var(--line)" }}>
            <div className="row" style={{ fontWeight: "bold", color: "var(--accent)" }}><span>Lifetime production</span></div>
            {lpEntries.map(e => (
              <div key={e.name} className="row"><span>{e.name}</span><strong>{e.amount}</strong></div>
            ))}
          </div>
        )}
        {ruinActivated && lt >= 4 && (
          <div className="row" style={{ marginTop: 6, color: "var(--accent-soft)" }}>
            <span>{lt >= 5 ? planet.tenderRuin.ruinName : "Anomaly Detected"}</span>
          </div>
        )}
      </div>
    );
    return (
      <div className="surface paradise-surface">
        <div className="paradise-stage">
          {infoPanel}
          <div
            className="paradise-landscape"
            style={{ backgroundImage: `url('${paradiseTile}')` }}
          />
          <div className="paradise-actions">
            <button onClick={onBack}>Back to System</button>
          </div>
        </div>
      </div>
    );
  }

  // Group machines into categories for the sidebar.
  const terraformingMachines = MACHINES.filter(m => m.pps > 0);
  const infrastructureMachines = MACHINES.filter(m => m.stage === "Universal");
  const extractionMachines = MACHINES.filter(m => m.stage === "Extraction");

  // Resolve planet-specific flavor for a machine definition.
  function flavorOf(def) {
    const f = def.typeFlavor && def.typeFlavor[planet.type];
    return f || { name: def.name, desc: def.desc };
  }

  // Auto-deselect machine when player can no longer afford it.
  useEffect(() => {
    if (!selectedMachineType) return;
    const md = MACHINES.find(m => m.id === selectedMachineType);
    if (md && !canAfford(inventory || {}, md.cost)) setSelectedMachineType(null);
  }, [inventory, selectedMachineType]);

  const occupied = new Map();
  machines.forEach(m => occupied.set(m.x + "," + m.y, m));

  function handleTileClick(x, y) {
    const m = occupied.get(x + "," + y);
    if (m) {
      const def = MACHINES.find(md => md.id === m.type);
      setInspecting({ machine: m, def: def, x: x, y: y });
      setSelectedMachineType(null);
      setDrawerOpen(false);
      return;
    }
    setInspecting(null);
    if (!selectedMachineType) {
      if (mobile) setDrawerOpen(true);
      return;
    }
    onPlace(planetId, selectedMachineType, x, y);
  }

  // Compute placement preview highlights.
  const selectedDef = selectedMachineType ? MACHINES.find(md => md.id === selectedMachineType) : null;
  const isPlacingSolar = selectedDef && selectedDef.id === "solar_array";
  const isPlacingSilo = selectedDef && selectedDef.id === "storage_silo";
  const isPlacingBoostable = selectedDef && !isPlacingSolar && !isPlacingSilo;

  const tiles = [];
  for (let y = 0; y < gridRows; y++) {
    for (let x = 0; x < gridCols; x++) {
      const key = x + "," + y;
      const m = occupied.get(key);
      const machineDef = m && MACHINES.find(md => md.id === m.type);
      const pipColor = machineDef && MACHINE_CATEGORY_COLORS[machineDef.stage];
      const isExtraction = machineDef && machineDef.extractionRate;
      const isIdle = machineDef && !isExtraction && machineDef.activeStages.indexOf(stage) === -1 && m.type !== "solar_array";
      const isExtractionIdle = isExtraction && stage < machineDef.extractionMinStage;
      const isInspected = inspecting && inspecting.machine.id === (m && m.id);
      // Placement preview highlights.
      let highlight = null;
      if (selectedMachineType && !m) {
        if (isPlacingBoostable) {
          // Placing a machine: green if adjacent to a Solar
          const adjSolars = countAdjacentSolars(machines, x, y);
          if (adjSolars > 0) highlight = "rgba(111,191,115,0.25)";
        } else if (isPlacingSolar) {
          // Placing a Solar: yellow if adjacent to boostable machines
          const adj = getAdjacentMachines(machines, x, y);
          const boostable = adj.some(a => a.type !== "solar_array" && a.type !== "storage_silo");
          if (boostable) highlight = "rgba(244,196,109,0.25)";
        } else if (isPlacingSilo) {
          // Placing a Silo: yellow if adjacent to extraction machines
          const adj = getAdjacentMachines(machines, x, y);
          const hasExtract = adj.some(a => { const d = MACHINES.find(md => md.id === a.type); return d && d.extractionRate; });
          if (hasExtract) highlight = "rgba(244,196,109,0.25)";
        }
      }
      tiles.push(
        <div
          key={key}
          className={"tile" + (m ? " occupied" : "") + (selectedMachineType && !m ? " placing" : "") + (isInspected ? " inspected" : "")}
          style={highlight ? { background: highlight } : {}}
          onClick={() => handleTileClick(x, y)}
          title={machineDef ? flavorOf(machineDef).name + ((isIdle || isExtractionIdle) ? " (idle)" : "") : ""}
        >
          {m && (
            <div
              className={"machine-pip" + (!(isIdle || isExtractionIdle) ? " active-glow" : "")}
              style={{ "--pip-color": pipColor, opacity: (isIdle || isExtractionIdle) ? 0.4 : 1 }}
            >
              {MACHINE_ICONS[m.type] && (
                <span
                  className="pip-icon"
                  dangerouslySetInnerHTML={{ __html: MACHINE_ICONS[m.type] }}
                />
              )}
              {(() => {
                const cdEnds = (machineCooldowns || {})[m.id] || 0;
                const remaining = Math.max(0, cdEnds - Date.now());
                if (remaining <= 0) return null;
                // SVG arc: 42px diameter, stroke-dasharray trick for progress ring.
                const frac = remaining / (HARVEST_COOLDOWN_S * 1000);
                const circumference = 2 * Math.PI * 19;
                const dash = frac * circumference;
                return (
                  <svg className="harvest-cooldown-ring" viewBox="0 0 42 42" width="100%" height="100%">
                    <circle cx="21" cy="21" r="19"
                      strokeDasharray={`${dash} ${circumference}`}
                      strokeLinecap="round" />
                  </svg>
                );
              })()}
            </div>
          )}
        </div>
      );
    }
  }

  // Infrastructure counts for sidebar display.
  const siloCount = machines.filter(m => m.type === "storage_silo").length;
  const solarCount = machines.filter(m => m.type === "solar_array").length;

  // Count active vs idle placed machines (includes extraction).
  const activePlaced = machines.filter(m => {
    const def = MACHINES.find(md => md.id === m.type);
    if (!def) return false;
    if (def.pps > 0 && def.activeStages.indexOf(stage) !== -1) return true;
    if (def.extractionRate && stage >= def.extractionMinStage) return true;
    return false;
  }).length;
  const idlePlaced = machines.filter(m => {
    const def = MACHINES.find(md => md.id === m.type);
    if (!def) return false;
    if (m.type === "solar_array" || m.type === "storage_silo") return false;
    if (def.pps > 0 && def.activeStages.indexOf(stage) === -1) return true;
    if (def.extractionRate && stage < def.extractionMinStage) return true;
    return false;
  }).length;

  function formatTime(sec) {
    if (sec == null) return "—";
    if (sec < 60) return sec + "s";
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + "m " + s + "s";
  }
  // Short banner/label for weather event or crew-task boost: "+30% pps", "+50% Hydrosphere pps",
  // "+25% extraction", "Solar bonus ×2", "+0.5 pts/s", or "+20 Cryocrystals" for instants.
  function formatBoostShort(def) {
    if (!def) return "";
    if (def.instant) {
      const rDef = SIGNATURE_RESOURCES.find(r => r.id === def.instant.resourceId);
      return "+" + def.instant.amount + " " + (rDef ? rDef.name : def.instant.resourceId);
    }
    const pct = Math.round((def.multiplier || 0) * 100);
    if (def.type === "all_pps")         return "+" + pct + "% pps";
    if (def.type === "extraction_rate") return "+" + pct + "% extraction";
    if (def.type === "solar_adjacency") return def.multiplier >= 1 ? "Solar bonus ×2" : "+" + pct + "% Solar bonus";
    if (def.type === "flat_pps")        return "+" + (def.multiplier || 0).toFixed(1) + " pts/s";
    if (def.type === "stage_pps") {
      const stageName = (typeof TERRAFORM_STAGES !== "undefined" && TERRAFORM_STAGES[def.stageIndex]) ? TERRAFORM_STAGES[def.stageIndex].name : "stage";
      return "+" + pct + "% " + stageName + " pps";
    }
    return "+" + pct + "%";
  }

  // Shared machine option renderer for sidebar and mobile drawer.
  function renderMachineOption(m) {
    const flavor = flavorOf(m);
    const affordable = canAfford(inventory || {}, m.cost);
    const isActive = m.activeStages.indexOf(stage) !== -1;
    const isSilo = m.id === "storage_silo";
    const isSolar = m.id === "solar_array";
    const isExtract = !!m.extractionRate;
    const extractActive = isExtract && stage >= m.extractionMinStage;
    const extractIdle = isExtract && stage < m.extractionMinStage;
    const isIdle = !isExtract && !isActive && !isSilo && !isSolar;
    const stageNames = m.activeStages.map(s => ACTIVE_STAGE_NAMES[s]).filter(Boolean);
    const minStageName = isExtract ? TERRAFORM_STAGES[m.extractionMinStage].name : null;
    return (
      <div
        key={m.id}
        className={
          "machine-option" +
          (selectedMachineType === m.id ? " selected" : "") +
          (!affordable ? " disabled" : "") +
          ((isIdle || extractIdle) ? " idle" : "")
        }
        onClick={() => {
          if (!affordable) return;
          setSelectedMachineType(m.id);
          setInspecting(null);
          if (mobile) setDrawerOpen(false);
        }}
      >
        <div className="pip-sample" style={{ background: MACHINE_CATEGORY_COLORS[m.stage], opacity: (isIdle || extractIdle) ? 0.35 : 1 }} />
        <div>
          <div className="m-name">
            {flavor.name} <span style={{ fontSize: 10, color: "var(--ink-dim)", fontWeight: "normal" }}>T{m.tier}</span>
            {isIdle && <span className="m-idle"> (idle)</span>}
            {isActive && <span className="m-active"> (active)</span>}
            {extractActive && <span className="m-active"> (extracting)</span>}
            {extractIdle && <span className="m-idle"> (needs {minStageName}+)</span>}
          </div>
          <div className="m-desc">{flavor.desc}</div>
          <div className="m-stats">
            {m.pps > 0 ? (() => {
              if (isActive) {
                const activeN = countActiveTerraforming(machines, stage);
                const effPps = (m.pps * diminishFactor(activeN)).toFixed(2);
                return activeN > 0
                  ? <span>{effPps} pts/s ({activeN} machine{activeN !== 1 ? "s" : ""} already active this stage)</span>
                  : <span>{m.pps.toFixed(2)} pts/s</span>;
              }
              return <span>{m.pps.toFixed(2)} pts/s</span>;
            })()
              : isSilo ? <span>×1.20 first adj. silo, diminishing (×0.85 decay)</span>
              : isSolar ? <span>+15% first adj. machine, diminishing (×0.85 decay)</span>
              : isExtract ? (() => {
                if (extractActive) {
                  const activeN = countActiveExtractors(machines, stage);
                  const effRate = (m.extractionRate * diminishFactor(activeN)).toFixed(3);
                  return activeN > 0
                    ? <span>{effRate}/s ({activeN} extractor{activeN !== 1 ? "s" : ""} already on world) {m.extractionMinStage > 0 ? minStageName + "+" : "any stage"}</span>
                    : <span>{m.extractionRate.toFixed(2)}/s {m.extractionMinStage > 0 ? minStageName + "+" : "any stage"}</span>;
                }
                return <span>{m.extractionRate.toFixed(2)}/s {m.extractionMinStage > 0 ? minStageName + "+" : "any stage"}</span>;
              })()
              : null}
            {stageNames.length > 0 && <span className="m-stages">{stageNames.join(", ")}</span>}
          </div>
          {isSolar && solarCount > 0 && (
            <div style={{ fontSize: 11, color: "var(--accent-soft)", marginTop: 2 }}>
              {solarCount} Solar{solarCount !== 1 ? "s" : ""} on this planet — each adjacent Solar boosts less (15%, 12.75%, 10.8%, …)
            </div>
          )}
          {isSilo && siloCount > 0 && (
            <div style={{ fontSize: 11, color: "var(--accent-soft)", marginTop: 2 }}>
              {siloCount} Silo{siloCount !== 1 ? "s" : ""} on this planet — each adjacent Silo boosts less (×1.20, ×1.17, ×1.145, …)
            </div>
          )}
          <div className="m-cost">
            {Object.keys(m.cost).map(k => {
              const res = SIGNATURE_RESOURCES.find(r => r.id === k);
              const have = Math.floor((inventory && inventory[k]) || 0);
              const need = m.cost[k];
              return (
                <span key={k} className={"cost-chip" + (have < need ? " short" : "")}>
                  {res ? res.name : k}: {have}/{need}
                </span>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  const machineGroups = [
    { label: "Terraforming", list: terraformingMachines },
    { label: "Infrastructure", list: infrastructureMachines },
    { label: "Extraction", list: extractionMachines }
  ];

  // Shared info panel content — used by both desktop sidebar info and mobile top panel.
  function renderInfoPanel() {
    return (
      <React.Fragment>
        <h3>{planet.name}</h3>
        <div style={{ color: "var(--ink-dim)", fontStyle: "italic", fontSize: 13, marginBottom: 8 }}>
          {planetType ? planetType.name : planet.type} — {planetType ? planetType.puzzle : ""}
        </div>
        <div className="row"><span>Stage</span><strong>{stageDef.name}</strong></div>
        <div className="progress-outer">
          <div className="progress-inner" style={{ width: progressPct + "%" }} />
        </div>
        <div className="row"><span>Progress</span><strong>{Math.floor(progress)} / {curThreshold}</strong></div>
        <div className="row"><span>Machines</span><strong>{machines.length} ({activePlaced} active, {idlePlaced} idle)</strong></div>
        <div className="row"><span>Points / sec</span><strong>{pps.toFixed(1)}</strong></div>
        <div className="row">
          <span>Presence</span>
          <strong><span className="presence-pill tended">Tended (100%)</span></strong>
        </div>
        {(() => {
          const now = Date.now();
          const live = (activeBoosts || []).filter(b => b && b.expiresAt > now && (!b.scope || b.scope === "global" || b.scope === "planet:" + planetId));
          if (live.length === 0) return null;
          return live.map(b => {
            const remS = Math.max(0, Math.ceil((b.expiresAt - now) / 1000));
            return (
              <div key={b.id} className="row" style={{ fontSize: 12, color: "var(--accent-soft)" }}>
                <span>{b.label || "Crew boost"}</span>
                <strong>{formatTime(remS)}</strong>
              </div>
            );
          });
        })()}
        <div className="row">
          <span>Next stage in</span>
          <strong>{stage >= 5 ? "—" : (pps === 0 ? "place a machine" : formatTime(secondsToNext))}</strong>
        </div>
        {renderProductionSection()}
        <div style={{ marginTop: 8, fontSize: 12, color: "var(--ink-dim)" }}>
          {stageDef.desc}
        </div>
        {(() => {
          const lt = labTier || 1;
          const f = planet.fertility || 1.0;
          if (lt <= 2) return <div className="row" style={{ fontSize: 12, marginTop: 4 }}><span>Fertility</span><strong style={{ color: "var(--ink-dim)" }}>Unknown — upgrade Lab to scan</strong></div>;
          if (lt === 3) return <div className="row" style={{ fontSize: 12, marginTop: 4 }}><span>Fertility</span><strong>{fertilityCategory(f)}</strong></div>;
          return <div className="row" style={{ fontSize: 12, marginTop: 4 }}><span>Fertility</span><strong>{f.toFixed(2)}× ({fertilityCategory(f)})</strong></div>;
        })()}
        {labTier >= 4 && planet.tenderRuin && (
          <div className="row" style={{ fontSize: 12, marginTop: 4, color: "var(--accent-soft)" }}>
            <span>{labTier >= 5 ? planet.tenderRuin.ruinName : "Anomaly Detected"}</span>
            {labTier >= 5 && <strong>Activates at {TERRAFORM_STAGES[planet.tenderRuin.activationStage].name}</strong>}
          </div>
        )}
      </React.Fragment>
    );
  }

  // Production section with Lab-tier gating.
  function renderProductionSection() {
    const isRocky = planet.type === "rocky";
    const resId = PLANET_TYPE_RESOURCE[planet.type];
    const res = SIGNATURE_RESOURCES.find(r => r.id === resId);
    const resName = res ? res.name : "Common Ore";
    const lp = world.lifetimeProduction || {};
    const lt = labTier || 1;
    let passiveRate = 0;
    let passiveLabel = "";
    if (isRocky) {
      passiveRate = ROCKY_PRODUCTION_PER_STAGE[stage] || 0;
      passiveLabel = resName + ": +" + passiveRate.toFixed(2) + "/s";
    } else if (stage >= 3 && res) {
      passiveRate = PRODUCTION_PER_STAGE[stage] || 0;
      passiveLabel = resName + ": +" + passiveRate.toFixed(2) + "/s";
    } else {
      passiveRate = BASE_ORE_TRICKLE;
      passiveLabel = "Common Ore: +" + passiveRate.toFixed(2) + "/s (base trickle)";
    }
    // Extraction: use adjacency-aware calculation with active presence/boost multipliers.
    const extractTotal = calcWorldExtraction(machines, stage, surfaceMultipliers);
    let extractCount = 0;
    machines.forEach(m => {
      const def = MACHINES.find(md => md.id === m.type);
      if (def && def.extractionRate && stage >= def.extractionMinStage) extractCount++;
    });
    const totalRate = passiveRate + extractTotal;
    const lpEntries = Object.keys(lp).filter(k => lp[k] > 0).map(k => {
      const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
      return (r ? r.name : k) + ": " + Math.floor(lp[k]);
    });
    const floraPreview = lt >= 2 && stage < 3 && res;
    const floraRate = floraPreview ? (isRocky ? ROCKY_PRODUCTION_PER_STAGE[3] : PRODUCTION_PER_STAGE[3]) : 0;
    const terraCount = machines.filter(m => { const d = MACHINES.find(md => md.id === m.type); return d && d.pps > 0 && d.activeStages.indexOf(stage) !== -1; }).length;
    const stagesLeft = Math.max(0, 5 - stage);
    let paradisePoints = 0;
    if (stagesLeft > 0) {
      paradisePoints = stageThreshold(stage) - progress;
      for (let si = stage + 1; si < 5; si++) paradisePoints += stageThreshold(si);
    }
    const paradiseSeconds = (pps > 0 && stagesLeft > 0) ? Math.ceil(paradisePoints / pps) : null;
    return (
      <div style={{ marginTop: 10, paddingTop: 8, borderTop: "1px solid var(--line)" }}>
        <div className="row" style={{ fontWeight: "bold", color: "var(--accent)", marginBottom: 2 }}><span>Production</span></div>
        {lt >= 2 && res && <div className="row" style={{ fontSize: 12 }}><span>Signature: {resName}</span></div>}
        {lt >= 3 ? (
          <React.Fragment>
            <div className="row" style={{ fontSize: 12 }}><span>Passive: {passiveLabel}</span></div>
            {extractCount > 0 && <div className="row" style={{ fontSize: 12 }}><span>Extraction: {resName}: +{extractTotal.toFixed(2)}/s ({extractCount} machine{extractCount > 1 ? "s" : ""}, adj. boosted)</span></div>}
          </React.Fragment>
        ) : null}
        {(totalRate > 0) && <div className="row" style={{ fontWeight: "bold", fontSize: 12 }}><span>Total: {resName}: +{totalRate.toFixed(2)}/s</span></div>}
        {floraPreview && <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)" }}><span>At Flora: {resName} +{floraRate.toFixed(2)}/s (passive)</span></div>}
        {lt >= 4 && terraCount > 0 && <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)" }}><span>Efficiency: {terraCount} machine{terraCount > 1 ? "s" : ""} × {pps.toFixed(1)} total pps (adjacency-boosted)</span></div>}
        {lt >= 5 && stage < 5 && paradiseSeconds && <div className="row" style={{ fontSize: 11, color: "var(--accent-soft)" }}><span>Paradise ETA: {formatTime(paradiseSeconds)} at current loadout</span></div>}
        {lpEntries.length > 0 && <div className="row" style={{ fontSize: 11, color: "var(--ink-dim)", marginTop: 2 }}><span>Lifetime: {lpEntries.join(", ")}</span></div>}
      </div>
    );
  }

  return (
    <div className="surface">
      {/* Mobile info panel — always visible, scrollable, above grid */}
      {mobile && (
        <div className="mobile-surface-info">
          {renderInfoPanel()}
        </div>
      )}

      {/* Desktop sidebar — hidden on mobile via CSS */}
      <div className="surface-sidebar">
        {machineGroups.map(group => (
          <div key={group.label}>
            <h4>{group.label}</h4>
            {group.list.map(renderMachineOption)}
          </div>
        ))}
        <div style={{ color: "var(--ink-dim)", fontSize: 11, marginTop: 10, fontStyle: "italic" }}>
          {selectedMachineType ? "Click an empty tile to place." : "Click a machine to build, or a placed machine to inspect."}
        </div>
      </div>

      <div className="surface-main" style={{ position: "relative" }}>
        <div className={"tile-grid" + (weatherTileClass ? " " + weatherTileClass : "")} style={{ backgroundImage: `url('${tileUrl}')`, gridTemplateColumns: `repeat(${gridCols}, ${mobile ? "1fr" : "44px"})`, gridTemplateRows: `repeat(${gridRows}, ${mobile ? "1fr" : "44px"})` }}>{tiles}</div>
        <FloaterLayer
          floaters={floaters || []}
          onExpire={onFloaterExpire}
          tileSize={mobile ? null : 44}
          gridCols={gridCols}
          gridRows={gridRows}
        />
        {weatherBanner}
        {inspecting && inspecting.def && (() => {
          const d = inspecting.def;
          const m = inspecting.machine;
          const isSolar = d.id === "solar_array";
          const isSilo = d.id === "storage_silo";
          const isActive = d.activeStages.indexOf(stage) !== -1;
          const isExtract = !!d.extractionRate;
          const extractActive = isExtract && stage >= d.extractionMinStage;
          const statusLabel = isSolar ? "Infrastructure (boost)" : isSilo ? "Infrastructure (storage)" : isExtract ? (extractActive ? "Extracting" : "Idle (needs " + TERRAFORM_STAGES[d.extractionMinStage].name + "+)") : isActive ? "Active" : "Idle";
          const refund = {};
          if (d.cost) { for (const k in d.cost) refund[k] = Math.floor(d.cost[k] * 0.75); }
          const hasRefund = Object.keys(refund).some(k => refund[k] > 0);
          // Position popup near the clicked tile (desktop); centered on mobile via CSS.
          const popLeft = mobile ? undefined : Math.min(inspecting.x * 46 + 6, 12 * 46 - 230);
          const popTop = mobile ? undefined : inspecting.y * 46 + 52;
          // Adjacency info for the inspected machine.
          const adjSolars = countAdjacentSolars(machines, inspecting.x, inspecting.y);
          const adjSilos = countAdjacentSilos(machines, inspecting.x, inspecting.y);
          const showSolarBoost = !isSolar && !isSilo && adjSolars > 0;
          const showSiloBoost = isExtract && adjSilos > 0;
          return (
            <div className="deconstruct-popup" style={mobile ? {} : { left: popLeft, top: popTop }}>
              <div className="dp-name">{flavorOf(d).name}</div>
              <div className="dp-status">{statusLabel}</div>
              {showSolarBoost && (
                <div style={{ fontSize: 11, color: "var(--accent-soft)", marginBottom: 4 }}>
                  Boosted by {adjSolars} adjacent Solar{adjSolars > 1 ? "s" : ""} (+{(diminishingAdjBonus(adjSolars, 0.15) * 100).toFixed(1)}%)
                </div>
              )}
              {showSiloBoost && (
                <div style={{ fontSize: 11, color: "var(--accent-soft)", marginBottom: 4 }}>
                  Boosted by {adjSilos} adjacent Silo{adjSilos > 1 ? "s" : ""} (×{diminishingSiloMultiplier(adjSilos).toFixed(2)})
                </div>
              )}
              <div className="dp-refund">
                {hasRefund ? "Refund: " : "No refund."}
                {Object.keys(refund).map(k => {
                  if (refund[k] <= 0) return null;
                  const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
                  return <span key={k} className="chip">{r ? r.name : k}: {refund[k]}</span>;
                })}
              </div>
              <div className="dp-actions">
                {(() => {
                  const cdEnds = (machineCooldowns || {})[m.id] || 0;
                  const onCooldown = cdEnds > Date.now();
                  if (!isExtract || !extractActive || onCooldown) return null;
                  return (
                    <button className="harvest" onClick={() => { if (onHarvest) onHarvest(planetId, m); setInspecting(null); }}>
                      Harvest
                    </button>
                  );
                })()}
                <button className="danger" onClick={() => { onDeconstruct(planetId, m.id); setInspecting(null); }}>Deconstruct</button>
                <button onClick={() => setInspecting(null)}>Cancel</button>
              </div>
            </div>
          );
        })()}
        {placementError && (
          <div className="placement-error" onClick={onClearError}>
            {placementError}
            <span className="dismiss">dismiss</span>
          </div>
        )}
        {mobile && selectedMachineType && (
          <div style={{ fontSize: 13, color: "var(--accent)", padding: "4px 0" }}>
            Placing: {(() => { const md = MACHINES.find(mm => mm.id === selectedMachineType); return md ? flavorOf(md).name : selectedMachineType; })()} — tap tiles to place
            <button style={{ marginLeft: 8, fontSize: 11, padding: "2px 8px", minHeight: "auto", minWidth: "auto" }} onClick={() => setSelectedMachineType(null)}>Cancel</button>
          </div>
        )}
        <div style={{ display: "flex", gap: 8 }}>
          {mobile && <button onClick={() => setDrawerOpen(true)}>Build</button>}
          <button onClick={onBack}>Back to System</button>
        </div>
      </div>

      {/* Mobile bottom drawer for machine selection */}
      {mobile && drawerOpen && (
        <React.Fragment>
          <div className="mobile-drawer-overlay" onClick={() => setDrawerOpen(false)} />
          <div className="mobile-drawer">
            <div className="drawer-handle" />
            {machineGroups.map(group => (
              <div key={group.label}>
                <h4>{group.label}</h4>
                {group.list.map(renderMachineOption)}
              </div>
            ))}
          </div>
        </React.Fragment>
      )}

      {/* Desktop info panel — hidden on mobile */}
      {!mobile && <div className="surface-info">{renderInfoPanel()}</div>}
    </div>
  );
}

// ---------- Contextual advice system ----------
function evaluateAdviceContext(screen, state) {
  const worlds = state.worlds || {};
  const worldIds = Object.keys(worlds);
  const worldCount = worldIds.length;
  const activeWorlds = worldIds.filter(id => (worlds[id].machines || []).length > 0);
  const floraWorlds = worldIds.filter(id => worlds[id].stage >= 3);
  const paradiseWorlds = worldIds.filter(id => worlds[id].stage >= 5);

  if (screen === "ship") {
    const frags = state.fragmentsFound || [];
    if (frags.length > 0 && frags.length < 10) return "ship_has_some_fragments";
    if (paradiseWorlds.length > 0 && (state.upgrades && state.upgrades.lab || 1) >= 4 && frags.length === 0) return "ship_has_no_fragments";
    if (paradiseWorlds.length > 0) return "ship_paradise_exists";
    if (activeWorlds.length > 1) return "ship_multiple_worlds";
    if (floraWorlds.length > 0) return "ship_world_at_flora";
    if (activeWorlds.length > 0) return "ship_worlds_below_flora";
    return "ship_no_worlds";
  }
  if (screen === "chart") {
    const driveTier = (state.upgrades && state.upgrades.drive) || 1;
    const maxHops = driveTier >= 5 ? 999 : driveTier;
    const reachable = reachableSystems(state.currentSystemId, maxHops);
    const visited = state.visitedSystems || {};
    const visitedCount = Object.keys(visited).length;
    const hasUnreachable = STUB_SYSTEMS.some(s => !reachable.has(s.id));
    // Check if any system could flourish with more paradise worlds.
    const couldFlourish = STUB_SYSTEMS.some(sys => {
      const pCount = sys.planets.filter(p => worlds[p.id] && worlds[p.id].stage >= 5).length;
      return pCount >= 1 && pCount < sys.planets.length;
    });
    if (couldFlourish && paradiseWorlds.length >= 2) return "chart_flourishing_possible";
    if (visitedCount <= 1) return "chart_never_jumped";
    if (hasUnreachable) return "chart_has_unreachable";
    return "chart_explored";
  }
  if (screen === "system") {
    const sys = STUB_SYSTEMS.find(s => s.id === state.currentSystemId);
    if (!sys) return "system_no_landed";
    const hasLanded = sys.planets.some(p => worlds[p.id]);
    return hasLanded ? "system_has_worlds" : "system_no_landed";
  }
  if (screen === "surface") {
    const pid = state.currentPlanetId;
    const w = pid && worlds[pid];
    if (!w) return "surface_no_machines";
    if (w.stage >= 5) return "surface_paradise";
    const machines = w.machines || [];
    if (machines.length === 0) return "surface_no_machines";
    const hasIdle = machines.some(m => {
      const def = MACHINES.find(md => md.id === m.type);
      return def && def.pps > 0 && def.activeStages.indexOf(w.stage) === -1;
    });
    if (hasIdle) return "surface_machines_idle";
    return "surface_machines_active";
  }
  return "ship_no_worlds";
}

function AdviceButton({ crew, state, screen }) {
  const [open, setOpen] = useState(false);
  const cartId = crew && crew.cartographer;
  if (!cartId) return null;

  const roleDef = CREW_ROLES.find(r => r.id === "cartographer");
  const cand = roleDef && roleDef.candidates.find(c => c.id === cartId);
  const name = cand ? cand.name : "Cartographer";

  function handleOpen() {
    setOpen(true);
  }

  const contextId = evaluateAdviceContext(screen, state);
  const text = pickAdvice(contextId, cartId);

  return (
    <React.Fragment>
      <button className="advice-btn" onClick={handleOpen} title="Advice">?</button>
      {open && (
        <div className="advice-overlay" onClick={() => setOpen(false)}>
          <div className="advice-panel" onClick={e => e.stopPropagation()}>
            <img className="advice-portrait" src={`./assets/crew/${cartId}.jpg`} alt={name}
              onError={(e) => { e.target.style.display = "none"; }} />
            <div className="advice-body">
              <div className="advice-speaker">{name}</div>
              <div className="advice-text">{text || "No advice at this time."}</div>
              <button className="advice-close" onClick={() => setOpen(false)}>Close</button>
            </div>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

// ---------- Offline return report — appears on game load when player was away >60s ----------
function OfflineReturnReport({ report, worlds, onContinue }) {
  if (!report) return null;
  function formatDur(sec) {
    if (sec < 60) return sec + "s";
    const m = Math.floor(sec / 60);
    if (m < 60) return m + "m " + (sec % 60) + "s";
    const h = Math.floor(m / 60);
    const remM = m % 60;
    return h + "h " + remM + "m";
  }
  const worldDeltas = (report.worldDeltas || []).slice().sort((a, b) => (b.stageAfter - b.stageBefore) - (a.stageAfter - a.stageBefore));
  const resourceEntries = Object.keys(report.resourceDeltas || {}).map(k => {
    const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
    return { id: k, name: r ? r.name : k, amount: report.resourceDeltas[k] };
  }).filter(e => e.amount > 0.5)
    .sort((a, b) => b.amount - a.amount);
  const capped = (report.cappedResources || []).map(k => {
    const r = SIGNATURE_RESOURCES.find(sr => sr.id === k);
    return r ? r.name : k;
  });
  return (
    <div className="worlds-overlay" onClick={onContinue}>
      <div className="worlds-panel" onClick={e => e.stopPropagation()} style={{ maxWidth: 540 }}>
        <h3>Welcome back, captain.</h3>
        <div style={{ color: "var(--ink-dim)", marginBottom: 8 }}>
          You were away for {formatDur(report.elapsedSeconds)}.
          {report.cappedAtOffline && <span> (Offline progress capped at 8 hours.)</span>}
        </div>
        <div style={{ color: "var(--ink-dim)", fontSize: 12, marginBottom: 14 }}>
          Effective progress applied: ~{formatDur(report.effectiveSeconds)} — {Math.round(PRESENCE_AWAY * 100)}% autonomous efficiency.
        </div>
        {worldDeltas.length > 0 && (
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontWeight: "bold", color: "var(--accent)", marginBottom: 4, fontSize: 12, letterSpacing: 1, textTransform: "uppercase" }}>Worlds</div>
            {worldDeltas.map(d => {
              const f = findPlanet(d.planetId);
              const name = f ? f.planet.name : d.planetId;
              const advanced = d.stageAfter > d.stageBefore;
              if (advanced) {
                const fromName = TERRAFORM_STAGES[d.stageBefore] && TERRAFORM_STAGES[d.stageBefore].name;
                const toName = TERRAFORM_STAGES[d.stageAfter] && TERRAFORM_STAGES[d.stageAfter].name;
                return <div key={d.planetId} className="row" style={{ fontSize: 12 }}><span>{name}</span><strong style={{ color: "#6fbf73" }}>{fromName} → {toName}</strong></div>;
              }
              const delta = (d.progressAfter - d.progressBefore);
              if (delta < 0.5) return null;
              const toName = TERRAFORM_STAGES[d.stageAfter + 1] && TERRAFORM_STAGES[d.stageAfter + 1].name;
              return (
                <div key={d.planetId} className="row" style={{ fontSize: 12 }}>
                  <span>{name}</span>
                  <strong>+{Math.floor(delta)} / {Math.floor(stageThreshold(d.stageAfter))} toward {toName || "Paradise"}</strong>
                </div>
              );
            })}
          </div>
        )}
        {resourceEntries.length > 0 && (
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontWeight: "bold", color: "var(--accent)", marginBottom: 4, fontSize: 12, letterSpacing: 1, textTransform: "uppercase" }}>Resources gained</div>
            {resourceEntries.map(e => (
              <div key={e.id} className="row" style={{ fontSize: 12 }}>
                <span>{e.name}</span>
                <strong>+{Math.floor(e.amount)}</strong>
              </div>
            ))}
          </div>
        )}
        {worldDeltas.length === 0 && resourceEntries.length === 0 && (
          <div style={{ color: "var(--ink-dim)", fontStyle: "italic", marginBottom: 12 }}>
            A quiet pass. The worlds were already at rest, or there was little to do without us.
          </div>
        )}
        {capped.length > 0 && (
          <div style={{ background: "#3a1a1a", border: "1px solid #8a3a3a", borderLeft: "3px solid #c95a3a", color: "#f5d0c0", padding: "8px 10px", borderRadius: 4, fontSize: 12, marginBottom: 12 }}>
            ⚠ Cargo cap reached for: <strong>{capped.join(", ")}</strong>. Some production was lost — upgrade your Hull to store more.
          </div>
        )}
        <div style={{ textAlign: "right", marginTop: 8 }}>
          <button className="primary" onClick={onContinue}>Continue</button>
        </div>
      </div>
    </div>
  );
}

// ---------- Floater layer — ephemeral "+N resource" text rising from a tile ----------
function FloaterLayer({ floaters, onExpire, tileSize, gridCols, gridRows }) {
  useEffect(() => {
    if (!floaters || floaters.length === 0) return;
    const timers = floaters.map(f => setTimeout(() => { if (onExpire) onExpire(f.id); }, 1800));
    return () => { timers.forEach(t => clearTimeout(t)); };
  }, [floaters && floaters.map(f => f.id).join(",")]);
  if (!floaters || floaters.length === 0) return null;
  return (
    <div className="surface-floater-layer">
      {floaters.map(f => {
        // Place at tile center. On mobile we don't know exact pixel size — use % fallback.
        const leftPct = ((f.x + 0.5) / (gridCols || 12)) * 100;
        const topPct  = ((f.y + 0.5) / (gridRows || 10)) * 100;
        const style = tileSize
          ? { left: (f.x * tileSize + tileSize / 2) + "px", top: (f.y * tileSize + tileSize / 2) + "px", color: f.color || "#6fbf73" }
          : { left: leftPct + "%", top: topPct + "%", color: f.color || "#6fbf73" };
        return (
          <span key={f.id} className="surface-floater" style={style}>{f.text}</span>
        );
      })}
    </div>
  );
}

// ---------- Crew popout speech bubble ----------
function CrewPopout({ queue, onDismiss, onAction }) {
  const [fading, setFading] = useState(false);
  const current = queue && queue.length > 0 ? queue[0] : null;
  const timerRef = useRef(null);

  useEffect(() => {
    if (!current) return;
    setFading(false);
    // Per-popout lifetime: crew tasks stay visible 30s; normal chatter 6s.
    const lifetime = (current && current.durationMs) || 6000;
    timerRef.current = setTimeout(() => {
      setFading(true);
      setTimeout(() => onDismiss(), 400);
    }, lifetime);
    return () => { clearTimeout(timerRef.current); };
  }, [current && current.ts]);

  if (!current) return null;

  function handleClick() {
    clearTimeout(timerRef.current);
    setFading(true);
    setTimeout(() => onDismiss(), 200);
  }
  function handleActionClick(e) {
    e.stopPropagation();
    clearTimeout(timerRef.current);
    if (onAction && current.action) onAction(current.action, current);
    setFading(true);
    setTimeout(() => onDismiss(), 200);
  }

  return (
    <div className={"crew-popout" + (fading ? " fading" : "")} onClick={handleClick}>
      <img className="portrait" src={`./assets/crew/${current.candidateId}.jpg`}
        alt={current.name}
        onError={(e) => { e.target.style.display = "none"; }}
      />
      <div className="bubble">
        <div className="speaker-name">{current.name}</div>
        <div className="speaker-line">{current.line}</div>
        {current.action && (
          <React.Fragment>
            <button className="crew-action-btn" onClick={handleActionClick}>{current.action.label}</button>
            {current.action.rewardLabel && (
              <div className="crew-reward-note">Reward: {current.action.rewardLabel}</div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
